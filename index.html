<style>
  :root {
    --felt:#1E4634; --felt-deep:#16382A; --cream:#F8F2E2; --cream-shade:#EDE3CB;
    --rule:#C9B98F; --ink:#33302A; --ink-soft:#6B6353; --red:#9B2226; --brass:#A07C2E;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; }
  body {
    background: radial-gradient(ellipse at 50% 18%, var(--felt) 0%, var(--felt-deep) 100%);
    background-attachment: fixed;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: 'Old Standard TT', Georgia, serif;
    color: var(--ink);
    padding: max(20px, env(safe-area-inset-top)) 12px calc(48px + env(safe-area-inset-bottom));
    -webkit-text-size-adjust: 100%;
    -webkit-user-select: none; user-select: none;
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
  .disp { font-family: 'Old Standard TT', Georgia, serif; }

  header { text-align:center; margin-bottom:16px; }
  .eyebrow { color:var(--rule); letter-spacing:.35em; font-size:11px; margin:0; text-transform:uppercase; }
  h1 { color:var(--cream); font-size:34px; margin:2px 0 0; font-weight:700; letter-spacing:.04em; }
  .subtitle { color:var(--rule); font-style:italic; font-size:13px; margin:2px 0 0; }

  .pad { background:var(--cream); border-radius:6px; box-shadow:0 10px 30px rgba(0,0,0,.35), 0 2px 4px rgba(0,0,0,.2); overflow:hidden; }
  .fade { animation: fade .35s ease both; }
  @keyframes fade { from { opacity:0; transform:translateY(6px);} to { opacity:1; transform:none;} }
  @media (prefers-reduced-motion: reduce) { .fade { animation:none; } }

  .banner { background:var(--brass); color:var(--cream); text-align:center; padding:10px 12px; font-size:18px; font-weight:700; letter-spacing:.05em; }

  .totals { display:grid; grid-template-columns:1fr 1px 1fr; border-bottom:1px solid var(--rule); }
  .team { padding:16px 12px 12px; text-align:center; }
  .divider { background:var(--rule); }
  .team-name { border:none; border-bottom:1px dashed var(--rule); background:transparent; text-align:center;
    font-family:'Old Standard TT',Georgia,serif; font-size:18px; font-weight:700; color:var(--ink);
    width:90%; letter-spacing:.06em; padding:0 0 2px; }
  .team-name:focus { outline:2px solid var(--brass); outline-offset:2px; }
  .score { font-size:52px; font-weight:600; line-height:1.1; margin-top:4px; }
  .track { height:6px; background:var(--cream-shade); border-radius:3px; margin:8px 10px 0; overflow:hidden; }
  .track > span { display:block; height:100%; border-radius:3px; transition:width .4s ease; }

  .empty { text-align:center; color:var(--ink-soft); font-style:italic; padding:20px 16px; margin:0; }
  .deal-row { display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--cream-shade); }
  .deal-no { color:var(--ink-soft); font-size:12px; width:22px; }
  .score-cell { display:inline-flex; align-items:baseline; font-size:16px; font-weight:600; color:var(--ink); }
  .score-sign { width:0.75ch; text-align:right; }
  .score-digits { width:2ch; text-align:center; }
  .score-set { color:var(--red); cursor:pointer; }
  .dash { color:var(--rule); }
  .deal-desc { flex:1; min-width:0; font-size:13px; color:var(--ink-soft); font-style:italic; text-align:center; }
  .set-flag { color:var(--red); font-style:normal; margin-left:6px; letter-spacing:.08em; font-weight:700; }
  .deal-dealer { flex:none; width:96px; text-align:right; font-size:12px; color:var(--brass); font-style:normal; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .del { background:none; border:none; color:var(--ink-soft); font-size:16px; cursor:pointer; padding:4px; border-radius:4px; transition:color .08s, background .08s; }
  .del:active { color:var(--red); background:rgba(155,34,38,.1); }

  .entry { border-top:2px solid var(--rule); padding:14px 16px 18px; background:var(--cream-shade); }
  .entry h2 { margin:0 0 4px; font-weight:700; font-size:16px; color:var(--ink); letter-spacing:.05em; }
  .phase-label { text-transform:uppercase; letter-spacing:.12em; font-size:11px; font-weight:700; color:var(--brass); margin:0 0 12px; }
  .bid-summary { background:var(--cream); border:1px solid var(--rule); border-radius:5px; padding:9px 11px; font-size:15px; color:var(--ink); margin:0 0 14px; }
  .row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .label { color:var(--ink); font-size:15px; }
  .who { display:flex; gap:8px; margin-bottom:12px; }
  .who button { flex:1; padding:10px 0; border-radius:4px; font-size:15px; font-weight:700; cursor:pointer;
    border:1.5px solid var(--rule);
    background:linear-gradient(to bottom, #fdfaf4 0%, var(--cream) 100%);
    color:var(--ink-soft); font-family:'Old Standard TT',serif;
    box-shadow:0 1px 2px rgba(0,0,0,.1);
    transition:transform .08s ease; }
  .who button:active:not(.on) { transform:scale(.96); background:var(--cream-shade); box-shadow:none; }
  .who button.on { border-color:var(--ink);
    background:linear-gradient(to bottom, #3d3a34 0%, var(--ink) 60%, #2a2824 100%);
    color:var(--cream);
    box-shadow:0 1px 2px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.07); }
  .who button.on:active { transform:scale(.96); box-shadow:none; }

  .stepper { display:flex; align-items:center; gap:8px; }
  .step { width:40px; height:40px; border-radius:4px; border:1.5px solid var(--rule);
    background:linear-gradient(to bottom, #fdfaf4 0%, var(--cream) 100%);
    color:var(--ink); font-size:20px; cursor:pointer; line-height:1;
    box-shadow:0 1px 2px rgba(0,0,0,.1);
    transition:transform .08s ease; }
  .step:active { transform:scale(.88); background:var(--cream-shade); box-shadow:none; }
  .step-val { font-size:22px; font-weight:600; width:48px; text-align:center; }
  .step-input { width:48px; border:1px solid var(--rule); border-radius:4px; background:var(--cream); color:var(--ink);
    padding:6px 0; -moz-appearance:textfield; }
  .step-input:focus { border-color:var(--brass); }

  .chips { display:flex; flex-wrap:wrap; gap:6px; }
  .chip { padding:5px 10px; border-radius:999px; font-size:13px; cursor:pointer; border:1px solid var(--rule);
    background:linear-gradient(to bottom, #fdfaf4 0%, var(--cream) 100%);
    color:var(--ink-soft); font-family:'IBM Plex Mono',monospace;
    box-shadow:0 1px 2px rgba(0,0,0,.1);
    transition:transform .08s ease; }
  .chip:active:not(.on) { transform:scale(.93); background:var(--cream-shade); box-shadow:none; }
  .chip.on { border-color:var(--red);
    background:linear-gradient(to bottom, #a52529 0%, var(--red) 60%, #821d21 100%);
    color:var(--cream);
    box-shadow:0 1px 2px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.07); }
  .chip.on:active { transform:scale(.93); box-shadow:none; }

  .check { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--ink-soft); margin-bottom:10px; }
  .warn { color:var(--red); font-size:13px; font-style:italic; margin:0 0 8px; }
  .warn.strong { font-size:14px; font-weight:700; font-style:normal; letter-spacing:.04em; }

  .actions { display:flex; gap:8px; margin-top:6px; }
  .btn { font-family:'Old Standard TT',serif; border-radius:4px; cursor:pointer; transition:transform .08s ease, box-shadow .08s ease; }
  .btn-cancel { flex:1; padding:12px 0; border:1px solid var(--rule);
    background:linear-gradient(to bottom, #fdfaf4 0%, var(--cream) 100%);
    color:var(--ink-soft); font-size:15px;
    box-shadow:0 1px 2px rgba(0,0,0,.1); }
  .btn-cancel:active { transform:scale(.97); background:var(--cream-shade); box-shadow:none; }
  .btn-record { flex:2; padding:12px 0; border:none;
    background:linear-gradient(to bottom, #a52529 0%, var(--red) 60%, #821d21 100%);
    color:var(--cream); font-size:16px; font-weight:700; letter-spacing:.05em;
    box-shadow:0 1px 2px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.07); }
  .btn-record:active { transform:scale(.97); box-shadow:none; }
  .btn-add { width:100%; padding:14px 0; border:none;
    background:linear-gradient(to bottom, #3d3a34 0%, var(--ink) 60%, #2a2824 100%);
    color:var(--cream); font-size:17px; font-weight:700; letter-spacing:.06em;
    box-shadow:0 1px 2px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.07); }
  .btn-add:active { transform:scale(.98); box-shadow:none; }
  .btn-add[disabled] { background:var(--cream-shade); color:var(--ink-soft); cursor:default; box-shadow:none; }
  .btn-new { width:100%; padding:14px 0; border:none;
    background:linear-gradient(to bottom, #ab8638 0%, var(--brass) 60%, #886824 100%);
    color:var(--cream); font-size:18px; font-weight:700; letter-spacing:.06em;
    box-shadow:0 1px 2px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.09); }
  .btn-new:active { transform:scale(.98); box-shadow:none; }
  .add-wrap { padding:14px 16px 18px; border-top:1px solid var(--cream-shade); display:flex; justify-content:center; }

  .settings-toggle { background:none; border:none; color:var(--rule); font-size:13px; font-style:italic; cursor:pointer; text-decoration:underline; font-family:'Old Standard TT',serif; transition:color .08s; }
  .settings-toggle:active { color:var(--cream); }
  .settings { background:rgba(0,0,0,.18); border-radius:6px; padding:16px; margin-top:8px; color:var(--cream); }
  .seg { display:flex; gap:6px; }
  .seg button { padding:6px 14px; border-radius:4px; font-size:14px; cursor:pointer; border:1px solid rgba(255,255,255,.3);
    background:rgba(255,255,255,.06); color:var(--cream); font-family:'IBM Plex Mono',monospace;
    transition:transform .08s ease, opacity .08s ease; }
  .seg button:active:not(.on) { opacity:.7; transform:scale(.96); }
  .seg button.on { border-color:var(--cream);
    background:linear-gradient(to bottom, #fdfaf4 0%, var(--cream) 100%);
    color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,.15); }
  .seg button.on:active { transform:scale(.96); box-shadow:none; }
  .radio { display:flex; align-items:center; gap:8px; font-size:14px; margin-bottom:4px; cursor:pointer; }
  .reset { width:100%; padding:10px 0; border-radius:4px; border:1px solid rgba(255,255,255,.4);
    background:rgba(255,255,255,.06); color:var(--cream); cursor:pointer; font-size:14px; font-family:'Old Standard TT',serif;
    transition:transform .08s ease, opacity .08s ease; }
  .reset:active { opacity:.7; transform:scale(.98); }
  .reset-yes { border:none;
    background:linear-gradient(to bottom, #a52529 0%, var(--red) 60%, #821d21 100%);
    font-weight:700;
    box-shadow:0 1px 2px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.07);
    opacity:1; }
  .reset-yes:active { transform:scale(.97); box-shadow:none; opacity:1; }

  // ---- Firebase sync state ----
  var SYNC_CODE_KEY = "somerset:dev-sync-code";
  var SYNC_ROLE_KEY = "somerset:dev-sync-role";
  var fb = null;              // firebase.database() instance
  var syncCode = null;        // active 6-char join code
  var syncRole = null;        // "host" | "guest"
  var syncStatus = "offline"; // "offline" | "connecting" | "live" | "error"

  // Per-device ID for match locking
  var DEVICE_ID_KEY = "somerset:dev-device-id";
  (function(){ if (!localStorage.getItem(DEVICE_ID_KEY)) localStorage.setItem(DEVICE_ID_KEY, Math.random().toString(36).slice(2,12)); })();
  var deviceId = localStorage.getItem(DEVICE_ID_KEY);
  var LOCK_TIMEOUT_MS = 10 * 60 * 1000; // 10 min stale lock

  // ---- Match descriptor helpers ----
  function amKey(am) {
    if (!am) return "";
    if (!am.bracket) return am.ri + "_" + am.mi;
    if (am.bracket === "wb") return "wb_" + am.ri + "_" + am.mi;
    if (am.bracket === "lb") return "lb_" + am.ri + "_" + am.mi;
    if (am.bracket === "gf") return "gf_" + am.match;
    if (am.bracket === "rr") return "rr_" + am.idx;
    if (am.bracket === "series") return "series_" + am.gi;
    return am.ri + "_" + am.mi;
  }
  function getActiveMatchObj(am) {
    if (!am || !tourney) return null;
    if (!am.bracket) return tourney.rounds && tourney.rounds[am.ri] && tourney.rounds[am.ri][am.mi];
    if (am.bracket === "wb") return tourney.wBracket && tourney.wBracket.rounds[am.ri][am.mi];
    if (am.bracket === "lb") return tourney.lBracket && tourney.lBracket.rounds[am.ri][am.mi];
    if (am.bracket === "gf") return am.match === 2 ? tourney.grandFinal.m2 : tourney.grandFinal.m1;
    if (am.bracket === "rr") return am.isFinal ? tourney.final : tourney.schedule[am.idx];
    if (am.bracket === "series") return tourney.games && tourney.games[am.gi];
    return null;
  }
  function claimLock(am) {
    if (!syncCode || !tourney) return;
    if (!tourney.locks) tourney.locks = {};
    tourney.locks[amKey(am)] = { deviceId: deviceId, claimedAt: Date.now() };
    saveTourney();
  }
  function releaseLock(am) {
    if (!tourney || !tourney.locks) return;
    var k = amKey(am);
    var lk = tourney.locks[k];
    if (lk && lk.deviceId === deviceId) delete tourney.locks[k];
  }
  function isMineOrUnlocked(am) {
    if (!syncCode) return true;
    var lk = tourney && tourney.locks && tourney.locks[amKey(am)];
    if (!lk) return true;
    if (lk.deviceId === deviceId) return true;
    return (Date.now() - lk.claimedAt) > LOCK_TIMEOUT_MS;
  }

  function initFb() {
    try {
      var cfg = window.SOMERSET_FB_CONFIG;
      if (!cfg || !cfg.databaseURL) return false;
      if (typeof firebase === "undefined") return false;
      if (!firebase.apps.length) firebase.initializeApp(cfg);
      fb = firebase.database();
      return true;
    } catch (e) { return false; }
  }

  var CODE_CHARS = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  function genCode() {
    var c = "";
    for (var i = 0; i < 6; i++) c += CODE_CHARS[Math.floor(Math.random() * CODE_CHARS.length)];
    return c;
  }

  // Firebase stores arrays as keyed objects — convert them back after every read
  function fbObjToArr(obj) {
    if (Array.isArray(obj)) return obj;
    if (!obj || typeof obj !== "object") return [];
    var keys = Object.keys(obj).map(Number).filter(function(n){ return !isNaN(n); }).sort(function(a,b){ return a-b; });
    if (!keys.length) return [];
    var arr = [];
    for (var i = 0; i <= keys[keys.length - 1]; i++) arr.push(obj[i] !== undefined ? obj[i] : null);
    return arr;
  }
  function normalizeFirebaseGame(g) {
    if (!g || typeof g !== "object") return g;
    // Firebase drops empty arrays — always ensure these exist
    g.teams   = g.teams   ? fbObjToArr(g.teams)   : ["We", "They"];
    g.players = g.players ? fbObjToArr(g.players) : ["", "", "", ""];
    g.deals   = g.deals   ? fbObjToArr(g.deals).map(function(d) {
      if (d && d.pts) d.pts = fbObjToArr(d.pts);
      return d;
    }) : [];
    return g;
  }
  function normalizeFirebaseMatches(rounds) {
    return fbObjToArr(rounds).map(function(round) {
      return fbObjToArr(round).map(function(m) {
        if (!m || typeof m !== "object") return m;
        if (!m.hasOwnProperty("a"))      m.a      = null;
        if (!m.hasOwnProperty("b"))      m.b      = null;
        if (!m.hasOwnProperty("winner")) m.winner  = null;
        if (m.game) m.game = normalizeFirebaseGame(m.game);
        if (m.completedGame) m.completedGame = normalizeFirebaseGame(m.completedGame);
        return m;
      });
    });
  }
  function normalizeFirebaseMatch(m) {
    if (!m || typeof m !== "object") return m;
    if (!m.hasOwnProperty("a"))      m.a      = null;
    if (!m.hasOwnProperty("b"))      m.b      = null;
    if (!m.hasOwnProperty("winner")) m.winner  = null;
    if (m.game) m.game = normalizeFirebaseGame(m.game);
    if (m.completedGame) m.completedGame = normalizeFirebaseGame(m.completedGame);
    return m;
  }
  // Firebase drops all-null matches and empty trailing rounds, which collapses
  // sparse round arrays (and can leave null holes where a middle match was empty).
  // These rebuild rounds to their exact expected shape so winner advancement never
  // lands on a missing/null slot. Round 0 is always intact (its matches hold real
  // teams), so its length is a reliable basis for reconstructing the rest.
  function padRoundsToLens(rounds, lens) {
    var out = [];
    for (var ri = 0; ri < lens.length; ri++) {
      var src = (rounds && rounds[ri]) || [];
      var round = [];
      for (var mi = 0; mi < lens[ri]; mi++) {
        var m = src[mi];
        round.push((m && typeof m === "object") ? m : { a: null, b: null, winner: null });
      }
      out.push(round);
    }
    return out;
  }
  function elimRoundLens(r0len) {            // single-elim / winners bracket: halve until 1
    var lens = [], len = r0len;
    while (len >= 1) { lens.push(len); if (len === 1) break; len = Math.floor(len / 2); }
    return lens;
  }
  function lbRoundLens(wbR0count, wbLen) {   // losers bracket: mirrors makeDoubleElim
    var lens = [];
    if (wbLen >= 2) {
      var prev = Math.floor(wbR0count / 2); lens.push(prev);
      for (var wbRi = 1; wbRi < wbLen; wbRi++) {
        lens.push(prev);
        if (wbRi < wbLen - 1) { prev = Math.floor(prev / 2); lens.push(prev); }
      }
    }
    return lens;
  }
  function normalizeFirebaseTourney(t) {
    if (!t || typeof t !== "object") return t;
    if (t.teams)  t.teams  = fbObjToArr(t.teams);
    if (!t.locks || typeof t.locks !== "object") t.locks = {};

    if (t.format === "double") {
      // Double elimination
      if (t.wBracket && t.wBracket.rounds) t.wBracket.rounds = normalizeFirebaseMatches(t.wBracket.rounds);
      if (t.lBracket && t.lBracket.rounds) t.lBracket.rounds = normalizeFirebaseMatches(t.lBracket.rounds);
      if (!t.wBracket) t.wBracket = { rounds: [] };
      if (!t.lBracket) t.lBracket = { rounds: [] };
      // Firebase may have collapsed empty/partial rounds — rebuild to exact shape.
      if (t.wBracket.rounds.length > 0) {
        var wbR0count = t.wBracket.rounds[0].length, wbLens = elimRoundLens(wbR0count);
        t.wBracket.rounds = padRoundsToLens(t.wBracket.rounds, wbLens);
        t.lBracket.rounds = padRoundsToLens(t.lBracket.rounds, lbRoundLens(wbR0count, wbLens.length));
      }
      if (!t.grandFinal) t.grandFinal = { m1: { a: null, b: null, winner: null }, m2: null };
      else {
        if (t.grandFinal.m1) normalizeFirebaseMatch(t.grandFinal.m1);
        if (t.grandFinal.m2) normalizeFirebaseMatch(t.grandFinal.m2);
      }
    } else if (t.format === "round") {
      // Round robin
      if (t.schedule) t.schedule = fbObjToArr(t.schedule).map(normalizeFirebaseMatch);
      if (!t.schedule) t.schedule = [];
      if (t.final) normalizeFirebaseMatch(t.final);
    } else if (t.format === "series") {
      // Best-of series — a flat list of games between the two teams
      t.games = t.games ? fbObjToArr(t.games).map(normalizeFirebaseMatch) : [];
      if (!t.games.length) t.games = [{ a: 0, b: 1, winner: null, game: null, completedGame: null }];
    } else {
      // Single elimination (default)
      if (t.rounds) t.rounds = normalizeFirebaseMatches(t.rounds);
      // Firebase may have collapsed empty/partial rounds — rebuild to exact shape so
      // every match slot exists (fixes winners that couldn't advance after a sync).
      if (t.rounds && t.rounds.length > 0) {
        t.rounds = padRoundsToLens(t.rounds, elimRoundLens(t.rounds[0].length));
      }
    }
    return t;
  }

  // Can we change a decided match's winner?
  // Only if the advanced team hasn't already played in the next round.
  function canEditWinner(t, ri, mi) {
    var m = t.rounds[ri][mi];
    if (m.winner == null || m.b == null) return false; // no winner, or bye
    if (ri + 1 >= t.rounds.length) return true;        // final — no next round to cascade
    var nm = t.rounds[ri + 1][Math.floor(mi / 2)];
    return nm.winner == null;
  }
  function clearMatchWinner(t, ri, mi) {
    var m = t.rounds[ri][mi];
    m.winner = null;
    if (ri + 1 < t.rounds.length) {
      var nm = t.rounds[ri + 1][Math.floor(mi / 2)];
      if (mi % 2 === 0) nm.a = null; else nm.b = null;
    } else {
      t.champion = null;
    }
  }

  // ---- WB clear ----
  function canClearWBWinner(t, ri, mi) {
    var m = t.wBracket.rounds[ri][mi];
    if (m.winner == null) return false;
    var loser = (m.a === m.winner) ? m.b : m.a;
    var wbLen = t.wBracket.rounds.length;
    if (ri + 1 < wbLen) {
      if (t.wBracket.rounds[ri + 1][Math.floor(mi / 2)].winner != null) return false;
    } else {
      if (t.grandFinal.m1.winner != null) return false;
    }
    if (loser != null) {
      if (ri === 0 && t.lBracket.rounds.length > 0) {
        if (t.lBracket.rounds[0][Math.floor(mi / 2)].winner != null) return false;
      } else if (ri >= 1) {
        var lbRi = 2 * ri - 1;
        if (lbRi < t.lBracket.rounds.length && t.lBracket.rounds[lbRi][mi].winner != null) return false;
      }
    }
    return true;
  }
  function clearWBWinner(t, ri, mi) {
    var m = t.wBracket.rounds[ri][mi];
    var loser = (m.a === m.winner) ? m.b : m.a;
    m.winner = null;
    var wbLen = t.wBracket.rounds.length;
    if (ri + 1 < wbLen) {
      var nwb = t.wBracket.rounds[ri + 1][Math.floor(mi / 2)];
      if (mi % 2 === 0) nwb.a = null; else nwb.b = null;
    } else {
      t.grandFinal.m1.a = null;
    }
    if (loser != null) {
      if (ri === 0 && t.lBracket.rounds.length > 0) {
        var lbSlot0 = Math.floor(mi / 2);
        t.lBracket.rounds[0][lbSlot0][mi % 2 === 0 ? "a" : "b"] = null;
      } else if (ri >= 1) {
        var lbRi2 = 2 * ri - 1;
        if (lbRi2 < t.lBracket.rounds.length) t.lBracket.rounds[lbRi2][mi].b = null;
      }
    }
  }

  // ---- LB clear ----
  function canClearLBWinner(t, ri, mi) {
    var m = t.lBracket.rounds[ri][mi];
    if (m.winner == null) return false;
    var lbLen = t.lBracket.rounds.length;
    if (ri + 1 < lbLen) {
      var nextMatch = (ri % 2 === 0) ? t.lBracket.rounds[ri + 1][mi] : t.lBracket.rounds[ri + 1][Math.floor(mi / 2)];
      return nextMatch.winner == null;
    }
    return t.grandFinal.m1.winner == null;
  }
  function clearLBWinner(t, ri, mi) {
    t.lBracket.rounds[ri][mi].winner = null;
    var lbLen = t.lBracket.rounds.length;
    if (ri + 1 < lbLen) {
      var nr = t.lBracket.rounds[ri + 1];
      if (ri % 2 === 0) {
        nr[mi].a = null;
      } else {
        nr[Math.floor(mi / 2)][mi % 2 === 0 ? "a" : "b"] = null;
      }
    } else {
      t.grandFinal.m1.b = null;
    }
  }

  // ---- GF clear ----
  function canClearGFWinner(t, matchNum) {
    if (matchNum === 1) {
      if (t.grandFinal.m1.winner == null) return false;
      if (t.grandFinal.m2 && t.grandFinal.m2.winner != null) return false;
      return true;
    }
    return t.grandFinal.m2 != null && t.grandFinal.m2.winner != null;
  }
  function clearGFWinner(t, matchNum) {
    if (matchNum === 1) {
      t.grandFinal.m1.winner = null;
      t.grandFinal.m2 = null;
      t.champion = null;
    } else {
      t.grandFinal.m2.winner = null;
      t.champion = null;
    }
  }

  // ---- RR clear ----
  function canClearRRWinner(t, idx) {
    if (t.schedule[idx].winner == null) return false;
    return !t.final || t.final.winner == null;
  }
  function clearRRWinner(t, idx) {
    t.schedule[idx].winner = null;
    t.final = null;
    t.champion = null;
  }
  function canClearRRFinalWinner(t) {
    return t.final != null && t.final.winner != null;
  }
  function clearRRFinalWinner(t) {
    t.final.winner = null;
    t.champion = null;
  }

  function subscribeToTourney(code) {
    if (!fb) return;
    fb.ref("tournaments/" + code).on("value", function(snap) {
      var data = snap.val();
      if (!data) { syncStatus = "error"; syncRender(); return; }
      syncStatus = "live";
      var normalized = normalizeFirebaseTourney(data);
      var changed = JSON.stringify(normalized) !== JSON.stringify(tourney);
      tourney = normalized;
      localStorage.setItem(TOURNEY_KEY, JSON.stringify(tourney));
      if (changed) syncRender();
    }, function() { syncStatus = "error"; syncRender(); });
  }

  function startSharedTournament(t) {
    if (!initFb()) {
      // Firebase not configured — fall back to local-only
      tourney = t; saveTourney(); ui.tSetup = null; render(); return;
    }
    var code = genCode();
    var payload = JSON.parse(JSON.stringify(t));
    payload._createdAt = firebase.database.ServerValue.TIMESTAMP;
    payload._code = code;
    syncStatus = "connecting";
    fb.ref("tournaments/" + code).set(payload).then(function() {
      syncCode = code; syncRole = "host";
      localStorage.setItem(SYNC_CODE_KEY, code);
      localStorage.setItem(SYNC_ROLE_KEY, "host");
      tourney = t; tourney._code = code;
      localStorage.setItem(TOURNEY_KEY, JSON.stringify(tourney));
      subscribeToTourney(code);
      ui.tSetup = null; render();
    }).catch(function(err) {
      // Write failed — fall back to local-only (no join code)
      syncStatus = "offline";
      tourney = t; saveTourney(); ui.tSetup = null;
      ui.syncError = "Couldn't start shared tournament — Firebase write failed. The tournament is saved locally only.";
      render();
    });
  }

  // Host-only: start a fresh bracket (rematch/redraw). For a synced tournament this
  // overwrites the bracket in place at the same code, so guests follow automatically
  // via their live subscription — sync is never interrupted and the code is unchanged.
  function restartTourney(newT) {
    if (fb && syncCode) {
      newT._code = syncCode;
      tourney = newT;
      saveTourney();   // writes the new bracket to tournaments/<syncCode>; guests pick it up
      ui.syncNotice = "New Tournament Started";
    } else {
      tourney = newT;
      saveTourney();
    }
    render();
  }

  function joinTournament(code, onError) {
    if (!initFb()) { onError("Firebase is not configured on this device."); return; }
    syncStatus = "connecting"; render();
    fb.ref("tournaments/" + code).once("value").then(function(snap) {
      var data = snap.val();
      if (!data) { syncStatus = "offline"; onError("No tournament found with that code."); return; }
      syncCode = code; syncRole = "guest";
      localStorage.setItem(SYNC_CODE_KEY, syncCode);
      localStorage.setItem(SYNC_ROLE_KEY, "guest");
      tourney = normalizeFirebaseTourney(data);
      localStorage.setItem(TOURNEY_KEY, JSON.stringify(tourney));
      subscribeToTourney(syncCode);
      ui.view = "tournament"; ui.tSetup = null; ui.joinSheet = false; ui.joinError = null; render();
    }).catch(function() {
      syncStatus = "offline"; onError("Couldn't connect — check your internet connection.");
    });
  }

  function loadGame() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return normalize(JSON.parse(raw));
    } catch (e) {}
    return freshGame();
  }
  function normalize(g) {
    if (!g || typeof g !== "object") return freshGame();
    if (!Array.isArray(g.teams)) g.teams = ["We", "They"];
    if (!Array.isArray(g.players)) g.players = ["", "", "", ""];
    while (g.players.length < 4) g.players.push("");
    if (typeof g.dealerStart !== "number") g.dealerStart = 0;
    g.target = 50;
    if (!Array.isArray(g.deals)) g.deals = [];
    return g;
  }
  function persist() {
    try {
      if (ui.activeMatch) saveTourney();   // match game lives inside the tournament
      else localStorage.setItem(STORAGE_KEY, JSON.stringify(soloGame));
    }
    catch (e) { ui.storageOk = false; }
    render();
  }

  // ---- Scoring ----
  function dealResult(d) {
    var isSet = d.pts[d.bidTeam] < d.bid;
    var credited = d.pts.slice();
    if (isSet) credited[d.bidTeam] = -d.bid;   // set: subtract the bid (may go negative)
    return [credited[0], credited[1], isSet];
  }
  function isMoonMade(d) {
    return d.bid === POINTS_PER_DEAL && d.pts[d.bidTeam] === POINTS_PER_DEAL;
  }
  // Compute per-deal deltas threading the running total so moon → 50 only when pre-score >= 0.
  function dealDelta(d, preScores) {
    if (isMoonMade(d) && preScores[d.bidTeam] >= 0) {
      // Shoot the moon: bidding team jumps to 50 (credit the difference)
      var delta = [0, 0];
      delta[d.bidTeam] = 50 - preScores[d.bidTeam];
      delta[1 - d.bidTeam] = d.pts[1 - d.bidTeam];  // other team still gets their pts
      return delta;
    }
    var r = dealResult(d);
    return [r[0], r[1]];
  }
  function gameTotals(g) {
    var s = [0, 0];
    g.deals.forEach(function(d) {
      var delta = dealDelta(d, s);
      s[0] += delta[0]; s[1] += delta[1];
    });
    return s;
  }
  function gameWinner(g) {
    var tgt = g.target, s = [0, 0];
    for (var i = 0; i < g.deals.length; i++) {
      var d = g.deals[i];
      var delta = dealDelta(d, s);
      s[0] += delta[0]; s[1] += delta[1];
      // Moon win: score jumped to 50 (>= target)
      if (isMoonMade(d) && s[d.bidTeam] >= tgt) return d.bidTeam;
    }
    if (s[0] < tgt && s[1] < tgt) return null;
    if (s[0] === s[1]) return "tie";
    return s[0] > s[1] ? 0 : 1;
  }
  function totals() { return gameTotals(game); }
  function winner() { return gameWinner(game); }

  // ---- Helpers ----
  function el(tag, props, children) {
    var n = document.createElement(tag);
    if (props) Object.keys(props).forEach(function (k) {
      if (k === "class") n.className = props[k];
      else if (k === "html") n.innerHTML = props[k];
      else if (k.slice(0,2) === "on") n.addEventListener(k.slice(2).toLowerCase(), props[k]);
      else if (k === "style") n.setAttribute("style", props[k]);
      else if (k in n && k !== "list") { try { n[k] = props[k]; } catch(e){ n.setAttribute(k, props[k]); } }
      else n.setAttribute(k, props[k]);
    });
    (children || []).forEach(function (c) {
      if (c == null) return;
      n.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
    });
    return n;
  }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function stepper(value, onChange, min, max, label) {
    var input = el("input", {
      class:"step-val step-input mono", type:"text", inputmode:"numeric", pattern:"[0-9]*",
      value:String(value), "aria-label":label,
      onFocus:function(){ input.select(); },
      onKeydown:function(e){ if (e.key === "Enter") input.blur(); },
      onChange:function(){
        var v = parseInt(input.value, 10);
        onChange(clamp(isNaN(v) ? value : v, min, max));
      }
    });
    return el("div", { class:"stepper" }, [
      el("button", { class:"step", "aria-label":"Decrease "+label, onClick:function(){ onChange(clamp(value-1,min,max)); } }, ["\u2212"]),
      input,
      el("button", { class:"step", "aria-label":"Increase "+label, onClick:function(){ onChange(clamp(value+1,min,max)); } }, ["+"])
    ]);
  }

  // Score cell with a fixed sign slot + centered digits, so single digits sit under the
  // middle of two-digit numbers and a leading "−" never shifts the row.
  function scoreCell(val, setMsg) {
    var props = { class:"score-cell mono" + (setMsg ? " score-set" : "") };
    if (setMsg) {
      props.role = "button"; props.tabindex = "0"; props["aria-label"] = setMsg;
      props.onClick = function(){ ui.info = setMsg; render(); };
    }
    return el("span", props, [
      el("span", { class:"score-sign" }, [val < 0 ? "−" : ""]),
      el("span", { class:"score-digits" }, [String(Math.abs(val))])
    ]);
  }

  // ---- Render ----
  var padEl = document.getElementById("pad");
  var subtitleEl = document.getElementById("subtitle");
  var settingsPanelEl = document.getElementById("settingsPanel");
  var modalRoot = document.getElementById("modalRoot");
  var navEl = document.getElementById("nav");
  var gameViewEl = document.getElementById("gameView");
  var viewRootEl = document.getElementById("viewRoot");

  // ---- Top-level view dispatcher ----
  // True when an interactive bottom sheet / dialog is on screen. A full render
  // tears down and rebuilds the modal DOM (renderModal does modalRoot.innerHTML
  // = ""), so re-rendering while the user is tapping a sheet button (e.g. the
  // "X won" buttons) replaces the node mid-press and the tap is lost. We use
  // this to defer *incoming sync* re-renders until the sheet is closed.
  function sheetOpen() {
    return ui.matchMenu != null || ui.backConfirm || ui.joinSheet ||
           ui.info != null || ui.seatMenu != null;
  }
  // Re-render driven by a remote Firebase update. Skipped while a sheet is open
  // so live updates from other devices never eat the local user's taps; the data
  // (tourney + localStorage) is still updated, and the next local render — which
  // every sheet-close path triggers — shows the fresh state.
  function syncRender() {
    if (sheetOpen()) return;
    render();
  }
  function render() {
    renderNav();
    // point the active game at the right context
    if (ui.view === "tournament" && ui.activeMatch && tourney) {
      var am_m = getActiveMatchObj(ui.activeMatch);
      game = (am_m && (am_m.game || am_m.completedGame)) || soloGame;
    } else {

  function applyScoreWrap() {

      line.classList.remove("stack");
      score.classList.remove("wrapped");

      var teams = score.querySelectorAll(".hs-team");
      if (teams.length >= 2 && teams[1].offsetTop > teams[0].offsetTop) score.classList.add("wrapped");

      if (win) {
        // Compare actual text extents (the team spans), not the flex-grown score box.
        var contentRight = 0;
        for (var t = 0; t < teams.length; t++) contentRight = Math.max(contentRight, teams[t].getBoundingClientRect().right);

  // ================= TOURNAMENT =================
  function formatName(f) {

  }
  function shuffle(a) {
    a = a.slice();
    for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = a[i]; a[i] = a[j]; a[j] = t; }
    return a;
  }
  function drawTeams(names) {

      teams.push({ id: "t" + i + "-" + Math.random().toString(36).slice(2, 7), name: sh[i] + " & " + sh[i + 1], players: [sh[i], sh[i + 1]] });

  }

  function makeSingleElim(teams) {
    var n = teams.length, size = 1;
    while (size < n) size *= 2;

    // byes (< matches, since size is the *next* power of two) each get their own match
    for (var mi = 0; mi < matches; mi++) {
      if (mi < byes) r0.push({ a: ptr++, b: null, winner: null });
      else { var aa = ptr++, bb = ptr++; r0.push({ a: aa, b: bb, winner: null }); }
    }
    var rounds = [r0], count = matches;
    while (count > 1) {
      var rnd = [];
      for (var k = 0; k < count / 2; k++) rnd.push({ a: null, b: null, winner: null });
      rounds.push(rnd); count = count / 2;
    }
    var t = { id: Date.now(), createdAt: new Date().toISOString(), format: "single", teams: teams, rounds: rounds, champion: null };
    t.rounds[0].forEach(function (m, i) { if (m.a != null && m.b == null) setMatchWinner(t, 0, i, m.a); }); // auto-advance byes
    return t;
  }

  function setMatchWinner(t, ri, mi, teamIdx) {
    t.rounds[ri][mi].winner = teamIdx;

      t.champion = teamIdx;

  }

  // ---- Double Elimination ----
  function makeDoubleElim(teams) {
    var n = teams.length, size = 1;
    while (size < n) size *= 2;
    var wbR0count = size / 2, byes = size - n, ptr = 0, r0 = [];
    for (var mi = 0; mi < wbR0count; mi++) {
      if (mi < byes) r0.push({ a: ptr++, b: null, winner: null });
      else { var aa = ptr++, bb = ptr++; r0.push({ a: aa, b: bb, winner: null }); }
    }
    var wbRounds = [r0], count = wbR0count;
    while (count > 1) {
      var rnd = []; for (var k = 0; k < count / 2; k++) rnd.push({ a: null, b: null, winner: null });
      wbRounds.push(rnd); count = count / 2;
    }
    // LB: 2*(wbRounds.length-1) rounds
    var lbRounds = [], wbLen = wbRounds.length;
    if (wbLen >= 2) {
      var lb0 = []; for (var i = 0; i < wbR0count / 2; i++) lb0.push({ a: null, b: null, winner: null });
      lbRounds.push(lb0);
      var prevLBcount = lb0.length;
      for (var wbRi = 1; wbRi < wbLen; wbRi++) {
        var oddRnd = []; for (var j = 0; j < prevLBcount; j++) oddRnd.push({ a: null, b: null, winner: null });
        lbRounds.push(oddRnd); prevLBcount = oddRnd.length;

          var evenRnd = []; for (var j2 = 0; j2 < Math.floor(prevLBcount / 2); j2++) evenRnd.push({ a: null, b: null, winner: null });
          lbRounds.push(evenRnd); prevLBcount = evenRnd.length;

  function wbR0IsBye(t, mi) { var m = t.wBracket.rounds[0][mi]; return !m || m.b == null; }

  // bye-pair"). This is independent of play order: it depends only on the bye layout.
  // Odd LB rounds always receive a real WB drop-down, so they are never dead; even
  // rounds (incl. R0) are dead only when both of their feeders are dead.

        var lbSlot0 = Math.floor(mi / 2);

  // ---- Round Robin ----
  function makeRoundRobin(teams) {

      }
      list = [list[list.length - 1]].concat(list.slice(0, -1));

  function rosterPlayers(t) {                 // flatten all players from the current teams

    t.teams.forEach(function (tm) { (tm.players || []).forEach(function (p) { if (p && p.trim()) names.push(p.trim()); }); });
    return names;
  }
  function makeTourney(format, teams, bestOf) {
    return format === "double" ? makeDoubleElim(teams)
         : format === "round"  ? makeRoundRobin(teams)
         : format === "series" ? makeSeries(teams, bestOf)
         : makeSingleElim(teams);
  }
  function rematchSameTeams() {
    var t = makeTourney(tourney.format, shuffle(tourney.teams), tourney.bestOf);
    ui.activeMatch = null; ui.matchMenu = null; ui.confirmEndT = false;
    restartTourney(t);
  }
  function redrawAndReplay() {
    var teams = drawTeams(rosterPlayers(tourney));
    var t = makeTourney(tourney.format, teams, tourney.bestOf);
    ui.activeMatch = null; ui.matchMenu = null; ui.confirmEndT = false;
    restartTourney(t);
  }

  function startMatchAm(am) {
    var m = getActiveMatchObj(am);
    if (!m.game) {
      var A = tourney.teams[m.a], B = tourney.teams[m.b];
      var g = freshGame();
      g.teams = [A.name, B.name];
      g.players = [A.players[0] || "", B.players[0] || "", A.players[1] || "", B.players[1] || ""];
      m.game = g;
    }
    claimLock(am);
    ui.activeMatch = am;
    ui.matchMenu = null; ui.showEntry = false; ui.entryStep = 1; ui.seatMenu = null;
    saveTourney(); render();
  }

  function matchScoreStr(m) {

    return s[0] + "–" + s[1];

  // Record the winner into whichever bracket/series this match belongs to.
  function routeMatchWinner(am, teamIdx) {
    if (!am.bracket) setMatchWinner(tourney, am.ri, am.mi, teamIdx);
    else if (am.bracket === "wb") setWBWinner(tourney, am.ri, am.mi, teamIdx);
    else if (am.bracket === "lb") setLBWinner(tourney, am.ri, am.mi, teamIdx);
    else if (am.bracket === "gf") setGFWinner(tourney, am.match, teamIdx);
    else if (am.bracket === "rr") { if (am.isFinal) setRRFinalWinner(tourney, teamIdx); else setRRWinner(tourney, am.idx, teamIdx); }
    else if (am.bracket === "series") setSeriesWinner(tourney, am.gi, teamIdx);
  }

  // Log a tournament result whose winner was picked by hand (no full in-app
  // game): no deals or score, just the matchup and who won.
  function archiveManualWin(m, teamIdx) {
    var A = tourney.teams[m.a], B = tourney.teams[m.b];
    var ap = A.players || [], bp = B.players || [];
    var rec = {
      id: Date.now(),
      date: new Date().toISOString(),
      teams: [A.name, B.name],
      players: [ ap[0] || "", bp[0] || "", ap[1] || "", bp[1] || "" ],   // seats 0&2 = A, 1&3 = B
      dealerStart: 0,
      target: (m.game && m.game.target) || 50,
      totals: null,                          // no score — winner was entered manually
      winner: (teamIdx === m.a) ? 0 : 1,     // index into the record's teams array
      deals: [],
      tournament: { format: tourney.format, teams: [A.name, B.name], manual: true }
    };
    gameHistory.unshift(rec);
    saveHistory();
    return rec;
  }

  // Finish a match from the bracket menu (manual "[Team] won"). A game played to
  // a finish is archived just like the in-app "Save Result" path; otherwise the
  // hand-picked winner is still logged as a manual result. Either way, badge the
  // record if this clinched the title.
  function recordManualMatchWin(am, m, teamIdx) {
    var champBefore = tourney.champion;
    var played = m && m.game && m.game.deals.length;
    var complete = played && (gameWinner(m.game) === 0 || gameWinner(m.game) === 1);
    var archived;
    if (complete) {
      var prevGame = game; game = m.game;   // archiveCurrentGame reads the global game pointer
      archiveCurrentGame({ format: tourney.format, teams: [tourney.teams[m.a].name, tourney.teams[m.b].name] });
      game = prevGame;
      m.completedGame = JSON.parse(JSON.stringify(m.game));   // keep the score on the bracket
      archived = gameHistory[0];
    } else {
      archived = archiveManualWin(m, teamIdx);                // no full game — log a manual result
    }
    if (m) m.game = null;
    routeMatchWinner(am, teamIdx);
    if (tourney.champion != null && tourney.champion !== champBefore && archived && archived.tournament) {
      archived.tournament.championship = true;
      saveHistory();
    }
  }

  function recordMatchResult() {
    var am = ui.activeMatch, m = getActiveMatchObj(am);
    var win = gameWinner(m.game);                 // 0 or 1
    var tournTeam = (win === 0) ? m.a : m.b;
    var champBefore = tourney.champion;
    archiveCurrentGame({ format: tourney.format, teams: [tourney.teams[m.a].name, tourney.teams[m.b].name] });
    var justArchived = gameHistory[0];            // archiveCurrentGame unshifts the new record
    releaseLock(am);
    m.completedGame = JSON.parse(JSON.stringify(m.game));
    m.game = null;
    routeMatchWinner(am, tournTeam);
    // If this game crowned the tournament champion, mark its history record.
    if (tourney.champion != null && tourney.champion !== champBefore && justArchived && justArchived.tournament) {
      justArchived.tournament.championship = true;
      saveHistory();
    }
    ui.activeMatch = null; ui.showEntry = false;
    saveTourney(); render();
  }

  // Generic match box for DE / RR
  function renderMBox(t, m, am) {
    var decided = m.winner != null;
    var ready = m.a != null && m.b != null && !decided;
    var scoreGame = (m.game && m.game.deals && m.game.deals.length) ? m.game
                  : (m.completedGame && m.completedGame.deals && m.completedGame.deals.length) ? m.completedGame : null;
    var scores = scoreGame ? gameTotals(scoreGame) : null;
    function slot(idx, si) {
      var label = idx == null ? "TBD" : t.teams[idx].name;
      var isWin = decided && idx != null && m.winner === idx;
      var kids = [el("span", { class:"mbox-slot-name" }, [label])];
      if (scores) kids.push(el("span", { class:"mbox-score" }, [String(scores[si])]));
      return el("div", { class:"mbox-slot" + (isWin ? " win" : "") }, kids);
    }
    var box = el("div", { class:"mbox" + (ready ? " ready" : "") },
      [slot(m.a, 0), slot(m.b, 1)]);
    if (ready || (decided && m.b != null)) {
      var amCopy = { bracket: am.bracket, ri: am.ri, mi: am.mi, idx: am.idx, match: am.match, isFinal: am.isFinal, confirm: null };
      box.addEventListener("click", function() { ui.matchMenu = amCopy; render(); });
    }
    return box;
  }

  function renderDoubleElim() {
    var t = tourney, sections = [];
    // Winners Bracket
    var wbDiv = el("div", { class:"bracket-section" }, [el("div", { class:"bracket-section-head" }, ["Winners Bracket"])]);
    var wbRounds = el("div", { class:"bracket-rounds" });
    t.wBracket.rounds.forEach(function(round, ri) {
      var col = el("div", { class:"bracket-col" }, [el("div", { class:"bracket-col-label" }, ["Round " + (ri + 1)])]);
      round.forEach(function(m, mi) { col.appendChild(renderMBox(t, m, { bracket: "wb", ri: ri, mi: mi })); });
      wbRounds.appendChild(col);
    });
    wbDiv.appendChild(wbRounds); sections.push(wbDiv);

    // Losers Bracket
    if (t.lBracket.rounds.length) {
      var lbDiv = el("div", { class:"bracket-section" }, [el("div", { class:"bracket-section-head lb" }, ["Losers Bracket"])]);
      var lbRounds = el("div", { class:"bracket-rounds" });
      t.lBracket.rounds.forEach(function(round, ri) {
        var col = el("div", { class:"bracket-col" }, [el("div", { class:"bracket-col-label" }, [ri % 2 === 0 ? "Round " + (ri + 1) + " (elim)" : "Round " + (ri + 1)])]);
        round.forEach(function(m, mi) { col.appendChild(renderMBox(t, m, { bracket: "lb", ri: ri, mi: mi })); });
        lbRounds.appendChild(col);
      });
      lbDiv.appendChild(lbRounds); sections.push(lbDiv);
    }

    // Grand Final
    var gfDiv = el("div", { class:"bracket-section" }, [el("div", { class:"bracket-section-head gf" }, ["Grand Final"])]);
    var gfWrap = el("div", { class:"gf-wrap" });
    var m1 = t.grandFinal.m1;
    if (m1.a != null || m1.b != null) {
      gfWrap.appendChild(el("div", { class:"gf-match-label" }, ["Match 1"]));
      gfWrap.appendChild(renderMBox(t, m1, { bracket: "gf", match: 1 }));
    } else {
      gfWrap.appendChild(el("p", { class:"empty disp", style:"padding:10px 0 4px;" }, ["Awaiting finalists"]));
    }
    if (t.grandFinal.m2) {
      gfWrap.appendChild(el("div", { class:"gf-match-label", style:"margin-top:8px;" }, ["Match 2 — Reset"]));
      gfWrap.appendChild(renderMBox(t, t.grandFinal.m2, { bracket: "gf", match: 2 }));
    }
    gfDiv.appendChild(gfWrap); sections.push(gfDiv);
    return sections;
  }

  function renderRoundRobin() {
    var t = tourney, sections = [];
    var standings = rrStandings(t);
    var played = 0; t.schedule.forEach(function(m) { if (m.winner != null) played++; });
    var total = t.schedule.length;
    var finalists = t.final ? [t.final.a, t.final.b] : [];

    // Standings
    var tbl = el("table", { class:"rr-standings" });
    tbl.appendChild(el("tr", {}, [el("th", {}, ["Team"]), el("th", { class:"num" }, ["W"]), el("th", { class:"num" }, ["L"])]));
    standings.forEach(function(s) {
      var isCh = t.champion === s.idx;
      var isFin = !isCh && (finalists.indexOf(s.idx) >= 0);
      tbl.appendChild(el("tr", { class: isCh ? "rr-champ" : isFin ? "rr-finalist" : "" }, [
        el("td", {}, [t.teams[s.idx].name]),
        el("td", { class:"num" }, [String(s.wins)]),
        el("td", { class:"num" }, [String(s.losses)])
      ]));
    });
    sections.push(el("div", { class:"bracket-section" }, [el("div", { class:"bracket-section-head" }, ["Standings"]), tbl]));

    // Schedule
    var schedDiv = el("div", { class:"bracket-section" }, [
      el("div", { class:"bracket-section-head" }, ["Schedule · " + played + " / " + total + " played"])
    ]);
    var schedList = el("div", { class:"rr-schedule" });
    t.schedule.forEach(function(m, idx) {
      var decided = m.winner != null;
      var ready = !decided;
      var resultEl = decided
        ? el("span", { class:"rr-result set" }, [t.teams[m.winner].name + " won"])
        : el("span", { class:"rr-result" }, ["–"]);
      var row = el("div", { class:"rr-row" }, [
        el("span", { class:"rr-teams" }, [t.teams[m.a].name, el("span", { class:"rr-vs" }, [" vs "]), t.teams[m.b].name]),
        resultEl
      ]);
      if (ready || decided) {
        row.style.cursor = "pointer";
        row.addEventListener("click", function() { ui.matchMenu = { bracket: "rr", idx: idx, confirm: null }; render(); });
      }
      schedList.appendChild(row);
    });
    schedDiv.appendChild(schedList);
    sections.push(schedDiv);

    // Championship Final
    if (t.final) {
      var finDiv = el("div", { class:"bracket-section" }, [el("div", { class:"bracket-section-head gf" }, ["Championship Final"])]);
      var finWrap = el("div", { class:"gf-wrap" });
      finWrap.appendChild(renderMBox(t, t.final, { bracket: "rr", isFinal: true }));
      finDiv.appendChild(finWrap); sections.push(finDiv);
    }

    return sections;
  }

  function renderSeries() {
    var t = tourney, sections = [];
    var wins = seriesWins(t), tgt = seriesTarget(t);
    var decided = lastDecidedSeriesGame(t) + 1;

    // Scoreboard
    var scoreWrap = el("div", { class:"series-score" }, [
      el("div", { class:"series-side" }, [
        el("span", { class:"series-team-name" + (t.champion === 0 ? " champ" : "") }, [t.teams[0].name]),
        el("span", { class:"series-wins" + (t.champion === 0 ? " champ" : "") }, [String(wins[0])])
      ]),
      el("div", { class:"series-dash" }, ["–"]),
      el("div", { class:"series-side" }, [
        el("span", { class:"series-wins" + (t.champion === 1 ? " champ" : "") }, [String(wins[1])]),
        el("span", { class:"series-team-name" + (t.champion === 1 ? " champ" : "") }, [t.teams[1].name])
      ])
    ]);
    var sub = t.champion != null
      ? ("Series over · " + decided + " game" + (decided === 1 ? "" : "s") + " played")
      : ("Best of " + t.bestOf + " · first to " + tgt + " game wins");
    var scoreSection = el("div", { class:"bracket-section" }, [
      el("div", { class:"bracket-section-head" }, ["Series"]),
      scoreWrap,
      el("p", { class:"series-sub disp" }, [sub])
    ]);
    // helper: does a game have a live, in-progress scorepad?
    function gameInProgress(g) { return g.winner == null && g.game && g.game.deals && g.game.deals.length > 0; }
    // Tappable hint so everyone (host and guests) can jump straight to the live/next game.
    if (t.champion == null) {
      var ipIdx = -1, nextIdx = -1;
      for (var hi = 0; hi < t.games.length; hi++) {
        if (t.games[hi].winner != null) continue;
        if (gameInProgress(t.games[hi])) { ipIdx = hi; break; }
        if (nextIdx < 0) nextIdx = hi;
      }
      var hintIdx = ipIdx >= 0 ? ipIdx : nextIdx;
      if (hintIdx >= 0) {
        var live = ipIdx >= 0, hIdx = hintIdx;
        scoreSection.appendChild(el("p", { class:"tnext disp", style:"cursor:pointer;",
          onClick:function(){ ui.matchMenu = { bracket: "series", gi: hIdx, confirm: null }; render(); } },
          [ live ? ("Game " + (hIdx + 1) + " in progress — tap to watch") : ("Next up: Game " + (hIdx + 1) + " — tap to play") ]));
      }
    }
    sections.push(scoreSection);

    // Game-by-game list
    var gamesDiv = el("div", { class:"bracket-section" }, [el("div", { class:"bracket-section-head" }, ["Games"])]);
    var list = el("div", { class:"rr-schedule" });
    t.games.forEach(function(g, gi) {
      var gdecided = g.winner != null;
      var inProg = gameInProgress(g);
      var isNext = !gdecided && !inProg && t.champion == null;
      var scoreGame = (g.game && g.game.deals && g.game.deals.length) ? g.game
                    : (g.completedGame && g.completedGame.deals && g.completedGame.deals.length) ? g.completedGame : null;
      var scores = scoreGame ? gameTotals(scoreGame) : null;
      var resultEl;
      if (gdecided) {
        resultEl = el("span", { class:"rr-result set" }, [t.teams[g.winner].name + " won" + (scores ? " " + scores[g.winner] + "–" + scores[1 - g.winner] : "")]);
      } else if (inProg) {
        resultEl = el("span", { class:"rr-result live" }, ["in progress · " + scores[0] + "–" + scores[1]]);
      } else {
        resultEl = el("span", { class:"rr-result" }, [isNext ? "tap to play" : "–"]);
      }
      var row = el("div", { class:"rr-row" + (isNext ? " series-next" : "") + (inProg ? " series-live" : "") }, [
        el("span", { class:"series-game-label mono" }, ["Game " + (gi + 1)]),
        resultEl
      ]);
      row.style.cursor = "pointer";
      row.addEventListener("click", function() { ui.matchMenu = { bracket: "series", gi: gi, confirm: null }; render(); });
      list.appendChild(row);
    });
    gamesDiv.appendChild(list);
    sections.push(gamesDiv);

    return sections;
  }

  function renderBracket() {
    var t = tourney;
    var headTitle = t.format === "series" ? ("Best of " + t.bestOf + " Series") : ("Tournament · " + formatName(t.format));
    var card = el("div", { class:"pad" + (suppressFade ? "" : " fade") }, [ el("div", { class:"view-head disp" }, [headTitle]) ]);

    // Sync error banner — shown when startSharedTournament write failed
    if (ui.syncError) {
      card.appendChild(el("div", { class:"sync-bar disp", style:"background:#fff3f3; border-bottom:1px solid var(--red);" }, [
        el("span", { style:"font-size:13px; color:var(--red); flex:1;" }, [ui.syncError]),
        el("button", { class:"del", style:"flex:none;", onClick:function(){ ui.syncError = null; render(); } }, ["✕"])
      ]));
    }

    // Sync notice — e.g. "tournament restarted, new code" after a rematch/redraw
    if (ui.syncNotice) {
      card.appendChild(el("div", { class:"sync-bar disp", style:"background:#f3fff3; border-bottom:1px solid #52a852;" }, [
        el("span", { style:"font-size:13px; color:#2e7d32; flex:1;" }, [ui.syncNotice]),
        el("button", { class:"del", style:"flex:none;", onClick:function(){ ui.syncNotice = null; render(); } }, ["✕"])
      ]));
    }

    // Sync bar — shows join code and live status when Firebase is active
    if (syncCode) {
      var dotEl = el("span", { class:"sync-dot " + syncStatus });
      var statusTxt = syncStatus === "live" ? "Live" : syncStatus === "connecting" ? "Syncing…" : "Sync lost";
      var codeStr = syncCode;
      var codeBtn = el("button", { class:"join-code", title:"Tap to copy", onClick:function(){
        try {
          navigator.clipboard.writeText(codeStr).then(function(){
            codeBtn.textContent = "Copied!";
            setTimeout(function(){ codeBtn.textContent = codeStr; }, 1500);
          });
        } catch(e) {}
      } }, [codeStr]);
      card.appendChild(el("div", { class:"sync-bar" }, [
        el("span", { class:"sync-pill" }, [dotEl, el("span", { class:"sync-label" }, [statusTxt])]),
        el("span", { class:"join-code-badge" }, [
          el("span", { class:"sync-label disp" }, ["Code: "]),
          codeBtn,
          el("span", { class:"sync-copy-hint" }, [" tap to copy"])
        ])
      ]));
    }

    if (t.champion != null) {
      var champMsg = t.format === "series"
        ? (t.teams[t.champion].name + " win the series " + seriesWins(t)[t.champion] + "–" + seriesWins(t)[1 - t.champion] + "!")
        : ("Champion: " + t.teams[t.champion].name);
      card.appendChild(el("div", { class:"banner disp" }, [champMsg]));
      // In a shared tournament only the host can restart it (it spins up a new synced
      // session); guests follow automatically. Local tournaments: anyone can restart.
      if (!syncCode || syncRole === "host") {
        card.appendChild(el("div", { class:"rematch" }, [
          el("button", { class:"btn btn-new disp", style:"margin-bottom:8px;", onClick:rematchSameTeams }, ["Rematch — same teams"]),
          el("button", { class:"btn btn-add disp", onClick:redrawAndReplay }, ["Redraw teams & play again"])
        ]));
      } else {
        card.appendChild(el("p", { class:"sync-label disp", style:"text-align:center; padding:8px 12px;" }, ["Waiting for the host to start a rematch…"]));
      }
    } else if (t.format === "single") {
      var nx = nextMatch(t);
      if (nx) {
        var nxRi = nx.ri, nxMi = nx.mi;
        card.appendChild(el("p", { class:"tnext disp", style:"cursor:pointer;", onClick:function(){ ui.matchMenu = { ri:nxRi, mi:nxMi, confirm:null }; render(); } }, ["Next up: ", el("b", {}, [t.teams[nx.a].name]), " vs ", el("b", {}, [t.teams[nx.b].name]), " — tap to play"]));
      }
    }
    if (t.format === "single") {
      card.appendChild(renderBracketDiagram(t));
    } else if (t.format === "double") {
      renderDoubleElim().forEach(function(s) { card.appendChild(s); });
    } else if (t.format === "round") {
      renderRoundRobin().forEach(function(s) { card.appendChild(s); });
    } else if (t.format === "series") {
      renderSeries().forEach(function(s) { card.appendChild(s); });
    }

    var isSeries = t.format === "series";
    if (ui.confirmEndT) {
      card.appendChild(el("div", { class:"dealer-confirm fade" }, [
        el("p", { class:"disp", style:"margin:0 0 10px; font-size:14px; color:var(--ink);" }, [isSeries ? "End this series and clear it?" : "End this tournament and clear the bracket?"]),
        el("div", { style:"display:flex; gap:8px;" }, [
          el("button", { class:"btn btn-cancel disp", onClick:function(){ ui.confirmEndT = false; render(); } }, ["Keep it"]),
          el("button", { class:"btn btn-record disp", onClick:function(){ tourney = null; saveTourney(); ui.confirmEndT = false; render(); } }, ["Yes, end it"])
        ])
      ]));
    } else {
      card.appendChild(el("div", { class:"add-wrap" }, [
        el("button", { class:"btn btn-cancel disp", style:"flex:0 0 auto; align-self:center; padding:12px 24px;", onClick:function(){ ui.confirmEndT = true; render(); } }, [isSeries ? "End Series" : "End Tournament"])
      ]));
    }
    viewRootEl.appendChild(card);
    var nw = viewRootEl.querySelector(".bracket-wrap");
    if (nw) nw.scrollLeft = bracketScroll;     // keep scroll position after a pick
    suppressFade = false;
  }

  var SVGNS = "http://www.w3.org/2000/svg";
  function renderBracketDiagram(t) {
    var rounds = t.rounds, rowH = 74, colW = 150, boxW = 130, boxH = 52;
    var n0 = rounds[0].length, totalH = n0 * rowH, width = rounds.length * colW + 16;
    var inner = el("div", { class:"bracket-inner", style:"position:relative; width:" + width + "px; height:" + totalH + "px;" });
    var svg = document.createElementNS(SVGNS, "svg");
    svg.setAttribute("width", width); svg.setAttribute("height", totalH);
    svg.setAttribute("style", "position:absolute; left:0; top:0; pointer-events:none;");
    inner.appendChild(svg);
    function cy(r, m) { return (m + 0.5) * Math.pow(2, r) * rowH; }
    rounds.forEach(function (round, r) {
      round.forEach(function (m, mi) {
        var x = r * colW + 8, y = cy(r, mi) - boxH / 2;
        var box = renderMatchBox(t, r, mi);
        box.setAttribute("style", "position:absolute; left:" + x + "px; top:" + y + "px; width:" + boxW + "px;");
        inner.appendChild(box);
        if (r < rounds.length - 1) {
          var x1 = x + boxW, y1 = cy(r, mi), nx = (r + 1) * colW + 8, ny = cy(r + 1, Math.floor(mi / 2)), midx = (x1 + nx) / 2;
          var path = document.createElementNS(SVGNS, "path");
          path.setAttribute("d", "M" + x1 + " " + y1 + " H" + midx + " V" + ny + " H" + nx);
          path.setAttribute("fill", "none"); path.setAttribute("stroke", "#C9B98F"); path.setAttribute("stroke-width", "1.5");
          svg.appendChild(path);
        }
      });
    });
    return el("div", { class:"bracket-wrap" }, [inner]);
  }

  function renderMatchBox(t, r, mi) {
    var m = t.rounds[r][mi];
    var decided = m.winner != null;
    var ready = (m.a != null && m.b != null && m.winner == null);
    var scoreGame = (m.game && m.game.deals && m.game.deals.length) ? m.game
                  : (m.completedGame && m.completedGame.deals && m.completedGame.deals.length) ? m.completedGame
                  : null;
    var scores = scoreGame ? gameTotals(scoreGame) : null;
    function slot(idx, scoreIdx) {
      var label = idx == null ? (r === 0 ? "(bye)" : "—") : t.teams[idx].name;
      var isWin = decided && idx != null && m.winner === idx;
      var kids = [ el("span", { class:"mbox-slot-name" }, [ label ]) ];
      if (scores) kids.push(el("span", { class:"mbox-score" }, [ String(scores[scoreIdx]) ]));
      return el("div", { class:"mbox-slot" + (isWin ? " win" : "") }, kids);
    }
    var kids = [ slot(m.a, 0), slot(m.b, 1) ];
    var changeable = decided && m.b != null; // decided non-bye: tappable for winner edit
    return el("div", { class:"mbox" + (ready ? " ready" : "") + (changeable ? " changeable" : ""),
      onClick: (ready || changeable) ? function(){ ui.matchMenu = { ri:r, mi:mi, confirm:null }; render(); } : null }, kids);
  }

  document.getElementById("settingsToggle").addEventListener("click", function () {
    ui.confirmReset = !ui.confirmReset;
    ui.showSettings = false;
    render();
  });

  window.addEventListener("resize", function () {
    if (ui.view === "history") applyScoreWrap();
  });

  document.addEventListener("keydown", function (e) {
    if (e.key !== "Escape") return;
    if (ui.info) { ui.info = null; render(); }
    else if (ui.matchMenu) { ui.matchMenu = null; render(); }
    else if (ui.seatMenu !== null) { ui.seatMenu = null; ui.seatMenuMode = "menu"; render(); }
    else if (ui.pendingDealer !== null) { ui.pendingDealer = null; render(); }
  });

  render();
})();
</script>
</body>
</html>

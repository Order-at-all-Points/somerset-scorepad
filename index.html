<meta name="theme-color" content="#371318" id="themeColorMeta" />
<script>
  /* Runs before <style> is parsed so the correct theme is on <html> for the
     very first paint — no flash of the wrong palette. applyTheme() (in the
     main script, loaded later) redoes this same resolution and additionally
     wires up live OS-theme-change listening; this is deliberately a small
     duplicate of that logic since it must run synchronously, this early. */
  (function () {
    var pref = "auto";
    try { pref = localStorage.getItem("somerset:theme-pref") || "auto"; } catch (e) {}
    var dark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    var effective = pref === "auto" ? (dark ? "dark" : "light") : pref;
    document.documentElement.setAttribute("data-theme", effective);
  })();
</script>

<style>
  :root {
    /* Named themes, switched by [data-theme] on <html> (see the early
       inline script and applyTheme() in the main script). Derived tints
       outside this block read the vars via color-mix() rather than hardcoding
       a re-based literal, so a future theme needs no manual re-basing. */
    /* Radius scale: controls 8, cards 12, sheets 16, chips/pills full round. Type scale:
       11 (micro caps) / 13 (secondary) / 15 (body) / 17 (buttons, banners) / 20 (titles)
       / 28 / 34 / 48 (numerals & masthead) — text inputs stay 16px so iOS doesn't zoom on focus. */
    --r-control:8px; --r-card:12px; --r-sheet:16px; --r-pill:999px;
    /* Apple system families (HIG): New York where the app speaks — masthead, team
       names, totals, section titles — SF Pro for everything you operate. Both ship
       on-device, so typography works offline and costs no network request. */
    --font-display: ui-serif, 'New York', 'Iowan Old Style', Georgia, serif;
    --font-text: -apple-system, system-ui, 'Helvetica Neue', sans-serif;
  }
  /* Dark default: Mahogany Parlor — wine baize, warm parchment, antique gold.
     --mast/--mast-soft are text/chrome sitting directly on --felt (masthead,
     New Game button, inactive nav tabs) rather than on the --cream paper —
     here felt is dark, so they alias to the existing light paper/rule tones.
     User-facing chip label "Classic Dark"; hidden from the Display sheet as
     of 2026-07-07 in favor of the "Dark" (aubergine) chip below — may return. */
  [data-theme="dark"] {
    --felt:#4C2026; --felt-deep:#371318; --cream:#F7EDDC; --cream-shade:#EBDEC3;
    --rule:#CBAA82; --ink:#332B25; --ink-soft:#6F6052; --red:#A32C2C; --brass:#A57E28;
    --brass-text:#7C5D1C;
    --control:#FCF5E6;
    --mast:var(--cream); --mast-soft:var(--rule);
    --felt-wash:rgba(255,255,255,.04); --felt-wash-strong:rgba(255,255,255,.09);
  }
  /* Light default: Linen Daylight — felt goes pale for the first time, so text
     that sits on it has to flip dark (--mast/--mast-soft below) instead of
     reusing --cream/--rule, which would go near-invisible on a light ground.
     --brass legitimately becomes green here — Linen Daylight promotes felt's
     green to the accent; --mast-soft is a custom tone, not var(--ink-soft)
     aliased, because --ink-soft only measures ~3.6:1 on this felt (fails AA
     at small sizes) where --mast-soft measures ~4.96:1.
     User-facing chip label "Classic Light"; hidden from the Display sheet as
     of 2026-07-07 in favor of the "Light" (aubergine-light) chip below — may return. */
  [data-theme="light"] {
    --felt:#E8E1CE; --felt-deep:#DCD3BA; --cream:#FDFBF4; --cream-shade:#F0EADA;
    --rule:#B9AC85; --ink:#322F28; --ink-soft:#7C7358; --red:#9B2226; --brass:#2F5D48;
    --brass-text:#27503D;
    --control:#FFFFFF;
    --mast:var(--ink); --mast-soft:#675D4C;
    --felt-wash:rgba(0,0,0,.05); --felt-wash-strong:rgba(0,0,0,.10);
  }
  /* Rocket Fuel: an additional pinnable dark option (not tied to Auto),
     picked alongside Mahogany Parlor in the Display sheet — eggplant baize,
     warm gold instead of antique brass. Same dark-on-felt aliasing as
     [data-theme="dark"] above since felt stays dark here too. Internal
     key/selector stay "aubergine" (describes the palette); user-facing chip
     label was "Rocket Fuel Dark", renamed to plain "Dark" 2026-07-07 once
     Classic Dark was hidden and this became the only visible dark option. */
  [data-theme="aubergine"] {
    --felt:#2E1B3A; --felt-deep:#1A0E22; --cream:#F6EEDC; --cream-shade:#ECE0C2;
    --rule:#C9A24A; --ink:#2C2620; --ink-soft:#6E6152; --red:#A83A4A; --brass:#B98B3A;
    --brass-text:#7C5C24;
    --control:#FCF6E6;
    --mast:var(--cream); --mast-soft:var(--rule);
    --felt-wash:rgba(255,255,255,.04); --felt-wash-strong:rgba(255,255,255,.09);
  }
  /* Rocket Fuel Light: Linen Daylight's background/paper/ink untouched
     (--felt, --cream*, --control, --ink*, --mast*, --felt-wash*). The two
     accent tokens are both reused verbatim from Rocket Fuel dark, swapped
     from the original light-variant pass so the eggplant reads as the
     prominent color: --brass/--brass-text are that theme's --felt/--felt-deep
     (buttons, banner, chip.on — the large surfaces), and --rule takes over
     its gold (borders/dividers — the restrained accent). Internal key
     "aubergine-light" mirrors "aubergine". User-facing chip label was
     "Rocket Fuel Light", renamed to plain "Light" 2026-07-07 once Classic
     Light was hidden and this became the only visible light option. */
  [data-theme="aubergine-light"] {
    --felt:#E8E1CE; --felt-deep:#DCD3BA; --cream:#FDFBF4; --cream-shade:#F0EADA;
    --rule:#C9A24A; --ink:#322F28; --ink-soft:#7C7358; --red:#9B2226; --brass:#2E1B3A;
    --brass-text:#1A0E22;
    --control:#FFFFFF;
    --mast:var(--ink); --mast-soft:#675D4C;
    --felt-wash:rgba(0,0,0,.05); --felt-wash-strong:rgba(0,0,0,.10);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; }
  /* Root background matches the gradient's deep edge (and theme-color) so the iOS
     standalone bottom safe-area never flashes white before the first scroll repaint. */
  html { background: var(--felt-deep); }
  body {
    background: radial-gradient(ellipse at 50% 18%, var(--felt) 0%, var(--felt-deep) 100%);
    background-attachment: fixed;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: var(--font-text);
    color: var(--ink);
    padding: max(20px, env(safe-area-inset-top)) 12px calc(48px + env(safe-area-inset-bottom));
    -webkit-text-size-adjust: 100%;
    -webkit-user-select: none; user-select: none;
    /* Without this, dropping maximum-scale=1 (pinch-zoom fix) reinstates
       Safari's ~300ms tap delay, which can eat taps on low-feedback controls.
       touch-action:manipulation removes that delay while still allowing
       pinch-zoom. iOS Safari still triggers double-tap-to-zoom regardless
       (touch-action can't separate it from pinch-zoom there) — see the
       touchend listener near the top of the main <script> for that. */
    touch-action: manipulation;
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  .mono { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }
  .disp { }   /* legacy marker class — kept in markup; type is assigned per-role (body = SF Pro, display selectors = New York) */

  header { position:relative; text-align:center; margin-bottom:16px; }
  .eyebrow { color:var(--mast-soft); letter-spacing:.35em; font-size:11px; margin:0; text-transform:uppercase; }
  .eyebrow .rule-dash { display:inline-block; width:30px; height:1px; background:currentColor; vertical-align:middle; margin:0 .6em; }
  /* letter-spacing adds a trailing .35em after the final letter; pull the trailing dash back so the gaps before/after the word match */
  .eyebrow .rule-dash:last-child { margin-left:calc(.6em - .35em); }
  h1 { color:var(--mast); font-family:var(--font-display); font-size:34px; margin:2px 0 0; font-weight:600; letter-spacing:.04em; }   /* Large Title; tracking OK — all-caps */
  .subtitle { color:var(--mast-soft); font-family:var(--font-display); font-style:italic; font-size:13px; margin:2px 0 0; }
  .menu-btn { position:absolute; top:0; right:max(0px, env(safe-area-inset-right)); width:44px; height:44px;
    display:flex; align-items:center; justify-content:center; background:none; border:none;
    color:var(--mast-soft); cursor:pointer; padding:0; }
  .menu-btn:active { opacity:.6; }

  /* The dashed outline floats 6px off the pad's edge — a stitched seam on the felt ground. */
  .pad { background:var(--cream); border-radius:var(--r-card); box-shadow:0 1px 2px rgba(0,0,0,.15), 0 12px 32px rgba(0,0,0,.22); overflow:hidden;
    outline:1.5px dashed color-mix(in srgb, var(--cream) 40%, transparent); outline-offset:6px; }
  .fade { animation: fade .35s ease both; }
  @keyframes fade { from { opacity:0; transform:translateY(6px);} to { opacity:1; transform:none;} }
  @media (prefers-reduced-motion: reduce) { .fade { animation:none; } }

  .banner { background:var(--brass-text); color:var(--cream); font-family:var(--font-display); text-align:center; padding:12px; font-size:17px; font-weight:600; }

  .totals { display:grid; grid-template-columns:1fr 1px 1fr; border-bottom:1px solid var(--rule); }
  .team { padding:16px 12px 12px; text-align:center; }
  .divider { background:var(--rule); }
  .team-name { border:none; border-bottom:1px dashed var(--rule); background:transparent; text-align:center;
    font-family:var(--font-display); font-size:17px; font-weight:600; color:var(--ink);
    width:90%; padding:0 0 2px; }
  .team-name:focus { outline:2px solid var(--brass); outline-offset:2px; }
  /* Read-only match names ("A & B") render as a div so long names wrap across
     lines instead of clipping; inline-block keeps it centered like the input. */
  .team-name-ro { display:inline-block; white-space:normal; overflow-wrap:anywhere;
    line-height:1.2; cursor:default; }
  /* When one team's name wraps, both stack the partner onto its own line. */
  .team-name-ro.tn-stack .tn-b { display:block; }
  .score { font-family:var(--font-display); font-variant-numeric:tabular-nums; font-size:48px; font-weight:600; line-height:1.1; margin-top:4px; }   /* overrides .mono (same specificity, later rule) — big totals are display numerals */
  .track { height:6px; background:var(--cream-shade); border-radius:3px; margin:8px 12px 0; overflow:hidden; box-shadow:inset 0 0 0 1px color-mix(in srgb, var(--ink-soft) 15%, transparent); }
  .track > span { display:block; height:100%; border-radius:3px; transition:width .4s ease; }

  .empty { text-align:center; color:var(--ink-soft); padding:20px 16px; margin:0; }
  .deal-row { display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--cream-shade); cursor:pointer; }
  .deal-row.open { border-bottom-color:transparent; }
  /* The no./score/dash/score block is fixed-width (ch-based cells, one glyph dash) —
     wrapping it lets the expanded row measure and reuse that exact width so Trump
     lands centered directly underneath it. See alignDealDetail(). */
  .deal-score-block { display:flex; align-items:center; gap:8px; flex:none; }
  .score-cell { display:inline-flex; align-items:baseline; font-size:17px; font-weight:600; color:var(--ink); }
  .score-sign { width:0.75ch; text-align:right; }
  .score-digits { width:2ch; text-align:center; }
  .score-set { color:var(--red); cursor:pointer; }
  .dash { color:var(--rule); }
  .deal-desc { flex:1; min-width:0; font-size:13px; color:var(--ink-soft); text-align:left; }
  .deal-desc-inner { display:inline-block; }   /* positioned in JS, see alignDealDesc; wraps rather than overlapping the dealer column when it doesn't fit */
  .set-flag { color:var(--red); margin-left:6px; letter-spacing:.08em; font-weight:600; }
  .deal-dealer { flex:none; text-align:right; font-size:13px; color:var(--brass-text); white-space:nowrap; }
  .deal-row.open .deal-dealer { font-weight:600; }
  /* fixed size so the box stays put as it's rotated toward whichever seat is dealing */
  .deal-dealer-arrow { display:inline-block; width:12px; height:12px; vertical-align:-1px; }
  .deal-dealer-arrow svg { display:block; width:100%; height:100%; }
  .deal-detail { display:flex; align-items:center; flex-wrap:wrap; gap:8px 12px; padding:0 12px 8px; border-bottom:1px solid var(--cream-shade); font-size:13px; color:var(--ink-soft); }
  .deal-detail-trump { display:flex; align-items:center; justify-content:center; flex:none; gap:4px; }   /* width set in JS to match .deal-score-block */
  .deal-detail-side { flex:none; text-align:right; }   /* Dealer */
  .deal-bid-line { flex:1 1 auto; text-align:center; }   /* box for digit alignment in JS; see .deal-bid-line-inner */
  .deal-bid-line-inner { display:inline-block; }   /* nudged so its digit lines up under the bid digit above, see alignDealDetail() */
  .deal-bid-line.red { color:var(--red); }
  /* Swipe-to-edit/delete: the sliding foreground is a *separate* element from .deal-row
     (which owns .fade — see the note below) so our drag transform never collides with it. */
  .deal-row-wrap { position:relative; overflow:hidden; }
  .deal-row-fg { position:relative; background:var(--cream); touch-action:pan-y; }
  .swipe-actions { position:absolute; top:0; bottom:0; width:76px; display:flex; }
  .swipe-actions.left { left:0; }
  .swipe-actions.right { right:0; }
  .swipe-action-btn { flex:1; border:none; display:flex; align-items:center; justify-content:center;
    font-family:var(--font-text); font-size:13px; font-weight:600;
    color:var(--cream); cursor:pointer; }
  .swipe-action-btn.edit { background:var(--brass); }
  .swipe-action-btn.delete { background:var(--red); }
  .swipe-action-btn:active { filter:brightness(.92); }
  /* left/right+margin centering (not translateX) — the .fade keyframe ends at transform:none and would wipe a transform */
  .undo-toast { position:fixed; left:0; right:0; margin:0 auto; width:fit-content; bottom:20px; background:var(--ink); color:var(--cream); border-radius:var(--r-card); padding:8px 8px 8px 16px; display:flex; align-items:center; gap:8px; font-size:15px; box-shadow:0 2px 4px rgba(0,0,0,.2), 0 8px 24px rgba(0,0,0,.3); z-index:60; white-space:nowrap; }
  .undo-toast button { background:none; border:none; color:var(--rule); font-size:15px; font-weight:600; cursor:pointer; font-family:var(--font-text); padding:8px 12px; }
  .deal-detail b { font-weight:600; color:var(--brass-text); margin-left:4px; }
  .del { background:none; border:none; color:var(--ink-soft); font-size:17px; cursor:pointer; padding:12px; border-radius:var(--r-control); transition:color .08s, background .08s; line-height:1; }
  .del:active { color:var(--red); background:color-mix(in srgb, var(--red) 10%, transparent); }

  .entry { border-top:2px solid var(--rule); padding:16px 16px 20px; background:var(--cream-shade); }
  .entry h2 { margin:0 0 4px; font-family:var(--font-display); font-weight:600; font-size:17px; color:var(--ink); }
  .phase-label { text-transform:uppercase; letter-spacing:.12em; font-size:11px; font-weight:600; color:var(--brass-text); margin:0 0 12px; }
  .bid-summary { display:block; width:100%; text-align:left; box-sizing:border-box; font-family:var(--font-text); background:var(--cream); border:1px solid var(--rule); border-radius:var(--r-control); padding:8px 12px; font-size:15px; color:var(--ink); margin:0 0 16px; cursor:pointer; }
  .bid-summary .edit-hint { float:right; color:var(--ink-soft); font-size:13px; }
  .row { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .label { color:var(--ink); font-size:15px; }
  .who { display:flex; gap:8px; margin-bottom:12px; }
  .who.grid4 { display:grid; grid-template-columns:1fr 1fr; }
  .who button { flex:1; padding:12px 0; border-radius:var(--r-control); font-size:15px; font-weight:600; cursor:pointer;
    border:1.5px solid var(--rule);
    background:var(--control);
    color:var(--ink-soft); font-family:var(--font-text);
    box-shadow:0 1px 2px rgba(0,0,0,.1);
    transition:transform .08s ease; }
  .who button:active:not(.on) { transform:scale(.96); background:var(--cream-shade); box-shadow:none; }
  .who button.on { border-color:var(--ink);
    background:var(--ink);
    color:var(--cream);
    box-shadow:0 1px 2px rgba(0,0,0,.25); }
  .who button.on:active { transform:scale(.96); box-shadow:none; }

  .stepper { display:flex; align-items:center; gap:8px; }
  .step { width:44px; height:44px; border-radius:var(--r-control); border:1.5px solid var(--rule);
    background:var(--control);
    color:var(--ink); font-size:20px; cursor:pointer; line-height:1;
    box-shadow:0 1px 2px rgba(0,0,0,.1);
    transition:transform .08s ease; }
  .step:active { transform:scale(.88); background:var(--cream-shade); box-shadow:none; }
  .step-val { font-size:20px; font-weight:600; width:48px; text-align:center; }
  .step-input { width:48px; border:1px solid var(--rule); border-radius:var(--r-control); background:var(--cream); color:var(--ink);
    padding:6px 0; -moz-appearance:textfield; }
  .step-input:focus { border-color:var(--brass-text); }

  .chips { display:flex; flex-wrap:wrap; gap:8px; }
  .chip { padding:12px 16px; border-radius:var(--r-pill); font-size:13px; cursor:pointer; border:1px solid var(--rule);
    background:var(--control);
    color:var(--ink-soft); font-family:var(--font-text); font-variant-numeric:tabular-nums;
    box-shadow:0 1px 2px rgba(0,0,0,.1);
    transition:transform .08s ease; }
  .chip:active:not(.on) { transform:scale(.93); background:var(--cream-shade); box-shadow:none; }
  .chip.on { border-color:var(--red);
    background:var(--red);
    color:var(--cream);
    box-shadow:0 1px 2px rgba(0,0,0,.25); }
  .chip.on:active { transform:scale(.93); box-shadow:none; }
  .chip[disabled] { opacity:.45; cursor:default; box-shadow:none; }
  .chip[disabled]:active { transform:none; }
  .chips-fit { flex-wrap:nowrap; gap:4px; }
  .chips-fit .chip { flex:1; padding:12px 4px; text-align:center; font-size:13px; }
  /* Trump recording disabled for now — see recordDeal()/renderEntry() in the script below.
  .chips-trump { flex-wrap:nowrap; gap:4px; }
  .chips-trump .chip { flex:1; padding:9px 0; text-align:center; }
  */

  .check { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--ink-soft); margin-bottom:12px; }
  .warn { color:var(--red); font-size:13px; margin:0 0 8px; }
  .warn.strong { font-size:15px; font-weight:600; }

  .actions { display:flex; gap:8px; margin-top:6px; }
  .btn { font-family:var(--font-text); border-radius:var(--r-control); cursor:pointer; transition:transform .08s ease, box-shadow .08s ease; }
  .btn-cancel { flex:1; padding:12px 0; border:1px solid var(--rule);
    background:var(--control);
    color:var(--ink-soft); font-size:15px;
    box-shadow:0 1px 2px rgba(0,0,0,.1); }
  .btn-cancel:active { transform:scale(.97); background:var(--cream-shade); box-shadow:none; }
  .btn-record { flex:2; padding:12px 0; border:none;
    background:var(--brass);
    color:var(--cream); font-size:17px; font-weight:600;
    box-shadow:0 1px 2px rgba(0,0,0,.25); }
  .btn-record:active { transform:scale(.97); box-shadow:none; }
  .btn-danger { flex:2; padding:12px 0; border:none;
    background:var(--red);
    color:var(--cream); font-size:17px; font-weight:600;
    box-shadow:0 1px 2px rgba(0,0,0,.25); }
  .btn-danger:active { transform:scale(.97); box-shadow:none; }
  .btn-add { width:100%; padding:16px 0; border:none;
    background:var(--ink);
    color:var(--cream); font-size:17px; font-weight:600;
    box-shadow:0 1px 2px rgba(0,0,0,.25); }
  .btn-add:active { transform:scale(.98); box-shadow:none; }
  .btn-add[disabled] { background:var(--cream-shade); color:var(--ink-soft); cursor:default; box-shadow:none; }
  .btn-new { width:100%; padding:16px 0; border:none;
    background:var(--brass);
    color:var(--cream); font-size:17px; font-weight:600;
    box-shadow:0 1px 2px rgba(0,0,0,.25); }
  .btn-new:active { transform:scale(.98); box-shadow:none; }
  .btn-new[disabled], .btn-record[disabled] { background:var(--cream-shade); color:var(--ink-soft); cursor:default; box-shadow:none; }
  .add-wrap { padding:16px 16px 20px; border-top:1px solid var(--cream-shade); display:flex; justify-content:center; }

  .settings-toggle { display:inline-block; border-radius:var(--r-pill); border:1px solid color-mix(in srgb, var(--rule) 50%, transparent);
    background:var(--felt-wash); color:var(--mast-soft); font-size:13px; letter-spacing:.08em; text-transform:uppercase;
    cursor:pointer; font-family:var(--font-text); transition:opacity .08s ease, background .08s ease; padding:8px 20px; }
  .settings-toggle:active { opacity:.6; background:var(--felt-wash-strong); }
  .table-label { text-align:center; color:var(--ink-soft); font-size:13px; margin:12px 0 0; }
  .table-label b { font-weight:600; color:var(--brass-text); }
  .table { position:relative; width:100%; max-width:300px; height:172px; margin:16px auto 16px; }
  .seat { position:absolute; transform:translate(-50%,-50%); width:96px; max-width:42%; text-align:center;
    background:var(--control);
    border:1.5px solid var(--rule); border-radius:var(--r-control); padding:6px 4px; cursor:pointer; overflow:hidden;
    box-shadow:0 1px 2px rgba(0,0,0,.1);
    transition:transform .08s ease; }
  .seat:active { transform:translate(-50%,-50%) scale(.93); box-shadow:none; }
  .seat .pname { font-family:var(--font-text); font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .seat .pteam { font-family:var(--font-text); font-size:11px; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:clip; }   /* 11px = HIG minimum (was 10px) */
  .seat.dealer { border-color:var(--brass-text);
    background:var(--control);
    box-shadow:inset 0 0 0 2px var(--brass), 0 1px 2px rgba(0,0,0,.12); }
  /* A solid filled arrowhead (drawn as an SVG shape, not a font glyph) reads far more
     clearly at a glance than a thin-stroke text arrow — font arrow glyphs render at
     wildly different weights across platforms and are easy to miss on the felt. */
  .deal-arrow { position:absolute; left:50%; top:50%; width:30px; height:30px; color:var(--brass);
    pointer-events:none; transition:transform .45s ease; }
  .deal-arrow svg { display:block; width:100%; height:100%; filter:drop-shadow(0 1px 2px rgba(0,0,0,.35)); }
  .dealer-line { text-align:right; font-size:13px; color:var(--ink-soft); margin:0; }
  .dealer-line b { font-weight:600; color:var(--ink); }
  .entry-head { margin:0 0 12px; }
  .entry-head h2 { margin:0; }
  .dealer-confirm { background:var(--cream-shade); border:1px solid var(--rule); border-radius:var(--r-card); padding:12px; margin:0 12px 12px; }
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center;
    padding:24px max(24px, env(safe-area-inset-left)); z-index:60; }
  .sheet { background:var(--cream); border-radius:var(--r-sheet); width:100%; max-width:320px; padding:20px 16px 12px;
    box-shadow:0 2px 6px rgba(0,0,0,.15), 0 18px 44px rgba(0,0,0,.3); }
  /* Centered modals fade opacity-only: the .fade translateY would make the
     auto-selected name's blue highlight visibly slide as the sheet settles. */
  .sheet.fade { animation:sheet-in .35s ease both; }
  @keyframes sheet-in { from { opacity:0; } to { opacity:1; } }
  /* Phones: anchor dialogs to the bottom (thumb reach) and slide them up. */
  @media (max-width:520px) {
    .overlay { align-items:flex-end; padding:0; }
    .sheet { max-width:none; border-radius:var(--r-sheet) var(--r-sheet) 0 0; padding:20px 16px calc(16px + env(safe-area-inset-bottom));
      box-shadow:0 -2px 6px rgba(0,0,0,.12), 0 -16px 40px rgba(0,0,0,.28); }
    .sheet.fade { animation:sheet-up .3s ease both; }
  }
  @keyframes sheet-up { from { opacity:.4; transform:translateY(40px); } to { opacity:1; transform:none; } }
  @media (prefers-reduced-motion: reduce) { .sheet.fade { animation:none; } }
  .sheet h3 { margin:0; font-family:var(--font-display); font-size:20px; font-weight:600; color:var(--ink); text-align:center; }
  .sheet .sub { text-align:center; color:var(--ink-soft); font-size:13px; margin:2px 0 14px; }
  .sheet-btn { display:block; width:100%; min-height:48px; padding:12px 0; margin-bottom:8px; border-radius:var(--r-control);
    font-size:17px; font-family:var(--font-text); cursor:pointer;
    border:1.5px solid var(--rule);
    background:var(--control);
    color:var(--ink);
    box-shadow:0 1px 2px rgba(0,0,0,.1);
    transition:transform .08s ease, box-shadow .08s ease; }
  .sheet-btn:active:not(.primary):not(.ghost) { transform:scale(.98); background:var(--cream-shade); box-shadow:none; }
  .sheet-btn.primary { border-color:color-mix(in srgb, var(--brass) 80%, black); font-weight:600;
    background:var(--brass);
    color:var(--cream);
    box-shadow:0 1px 2px rgba(0,0,0,.25); }
  .sheet-btn.primary:active { transform:scale(.98); box-shadow:none; }
  .sheet-btn.primary[disabled] { background:var(--cream-shade); color:var(--ink-soft); border-color:var(--rule); cursor:default; box-shadow:none; }
  .sheet-btn.ghost { border:none; background:transparent; color:var(--ink-soft); margin-bottom:0; min-height:40px; box-shadow:none; }
  .sheet-btn.ghost:active { opacity:.6; }
  /* text inputs hold at 16px — the one size off the scale — so iOS doesn't zoom the page on focus */
  .sheet-input { width:100%; padding:12px; box-sizing:border-box; border:1.5px solid var(--rule); border-radius:var(--r-control);
    font-size:16px; font-family:var(--font-text); color:var(--ink); background:#fff; margin-bottom:12px; }
  button:focus-visible, input:focus-visible { outline:2px solid var(--brass); outline-offset:2px; }

  .storage-warn { display:none; background:#fff3f3; border:1px solid var(--red); color:var(--red); border-radius:var(--r-control); font-size:13px; padding:8px 12px; margin:0 0 12px; text-align:center; }

  /* ---- nav + views ---- */
  .nav { display:flex; gap:8px; justify-content:center; margin:0 0 16px; }
  .nav-btn { flex:1; max-width:132px; padding:12px 0; border-radius:var(--r-control); border:1px solid color-mix(in srgb, var(--rule) 50%, transparent);
    background:var(--felt-wash); color:var(--mast-soft); font-family:var(--font-text);
    font-size:15px; cursor:pointer;
    transition:opacity .08s ease; }
  .nav-btn:active:not(.on) { opacity:.6; }
  .nav-btn.on { background:var(--cream); color:var(--ink); border-color:var(--cream); font-weight:600;
    box-shadow:0 1px 3px rgba(0,0,0,.18); }
  /* View titles print on the pad itself — serif ink over a double brass rule — rather
     than sitting in a filled bar; the filled treatment is reserved for .banner moments. */
  .view-head { background:var(--cream); color:var(--ink); font-family:var(--font-display); text-align:center; padding:16px 12px 12px; font-size:20px; font-weight:600; border-bottom:3px double var(--brass); }

  .seg-toggle { display:flex; gap:4px; margin:10px 12px 2px; padding:3px; background:var(--cream-shade); border-radius:var(--r-control); }
  .seg-btn { flex:1; padding:8px 0; border:none; border-radius:calc(var(--r-control) - 3px); background:none;
    font-family:var(--font-text); font-size:14px; font-weight:600; color:var(--ink-soft); cursor:pointer; }
  .seg-btn.on { background:var(--cream); color:var(--ink); box-shadow:0 1px 3px rgba(0,0,0,.18); }
  .seg-btn:active:not(.on) { opacity:.6; }

  /* ---- history ---- */
  .hist-date-group { border-bottom:1px solid var(--rule); }
  .hist-date-head { display:flex; flex-direction:column; gap:2px; padding:12px; cursor:pointer; background:var(--cream); }
  .hist-date-title { font-size:15px; font-weight:600; color:var(--brass-text); }
  .hist-head-row { display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .hist-date-sum { font-size:13px; color:var(--ink-soft); margin-left:24px; }
  .hist-t-group { border-top:1px solid var(--cream-shade); }
  .hist-t-head { display:flex; flex-direction:column; gap:2px; padding:8px 12px 8px 24px; cursor:pointer; }
  .hist-t-title { font-size:13px; font-weight:600; color:var(--brass-text); }
  .hist-t-sum { font-size:13px; color:var(--ink-soft); margin-left:14px; }
  .hist-entry { border-bottom:1px solid var(--rule); }
  .hist-item { padding:12px; cursor:pointer; background:var(--cream-shade); }
  .hist-line { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .hist-line.stack { flex-direction:column; align-items:stretch; gap:2px; }
  .hist-score { font-size:15px; font-weight:600; color:var(--ink); display:inline-grid; grid-template-columns:auto auto; column-gap:8px; row-gap:2px; min-width:0; max-width:100%; flex:0 1 auto; }
  .hs-row { display:contents; }
  .hs-name { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-align:right; }
  .hs-score { text-align:right; white-space:nowrap; }
  .hist-win { font-size:13px; color:var(--brass-text); font-weight:600; white-space:nowrap; flex:0 0 auto; }
  .hist-line.stack .hist-win { text-align:right; white-space:normal; }
  .hist-meta { font-size:13px; color:var(--ink-soft); margin-top:3px; }
  .hist-detail { padding:8px 12px 16px; background:var(--cream-shade); }
  .hist-roster { font-size:13px; color:var(--ink); margin:0 0 6px; }
  .hist-hand { display:grid; grid-template-columns:26px 28px 8px 28px 1fr auto; gap:8px; align-items:center; padding:4px 0; font-size:13px; border-top:1px solid rgba(0,0,0,.07); }
  .hist-hand .hh-sc { text-align:center; font-weight:600; color:var(--ink); }
  .hist-hand .hh-sc.red { color:var(--red); }
  .hist-hand .hh-bid { color:var(--ink-soft); }
  .hh-bid-inner { display:inline-block; }   /* positioned in JS, see alignDealBidColumn; wraps rather than overlapping the dealer column when it doesn't fit */
  .hh-bidder { display:inline-block; text-align:right; }   /* padded to the widest name in the table in JS, see alignDealBidColumn; wraps rather than overflowing if a name is too long to fit */
  .hist-hand .hh-dlr { font-size:11px; color:var(--brass-text); white-space:nowrap; }
  .hist-del { margin-top:12px; }
  .link-btn { background:none; border:none; color:var(--ink-soft); font-size:13px; font-weight:600; cursor:pointer; font-family:var(--font-text); padding:12px 8px; margin:-8px 0; }
  .link-btn:active { color:var(--ink); }
  .link-btn.danger { color:var(--red); }

  /* ---- tournament setup ---- */
  .tplayers { padding:12px 12px 0; }
  .trow { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .tnum { width:20px; color:var(--ink-soft); font-size:13px; text-align:right; flex:none; }
  .tinput { flex:1; padding:8px 12px; border:1px solid var(--rule); border-radius:var(--r-control); font-size:16px; font-family:var(--font-text); color:var(--ink); background:#fff; }
  .trow-add { padding:2px 12px 8px; }
  .tvalid { padding:0 12px; font-size:13px; color:var(--red); margin:4px 0; }
  .tvalid.ok { color:var(--ink-soft); }
  .chip.soon { opacity:.45; }
  .tcount-q { text-align:center; font-size:17px; color:var(--ink); margin:16px 0 12px; }
  .count-stepper { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:12px; }
  .count-val { font-size:34px; font-weight:600; min-width:64px; text-align:center; color:var(--ink); }
  .draw-list { padding:8px 12px 4px; }
  .draw-team { font-size:15px; color:var(--ink); padding:4px 0; }
  .back-btn { display:inline-flex; align-items:center; gap:4px; background:none; border:none; padding:8px; cursor:pointer; color:var(--ink-soft); font-family:var(--font-text); font-size:15px; }
  .back-btn .chev { font-size:20px; line-height:0.8; font-weight:600; }
  .back-btn:active { color:var(--ink); }
  .quick-add { padding:6px 12px 2px; }
  .quick-add .chip.del-chip { border-color:var(--red); color:var(--red); }
  .rematch { padding:12px 12px 4px; }

  /* ---- bracket ---- */
  .tnext { text-align:center; font-size:15px; color:var(--ink); margin:12px; }
  .bracket-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; padding:12px 8px 16px; }
  .mbox { border:1px solid var(--rule); border-radius:var(--r-control); overflow:hidden; background:var(--cream); box-shadow:0 1px 3px rgba(0,0,0,.14); }
  .mbox-slot { display:flex; justify-content:space-between; align-items:center; padding:8px; font-size:13px; color:var(--ink); border-bottom:1px solid var(--cream-shade); }
  .mbox-slot:last-child { border-bottom:none; }
  .mbox-slot.win { background:var(--brass); color:var(--cream); font-weight:600; }
  .mbox-slot.pick { cursor:pointer; }
  .mbox-slot.pick:active { background:var(--cream-shade); }
  .mbox-slot-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .mbox-slot-name.bye { font-style:italic; color:var(--ink-soft); font-size:11px; }
  .mbox-score { font-size:11px; font-family:ui-monospace, 'SF Mono', Menlo, Consolas, monospace; flex-shrink:0; margin-left:6px; color:var(--brass-text); }
  .mbox-slot.win .mbox-score { color:var(--cream); }
  .mbox.ready { cursor:pointer; }
  .mbox.ready:active { background:var(--cream-shade); }
  .mbox.changeable { cursor:pointer; }

        el("span", { style:"width:"+Math.min(100,(Math.max(0,t[i])/game.target)*100)+"%; background:"+(i===0?"var(--brass)":"var(--ink-soft)")+";" })
      ]);

    });
    totalsGrid.appendChild(el("div", { class:"divider", style:"grid-column:2;" }));
    pad.appendChild(totalsGrid);

    // Dealer table
    pad.appendChild(renderTable());

    // Deal history
    var history = el("div", { style:"padding:4px 0;" });
    // Refs for the currently-open row's Trump/digit alignment (see alignDealDetail),
    // and every row's "<name> bid X" line (see alignDealDesc); reset each render
    // since a torn-down row's nodes would otherwise linger stale.
    target.__dealAlign = null;
    target.__dealBidRows = [];

    // stale reference to it rather than let the global pointerdown listener above
    // try to close a detached row.
    swipeCoord.current = null;
    swipeCoord.wrapEl = null;
    if (game.deals.length > 0) {
      var runningScore = [0, 0];
      game.deals.forEach(function (d, idx) {
        var r = dealResult(d), isSet = r[2];
        var delta = dealDelta(d, runningScore);

        // Older deals recorded before bidder tracking existed have no bidderSeat,
        // so they fall back to naming the team instead of a specific player.

        // bidNumEl is null for a moon bid ("shot the moon" has no digit to show).

        // near-identical strokes at 13px. The shared SVG shape stays legible at that size where a

        ]);

        var descEl = el("span", { class:"deal-desc disp" }, [innerEl]);

          var takenPts = d.pts[d.bidTeam];

          // var trumpEl = el("span", { class:"deal-detail-trump" }, ["Trump:", el("b", {}, [trumpVal])]);

          history.appendChild(el("div", { class:"deal-detail disp" + (noFade ? "" : " fade") }, [
            trumpEl,
            bidLineEl,
            dealerNameEl

          target.__dealAlign = {
            scoreBlockEl:scoreBlockEl, trumpEl:trumpEl, dealerLabelEl:dealerLabelEl, dealerNameEl:dealerNameEl,
            bidNumEl:bidNumEl, takenNumEl:takenNumEl, bidLineEl:bidLineEl, bidLineInnerEl:bidLineInnerEl

        }

    pad.appendChild(history);

    // Entry or Add button
    var gameOver = (win === 0 || win === 1);
    // Hide the bottom "New Game" text link once the main button becomes "New Game",
    // and hide it before the first deal too — there's nothing yet for it to reset.
    if (!isMatch) settingsToggleEl.style.display = (gameOver || !game.deals.length) ? "none" : "";
    if (isReadOnly) {

        ? ("Match complete \u2014 " + (win === "tie" ? "Tied" : (game.teams[win] + " won")))

    target.__teamNameEls = teamNameEls;
    target.__dealTableEl = pad.querySelector(".table");
    if (target.isConnected) equalizeTeamNames(teamNameEls);

  // The expanded deal row's Trump block is positioned by measuring the already-
  // rendered collapsed row (same pattern as equalizeTeamNames above) — widths built
  // from ch units + a bare glyph aren't reliably reproducible with a second,
  // independent CSS declaration, so we copy the real rendered pixels instead.
  function alignDealDetail(a) {
    if (!a) return;
    a.trumpEl.style.width = a.scoreBlockEl.getBoundingClientRect().width + "px";
    // The dealer's name is right-aligned like the "Dealer" label above it, but for
    // short names a right-edge match leaves it floating under the arrow instead of
    // under the word "Dealer". Nudge it left to line up under the "D" — but never
    // right, since a name wider than "Dealer ↓" already reaches that edge and
    // pushing it further would run it off the card.
    a.dealerNameEl.style.transform = "";
    var nameDelta = Math.min(0, a.dealerLabelEl.getBoundingClientRect().left - a.dealerNameEl.getBoundingClientRect().left);
    a.dealerNameEl.style.transform = "translateX(" + nameDelta + "px)";
    // Nudge the "took" line's digit to line up under the "bid" digit in the collapsed
    // row above (skipped for a moon bid — bidNumEl is null, nothing to align to), so
    // at a glance the bid and the take read as one column. Runs after alignDealDesc
    // (see call site below) so bidNumEl's rect already reflects its final position.
    // Clamped like alignDealDesc's per-row shift, so a big required nudge (e.g. a long
    // bidder name pushing the bid digit far right) never spills the "took" text into
    // the Trump spacer or the dealer's name.
    a.bidLineInnerEl.style.transform = "";
    if (a.bidNumEl) {
      var boxRect = a.bidLineEl.getBoundingClientRect();
      var innerRect = a.bidLineInnerEl.getBoundingClientRect();
      var curLeft = innerRect.left - boxRect.left;
      var delta = a.bidNumEl.getBoundingClientRect().left - a.takenNumEl.getBoundingClientRect().left;
      var minDelta = -curLeft, maxDelta = boxRect.width - innerRect.width - curLeft;
      if (delta < minDelta) delta = minDelta;
      if (delta > maxDelta) delta = maxDelta;
      a.bidLineInnerEl.style.transform = "translateX(" + delta + "px)";
    }
  }

  // Each collapsed row's full "<name> bid <n>" (or "shot the MOON") text is nudged
  // so its own center lands on the seating diagram's center (the ".table" element
  // above the history) — every row centers independently against that fixed external
  // reference rather than sharing a column with other rows, so a long name or a
  // "shot the MOON" suffix on one row can never throw off another row's position.
  // The shift is still clamped so it never pushes a row's own content past its own
  // box edges into the score or dealer columns — better to leave it off-center than
  // spill. Rows are { innerEl, descEl }: innerEl wraps the row's full text, descEl is
  // the available space between the score and dealer columns.
  function alignDealDesc(rows, tableEl) {
    if (!rows || !rows.length || !tableEl) return;
    var tableRect = tableEl.getBoundingClientRect();
    var tableCenter = tableRect.left + tableRect.width / 2;
    var i;
    for (i = 0; i < rows.length; i++) rows[i].innerEl.style.transform = "";
    for (i = 0; i < rows.length; i++) {
      var boxRect = rows[i].descEl.getBoundingClientRect();
      var innerRect = rows[i].innerEl.getBoundingClientRect();
      var curLeft = innerRect.left - boxRect.left;
      var delta = tableCenter - (innerRect.left + innerRect.width / 2);
      var minDelta = -curLeft, maxDelta = boxRect.width - innerRect.width - curLeft;
      delta = (maxDelta >= minDelta) ? Math.max(minDelta, Math.min(maxDelta, delta)) : 0;
      rows[i].innerEl.style.transform = "translateX(" + delta + "px)";
    }
  }

  // Column-aligns "bid" down the archived History detail's hand table. Each row is
  // { nameEl, innerEl, descEl }: nameEl is the bidder's name, innerEl wraps the row's
  // full "<name> bid <n>" text, and descEl is the available space between the score
  // and dealer columns. First, every nameEl is padded to the widest name in the list
  // (and right-aligned via CSS), so there's always exactly one space before "bid"
  // regardless of name length — capped to the row's own available width, so a name
  // too long to fit wraps onto a second line instead of forcing every row to
  // overflow. Then the row with that longest name is used as a baseline: its innerEl
  // is centered within its own descEl, and every other row's innerEl is shifted by
  // that same pixel amount — not re-centered individually — so "bid" stays lined up
  // beneath the baseline row's regardless of how wide the trailing bid number or
  // moon/set suffix is. The shift is clamped per row (not just for the baseline) so
  // a row whose own content is wider than the baseline's — e.g. a "shot the MOON"
  // suffix — never gets pushed past its own box edges into the dealer column; better
  // to leave it off-center than spill. There's no seating diagram in the archived
  // view to center against (see alignDealDesc for the live deal history), so this
  // column-alignment scheme is kept here on its own.
  function alignDealBidColumn(rows) {
    if (!rows || !rows.length) return;
    var i, ref = null, maxNameWidth = 0;
    for (i = 0; i < rows.length; i++) {
      rows[i].nameEl.style.minWidth = "";
      rows[i].innerEl.style.transform = "";
    }
    for (i = 0; i < rows.length; i++) {
      var w = rows[i].nameEl.getBoundingClientRect().width;
      if (w > maxNameWidth) { maxNameWidth = w; ref = rows[i]; }
    }
    if (!ref) return;
    maxNameWidth = Math.min(maxNameWidth, ref.descEl.getBoundingClientRect().width);
    for (i = 0; i < rows.length; i++) rows[i].nameEl.style.minWidth = maxNameWidth + "px";
    var boxRect = ref.descEl.getBoundingClientRect();
    var innerRect = ref.innerEl.getBoundingClientRect();
    var curLeft = innerRect.left - boxRect.left;
    var delta = (boxRect.width - innerRect.width) / 2 - curLeft;
    var minDelta = -curLeft, maxDelta = boxRect.width - innerRect.width - curLeft;
    delta = (maxDelta >= minDelta) ? Math.max(minDelta, Math.min(maxDelta, delta)) : 0;
    for (i = 0; i < rows.length; i++) {
      var rowDelta = delta;
      if (rows[i] !== ref) {
        var rBoxRect = rows[i].descEl.getBoundingClientRect();
        var rInnerRect = rows[i].innerEl.getBoundingClientRect();
        var rCurLeft = rInnerRect.left - rBoxRect.left;
        var rMinDelta = -rCurLeft, rMaxDelta = rBoxRect.width - rInnerRect.width - rCurLeft;
        rowDelta = (rMaxDelta >= rMinDelta) ? Math.max(rMinDelta, Math.min(rMaxDelta, delta)) : 0;
      }
      rows[i].innerEl.style.transform = "translateX(" + rowDelta + "px)";
    }
  }

  // If one match name wraps to two lines, stack the other team's partner onto
  // its own line too (so the two teams look balanced) and reserve matching
  // height, keeping the scores below vertically aligned.
  function equalizeTeamNames(els) {
    if (!els || els.length !== 2) return;
    els.forEach(function (e) { e.style.minHeight = ""; e.classList.remove("tn-stack"); });
    // If the names rendered at different heights, one wrapped — force both to stack.
    if (els[0].offsetHeight !== els[1].offsetHeight) {
      els.forEach(function (e) { e.classList.add("tn-stack"); });
    }
    var h = Math.max(els[0].offsetHeight, els[1].offsetHeight);
    els.forEach(function (e) { e.style.minHeight = h + "px"; });
  }

  function closeSeatMenu() { ui.seatMenu = null; ui.seatMenuMode = "menu"; ui.editNames = false; render(); }

  // Keep them (and the shared tourney.teams roster, so the bracket/standings agree)
  // in sync whenever a seat's player changes.
  function syncMatchTeamNames() {
    if (!ui.activeMatch || !tourney) return;
    var m = getActiveMatchObj(ui.activeMatch);
    if (!m) return;
    var nameA = seatName(0) + " & " + seatName(2), nameB = seatName(1) + " & " + seatName(3);
    game.teams[0] = nameA; game.teams[1] = nameB;
    var A = tourney.teams[m.a], B = tourney.teams[m.b];
    if (A) { A.name = nameA; A.players = [game.players[0], game.players[2]]; }
    if (B) { B.name = nameB; B.players = [game.players[1], game.players[3]]; }
  }

  function swapSeats(i, j) {
    var tmp = game.players[i]; game.players[i] = game.players[j]; game.players[j] = tmp;
    syncMatchTeamNames();
    ui.seatMenu = null; ui.seatMenuMode = "menu";

  function chooseDealerFromMenu(i) {

          [["auto","Auto"],["light","Classic Light",true],["dark","Classic Dark",true],["aubergine","Dark"],["aubergine-light","Light"]]

      ]);

        onClick:function(e){ e.stopPropagation(); } }, [

        el("button", { class:"sheet-btn primary disp", onClick:function(){ ui.info = null; render(); } }, ["Got it"])
      ]);

    }
    if (ui.matchMenu) {
      var mm = ui.matchMenu, mt = getActiveMatchObj(mm);

      var hasGame = mt.game && mt.game.deals.length;
      var mkids;
      if (mt.winner != null) {
        var curWinner = mt.winner, otherIdx = (mt.winner === mt.a) ? mt.b : mt.a;
        var curName = tourney.teams[curWinner].name, otherName = tourney.teams[otherIdx].name;
        var canClear = false;
        if (!mm.bracket) canClear = canEditWinner(tourney, mm.ri, mm.mi);
        else if (mm.bracket === "wb") canClear = canClearWBWinner(tourney, mm.ri, mm.mi);

    var otherPts = POINTS_PER_DEAL - ui.bidderPts;
    var willBeSet = ui.bidderPts < ui.bid;
    var moonBid = ui.bid === POINTS_PER_DEAL;

    // Trump recording disabled for now.
    // var trumpTxt = ui.trump ? (" \u00b7 " + ((ui.trump === "No trump" || ui.trump === "0") ? "no trump" : ("trump " + ui.trump))) : "";
    var trumpTxt = "";

    var kids = header.concat([
      el("p", { class:"phase-label disp" }, ["Step 2 \u00b7 after the hand"]),
      el("button", { class:"bid-summary disp", "aria-label":"Edit the bid",
        onClick:function(){ ui.entryStep = 1; render(); } }, [

      ]),
    ]);
    kids.push(el("div", { class:"row", style:"margin-bottom:4px;" }, [ el("span", { class:"label disp" }, [game.teams[ui.bidTeam]+" took"]), stepper(ui.bidderPts, function(v){ ui.bidderPts = clamp(v, 0, POINTS_PER_DEAL); softRender(); }, 0, POINTS_PER_DEAL, "points taken") ]));
    if (!moonBid) {
      kids.push(el("div", { class:"row", style:"margin-bottom:8px;" }, [ el("span", { class:"label disp" }, [game.teams[1-ui.bidTeam]+" took"]),

          el("span", { class:"step-val mono", "aria-label":game.teams[1-ui.bidTeam]+" took "+otherPts }, [String(otherPts)]),

        ]) ]));

      ]));
    } else if (moonBid && ui.bidderPts === POINTS_PER_DEAL) {

  // ---- deal removal with undo (no confirm dialogs in the core loop) ----
  var undoToastEl = null, undoTimer = null;
  function dismissUndoToast() {
    if (undoTimer) { clearTimeout(undoTimer); undoTimer = null; }
    if (undoToastEl && undoToastEl.parentNode) undoToastEl.parentNode.removeChild(undoToastEl);
    undoToastEl = null;
  }
  function showUndoToast(msg, onUndo) {
    dismissUndoToast();
    undoToastEl = el("div", { class:"undo-toast fade disp", role:"status" }, [
      el("span", {}, [msg]),
      el("button", { onClick:function(){ dismissUndoToast(); onUndo(); } }, ["Undo"])
    ]);
    document.body.appendChild(undoToastEl);
    undoTimer = setTimeout(dismissUndoToast, 6000);
  }
  function removeDealWithUndo(d, idx) {
    var snapGame = game, snapArchivedId = game.archivedId, snapRec = null;
    if (game.archivedId) {
      for (var i = 0; i < gameHistory.length; i++) {
        if (gameHistory[i].id === game.archivedId) { snapRec = gameHistory[i]; break; }
      }
      // Deleting a deal after auto-archiving can change or undo the result,
      // so drop the now-stale entry; it'll re-archive if the game reaches a win again.
      gameHistory = gameHistory.filter(function(h){ return h.id !== game.archivedId; });
      saveHistory();
      game.archivedId = null;
    }
    game.deals = game.deals.filter(function(x){ return x.id !== d.id; });
    ui.openDeal = null;
    persist();
    showUndoToast("Deal " + (idx + 1) + " removed", function(){
      if (snapGame !== game) return;   // a different game is active now; nothing sane to restore into
      snapGame.deals.splice(Math.min(idx, snapGame.deals.length), 0, d);
      if (snapRec) {
        gameHistory.unshift(snapRec);
        gameHistory.sort(function(a,b){ return new Date(b.date) - new Date(a.date); });
        saveHistory();
        snapGame.archivedId = snapArchivedId;
      }
      persist();
    });
  }

  // Prefills the entry form from an existing deal and opens it in edit mode;
  // recordDeal() below checks ui.editingDeal to update that deal in place
  // instead of pushing a new one.
  function startEditDeal(d) {
    ui.editingDeal = d.id;
    ui.bidTeam = d.bidTeam;
    ui.bidderSeat = allPlayersNamed() ? ((d.bidderSeat != null) ? d.bidderSeat : d.bidTeam) : null;
    ui.bid = d.bid;
    // ui.trump = d.trump || "";   // trump recording disabled for now
    ui.bidderPts = d.pts[d.bidTeam];
    ui.showEntry = true;
    ui.entryStep = 1;
    ui.openDeal = null;
    render();
    scrollEntryIntoView();
  }

  function recordDeal() {
    var otherPts = POINTS_PER_DEAL - ui.bidderPts;
    var pts = ui.bidTeam === 0 ? [ui.bidderPts, otherPts] : [otherPts, ui.bidderPts];
    if (ui.editingDeal != null) {
      var editing = null;
      for (var i = 0; i < game.deals.length; i++) {
        if (game.deals[i].id === ui.editingDeal) { editing = game.deals[i]; break; }
      }
      if (editing) {
        // Editing can change or undo an already-archived result just like deleting
        // a deal does (see removeDealWithUndo) — drop the stale entry; it'll
        // re-archive below if the edit still leaves the game won.
        if (game.archivedId) {
          gameHistory = gameHistory.filter(function(h){ return h.id !== game.archivedId; });
          saveHistory();
          game.archivedId = null;
        }
        editing.bidTeam = ui.bidTeam; editing.bid = ui.bid; editing.bidderSeat = ui.bidderSeat; /* editing.trump = ui.trump.trim(); */ editing.pts = pts;
      }
      ui.editingDeal = null;
    } else {
      game.deals.push({ id:Date.now(), bidTeam:ui.bidTeam, bid:ui.bid, bidderSeat:ui.bidderSeat, /* trump:ui.trump.trim(), */ pts:pts, dealer:dealerSeat() });
    }
    game.pendingBid = null;
    // reset form, alternate default bidder
    ui.bidTeam = ui.bidTeam === 0 ? 1 : 0;
    ui.bidderSeat = null;
    ui.bid = 6; /* ui.trump = ""; */ ui.bidderPts = 6;
    ui.showEntry = false; ui.entryStep = 1;
    // Games archive themselves the moment they're won, so a result is never
    // lost to history just because nobody tapped a button. Tournament matches
    // still need an explicit "Return to Bracket" tap before the bracket itself
    // advances (see returnToBracket) — only the History record is automatic here.
    if (!game.archivedId) {
      var win = winner();
      if (win === 0 || win === 1) {
        if (ui.activeMatch) {
          var am = ui.activeMatch, m = getActiveMatchObj(am);
          game.archivedId = archiveCurrentGame({ format: tourney.format, teams: [tourney.teams[m.a].name, tourney.teams[m.b].name], id: tourney.id, bestOf: tourney.bestOf }) || null;
        } else {
          var seriesMeta = ui.series ? { format:"series", teams: game.teams.slice(), id: ui.series.id, bestOf: ui.series.bestOf } : null;
          game.archivedId = archiveCurrentGame(seriesMeta) || null;
          handleGameCompleteForSeries(win);
        }
      }
    }
    persist();
  }

  function archiveCurrentGame(meta) {
    if (!game.deals.length) return;
    var win = winner();
    if (win === null) return;   // only archive completed games
    var id = Date.now();
    gameHistory.unshift({
      id: id,
      date: new Date().toISOString(),
      teams: game.teams.slice(),
      players: game.players.slice(),
      dealerStart: game.dealerStart,
      target: game.target,
      totals: totals(),
      winner: win,                 // 0, 1, or "tie"
      deals: JSON.parse(JSON.stringify(game.deals)),
      tournament: meta || null
    });
    saveHistory();
    return id;
  }

  function newGame(keepSeries) {
    dismissUndoToast();   // pending deal-undo would restore into the old game object
    if (!soloGame.archivedId) {   // safety net — normally already auto-archived on completion
      archiveCurrentGame(ui.series ? { format:"series", teams: soloGame.teams.slice(), id: ui.series.id, bestOf: ui.series.bestOf } : null);
    }
    var keep = { teams:soloGame.teams.slice(), players:soloGame.players.slice(), dealerStart:soloGame.dealerStart, target:soloGame.target };
    soloGame = freshGame();
    soloGame.teams = keep.teams; soloGame.players = keep.players; soloGame.dealerStart = keep.dealerStart; soloGame.target = keep.target;
    game = soloGame;
    ui.confirmReset = false; ui.showSettings = false; ui.showEntry = false; ui.entryStep = 1;
    if (!keepSeries) { ui.series = null; ui.offerSeries = null; ui.seriesResult = null; }
    persist();
  }

  // Best-of-N follow-up for casual (non-tournament) games: offer a series once a
  // standalone game is won, track wins across the games the player then chooses
  // to play, and escalate best-of-3 -> best-of-5 (but no further) on completion.
  function handleGameCompleteForSeries(win) {
    if (ui.series) {
      ui.series.wins[win]++;
      var target = Math.floor(ui.series.bestOf / 2) + 1;
      if (ui.series.wins[win] >= target) {
        var finished = ui.series;
        ui.seriesResult = { bestOf:finished.bestOf, winnerIdx:win, wins:finished.wins.slice() };
        ui.series = null;
        // Carry the series id and wins-so-far forward on escalation so the best-of-5
        // games join the same history group as the best-of-3 games that preceded
        // them, and the win count picks up where the best-of-3 left off rather than
        // restarting at 0-0.
        ui.offerSeries = (finished.bestOf === 3) ? { bestOf:5, id:finished.id, wins:finished.wins.slice() } : null;
      }
    } else if (!ui.offerSeries) {
      ui.offerSeries = { bestOf:3, seedWinner:win };
    }
  }

  function acceptSeriesOffer() {
    var o = ui.offerSeries;
    var wins = o.wins ? o.wins.slice() : [0, 0];
    if (o.seedWinner === 0 || o.seedWinner === 1) wins[o.seedWinner] = 1;
    var id = o.id || Date.now();
    ui.series = { bestOf:o.bestOf, wins:wins, id:id };
    if (!o.id && game.archivedId) {
      // This is a brand-new series (not an escalation) — the standalone game that
      // just prompted the offer becomes Game 1 of the series in history.
      var seedRec = gameHistory.find(function (h) { return h.id === game.archivedId; });
      if (seedRec) {
        seedRec.tournament = { format:"series", teams: game.teams.slice(), id:id, bestOf:o.bestOf };
        saveHistory();
      }
    }
    ui.offerSeries = null;
    ui.seriesResult = null;
    newGame(true);
  }

  function declineSeriesOffer() {
    ui.offerSeries = null;
    ui.seriesResult = null;
    render();
  }

  // Scrambles who's paired with whom (keeping the same 4 seats/names), then
  // starts a fresh standalone game — no series tracking, since a redraw
  // breaks up the two teams that would otherwise be rematching.
  function redrawSoloTeamsAndPlay() {
    soloGame.players = shuffle(soloGame.players.slice());
    newGame();
  }

    settingsPanelEl.innerHTML = "";   // confirm now lives in renderModal (ui.confirmReset)
  }

    // ================= HISTORY VIEW =================
  function fmtTime(iso) {
    try {
      return new Date(iso).toLocaleTimeString(undefined, { hour:"numeric", minute:"2-digit" });
    } catch (e) { return ""; }

  function exportHistory() {
    var json = JSON.stringify({ exportedAt: new Date().toISOString(), games: gameHistory }, null, 2);
    var name = "somerset-history-" + new Date().toISOString().slice(0,10) + ".json";
    // Native share sheet where available (AirDrop / Files / Messages on phones);
    // must stay synchronous with the tap or iOS refuses the share.
    if (navigator.share && navigator.canShare) {
      try {
        var file = new File([json], name, { type: "application/json" });
        if (navigator.canShare({ files: [file] })) {
          navigator.share({ files: [file], title: "Some-R-Set history" }).catch(function () {});
          return;
        }
      } catch (e) { /* fall through to download */ }
    }
    var blob = new Blob([json], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = el("a", { href:url, download:name }, []);
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importHistoryFile(file) {
    var reader = new FileReader();
    reader.onload = function () {
      var games;
      try {
        var data = JSON.parse(reader.result);
        games = Array.isArray(data) ? data : data.games;
      } catch (e) { games = null; }
      if (!Array.isArray(games)) {
        ui.info = "That file doesn't look like a Some-R-Set history backup.";
        render();
        return;
      }
      var existingIds = {};
      gameHistory.forEach(function (g) { existingIds[g.id] = true; });
      var added = 0;
      games.forEach(function (g) {
        if (!g || existingIds[g.id]) return;
        gameHistory.push(g);
        existingIds[g.id] = true;
        added++;
      });
      gameHistory.sort(function (a, b) { return new Date(b.date) - new Date(a.date); });
      saveHistory();
      ui.info = added ? ("Restored " + added + " game" + (added === 1 ? "" : "s") + ".") : "No new games to restore — they're already in your History.";
      render();
    };
    reader.readAsText(file);
  }

  // ---- Personal stats (History → Stats) ----
  // Pure aggregation over gameHistory — nothing new persisted. Players are matched
  // by trimmed, case-folded name, the same normalization dedupeNames() already
  // uses for the per-device name book, so "Dan" and "dan " count as one player.
  function statKey(name) { return (name || "").trim().toLowerCase(); }

  // Partner/opponent are tracked by seat parity: seats 0/2 are one team, 1/3 the
  // other, and within a team the other seat is your partner while both seats of
  // the opposite parity are your opponents for that game.
  function seatPartner(seat) { return (seat + 2) % 4; }
  function seatOpponents(seat) { return seat % 2 === 0 ? [1, 3] : [0, 2]; }

  function computePlayerStats() {
    var byKey = {};
    gameHistory.forEach(function (rec) {
      if (rec.winner == null || !rec.players) return;
      // Bid outcomes (moons, sets) are credited to the seat that actually placed the
      // bid. Deals recorded before bidder tracking existed have no bidderSeat, so
      // they fall back to crediting both seats on the bidding team, as before.
      var moonsBySeat = [0, 0, 0, 0], setsBySeat = [0, 0, 0, 0], moonAttemptsBySeat = [0, 0, 0, 0];
      (rec.deals || []).forEach(function (d) {
        var creditSeats = (d.bidderSeat != null) ? [d.bidderSeat] : [d.bidTeam, d.bidTeam + 2];
        if (d.bid === POINTS_PER_DEAL) creditSeats.forEach(function (s) { moonAttemptsBySeat[s]++; });
        if (isMoonMade(d)) creditSeats.forEach(function (s) { moonsBySeat[s]++; });
        if (isDealSet(d)) creditSeats.forEach(function (s) { setsBySeat[s]++; });
      });
      var format = rec.tournament ? rec.tournament.format : "casual";
      var tournamentId = rec.tournament ? rec.tournament.id : null;
      var dealsCount = (rec.deals || []).length;
      rec.players.forEach(function (raw, seat) {
        var nm = (raw || "").trim();
        if (!nm) return;
        var resolved = canonicalName(nm);
        var key = statKey(resolved), team = seat % 2;
        var p = byKey[key] || (byKey[key] = { name: resolved, games: [], partners: {}, opponents: {} });
        var partnerName = canonicalName((rec.players[seatPartner(seat)] || "").trim() || "?");
        var oppSeats = seatOpponents(seat);
        var opponentNames = oppSeats.map(function (s) { return canonicalName((rec.players[s] || "").trim() || "?"); });
        var won = rec.winner === team, tie = rec.winner === "tie";
        var margin = rec.totals ? (rec.totals[team] - rec.totals[1 - team]) : null;
        p.games.push({
          recId: rec.id, date: rec.date, team: team, won: won, tie: tie,
          champion: !!(rec.tournament && rec.tournament.championship && won),
          moons: moonsBySeat[seat], sets: setsBySeat[seat], moonAttempts: moonAttemptsBySeat[seat],
          partnerName: partnerName, opponentNames: opponentNames,
          format: format, tournamentId: tournamentId, dealsCount: dealsCount, margin: margin
        });
        [partnerName].forEach(function (nm2) {
          var pk = statKey(nm2);
          var rec2 = p.partners[pk] || (p.partners[pk] = { name: nm2, games: 0, wins: 0, losses: 0 });
          rec2.games++; if (!tie) { if (won) rec2.wins++; else rec2.losses++; }
        });
        opponentNames.forEach(function (nm2) {
          var ok = statKey(nm2);
          var rec2 = p.opponents[ok] || (p.opponents[ok] = { name: nm2, games: 0, wins: 0, losses: 0 });
          rec2.games++; if (!tie) { if (won) rec2.wins++; else rec2.losses++; }
        });
      });
    });
    Object.keys(byKey).forEach(function (key) { finalizePlayerStats(byKey[key]); });
    return byKey;
  }

  // Best/worst-record pairing (min 2 games together), win% over decided (non-tie) games.
  // Only qualifies if the record actually leans the right way (winning for best partner,
  // losing for nemesis) — otherwise a single lopsided opponent could get crowned by default.
  function bestOrWorstPairing(byKey, wantBest) {
    var best = null;
    Object.keys(byKey).forEach(function (k) {
      var e = byKey[k];
      if (e.games < 2) return;
      var decided = e.wins + e.losses;
      if (!decided) return;
      var pct = e.wins / decided;
      if (wantBest ? pct <= 0.5 : pct >= 0.5) return;
      if (!best) { best = { rec: e, pct: pct }; return; }
      var better = wantBest ? (pct > best.pct) : (pct < best.pct);
      if (better || (pct === best.pct && e.games > best.rec.games)) best = { rec: e, pct: pct };
    });
    return best ? { name: best.rec.name, wins: best.rec.wins, losses: best.rec.losses, games: best.rec.games, winPct: Math.round(best.pct * 100) } : null;
  }

  function finalizePlayerStats(p) {
    p.games.sort(function (a, b) { return new Date(a.date) - new Date(b.date); });
    var wins = 0, losses = 0, moons = 0, sets = 0, moonAttempts = 0, champs = 0, longest = 0, run = 0;
    var curType = null, curRun = 0, tournamentIds = {}, bestWin = null, longestGame = null, shortestGame = null;
    var byFormat = {};
    p.games.forEach(function (g) {
      if (g.champion) champs++;
      moons += g.moons; sets += g.sets; moonAttempts += g.moonAttempts;
      if (g.tournamentId != null) tournamentIds[g.tournamentId] = true;
      if (g.tie) { run = 0; curType = null; curRun = 0; }
      else if (g.won) {
        wins++; run++; longest = Math.max(longest, run);
        curType === "w" ? curRun++ : (curType = "w", curRun = 1);
      } else {
        losses++; run = 0;
        curType === "l" ? curRun++ : (curType = "l", curRun = 1);
      }
      if (g.won && g.margin != null && (!bestWin || g.margin > bestWin.margin)) {
        bestWin = { margin: g.margin, opponentNames: g.opponentNames, date: g.date, recId: g.recId };
      }
      if (g.dealsCount) {
        if (!longestGame || g.dealsCount > longestGame.dealsCount) longestGame = { dealsCount: g.dealsCount, date: g.date, recId: g.recId };
        if (!shortestGame || g.dealsCount < shortestGame.dealsCount) shortestGame = { dealsCount: g.dealsCount, date: g.date, recId: g.recId };
      }
      var fb = byFormat[g.format] || (byFormat[g.format] = { format: g.format, wins: 0, losses: 0, games: 0 });
      fb.games++; if (!g.tie) { if (g.won) fb.wins++; else fb.losses++; }
    });
    p.gamesPlayed = p.games.length;
    p.wins = wins; p.losses = losses;
    p.winPct = (wins + losses) ? Math.round((wins / (wins + losses)) * 100) : null;
    p.longestStreak = longest;
    p.currentStreak = { type: curType, count: curRun };
    p.moonsShot = moons;
    p.timesSet = sets;
    p.moonAttempts = moonAttempts;
    p.moonConversionRate = moonAttempts ? Math.round((moons / moonAttempts) * 100) : null;
    p.championships = champs;
    p.tournamentsPlayed = Object.keys(tournamentIds).length;
    p.bestWin = bestWin;
    p.longestGame = longestGame;
    p.shortestGame = (shortestGame && shortestGame.dealsCount !== (longestGame && longestGame.dealsCount)) ? shortestGame : null;
    p.bestPartner = bestOrWorstPairing(p.partners, true);
    p.nemesis = bestOrWorstPairing(p.opponents, false);
    var formatOrder = ["casual", "single", "double", "round", "series"];
    p.formatBreakdown = formatOrder.map(function (f) { return byFormat[f]; }).filter(Boolean).map(function (fb) {
      var decided = fb.wins + fb.losses;
      return { format: fb.format, wins: fb.wins, losses: fb.losses, games: fb.games, winPct: decided ? Math.round((fb.wins / decided) * 100) : null };
    });
  }

  // Last `months` calendar months oldest-first, each bucketed with a game count —
  // feeds the "Games by month" bar chart.
  function playerMonthlyActivity(p, months) {
    var now = new Date(), buckets = [], byKey = {};
    for (var i = months - 1; i >= 0; i--) {
      var d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      var key = d.getFullYear() + "-" + d.getMonth();
      var b = { key: key, label: d.toLocaleDateString(undefined, { month: "short" }), count: 0 };
      buckets.push(b); byKey[key] = b;
    }
    p.games.forEach(function (g) {
      var d = new Date(g.date), key = d.getFullYear() + "-" + d.getMonth();
      if (byKey[key]) byKey[key].count++;
    });
    return buckets;
  }

  var STAT_SORTS = [

  // Bucket history into top-level sections: standalone (non-tournament) games
  // group by calendar day, while tournament matches group by tournament (via
  // the id stamped on rec.tournament) regardless of day, so two different
  // tournaments played the same day render as two separate collapsible
  // entries instead of being nested under one shared date header.
  // gameHistory is already newest-first, so first-seen order gives newest-first groups too.
  function dateKey(iso) {
    try { var d = new Date(iso); return d.getFullYear() + "-" + d.getMonth() + "-" + d.getDate(); } catch (e) { return String(iso); }
  }
  // Log-view filter pills shown under the Log/Stats switcher — same predicate
  // shape as STAT_SORTS. "today" compares local calendar day via dateKey, same
  // normalization buildHistoryGroups already uses to group by day.
  var HISTORY_FILTERS = [
    ["all", "All", function () { return true; }],
    ["today", "Today", function (rec) { return dateKey(rec.date) === dateKey(new Date().toISOString()); }],
    ["standard", "Standard", function (rec) { return !(rec.tournament && rec.tournament.id != null); }],
    ["tournaments", "Tournament", function (rec) { return !!(rec.tournament && rec.tournament.id != null); }]
  ];
  function renderHistoryFilterRow() {
    return el("div", { class:"stat-sort-row" }, HISTORY_FILTERS.map(function (f) {
      return el("button", { class:"stat-sort-chip" + (ui.historyFilter === f[0] ? " on" : ""),
        onClick:function(){ ui.historyFilter = f[0]; render(); } }, [f[1]]);
    }));
  }
  function dateHeading(iso) {
    try {
      var d = new Date(iso);
      var dd = String(d.getDate()).padStart(2, "0");
      var mm = String(d.getMonth() + 1).padStart(2, "0");
      return mm + "/" + dd + "/" + d.getFullYear();
    } catch (e) { return ""; }
  }
  function buildHistoryGroups(records) {
    var groups = [], byKey = {};
    (records || gameHistory).forEach(function (rec) {
      var isTournament = rec.tournament && rec.tournament.id != null;
      var key = isTournament ? ("t:" + rec.tournament.id) : ("d:" + dateKey(rec.date));
      var g = byKey[key];
      if (!g) {
        g = isTournament
          ? { key:key, isTournament:true, tournament:rec.tournament, records:[] }
          : { key:key, isTournament:false, records:[] };
        byKey[key] = g;
        groups.push(g);
      }
      g.records.push(rec);
    });
    groups.forEach(function (g) {
      if (g.isTournament && g.tournament.format === "series" && !g.tournament.bestOf) {
        var withBestOf = g.records.find(function (rec) { return rec.tournament.bestOf; });
        if (withBestOf) g.tournament = Object.assign({}, g.tournament, { bestOf: withBestOf.tournament.bestOf });
      }
    });
    return groups;
  }
  // Jumps from a personal-stats highlight (biggest win, longest/shortest game) to
  // that exact game in History: expands its date/tournament group, opens its
  // detail, and scrolls it into view once rendered (see renderHistory's rAF below).
  function goToGameRecord(recId) {
    var rec = gameHistory.find(function (r) { return r.id === recId; });
    if (!rec) return;
    var isTournament = rec.tournament && rec.tournament.id != null;
    var key = isTournament ? ("t:" + rec.tournament.id) : ("d:" + dateKey(rec.date));
    ui.historyGroupOpen[key] = true;
    ui.historyOpen = rec.id;
    ui.jumpToRecordId = rec.id;
    ui.historyFilter = "all";
    ui.view = "history"; ui.historySub = null;
    render();
  }
  function setAllHistoryGroupsOpen(groups, openVal) {
    groups.forEach(function (g) { ui.historyGroupOpen[g.key] = openVal; });
    render();
  }
  // The tournament champion (if any) for a set of records — used for the 🏆
  // "... Won" line shown when a tournament group is collapsed.
  function groupStats(records) {
    var champion = null;
    records.forEach(function (rec) {
      if (rec.tournament && rec.tournament.championship) champion = rec.teams[rec.winner];
    });
    return { champion: champion };
  }
  // Distinct team names across a group's match records — each record only
  // carries its own two teams, so the group-wide participant count is the
  // union across every recorded match.
  function uniqueTeamCount(records) {
    var seen = {};
    records.forEach(function (rec) {
      (rec.teams || []).forEach(function (name) { if (name) seen[name] = true; });
    });
    return Object.keys(seen).length;
  }
  // "N games, M teams, standard"
  function statsSummaryText(records) {
    var teamCount = uniqueTeamCount(records);
    return records.length + (records.length === 1 ? " game" : " games")
      + ", " + teamCount + " team" + (teamCount === 1 ? "" : "s") + ", standard";
  }
  // "Best of 5", "Double Elimination", etc. — short form for the group header title.
  function tournamentTitleLabel(t) {
    return t.format === "series" ? ("Best of " + t.bestOf) : formatName(t.format);
  }
  function renderHistoryGroup(g) {
    var recs = g.records;
    var open = ui.historyGroupOpen[g.key] === true;   // default collapsed
    var chevron = open ? "▾ " : "▸ ";
    var titleLeft, titleRight = "", sumLeft;
    if (g.isTournament) {
      titleLeft = chevron + dateHeading(recs[0].date);
      var stats = groupStats(recs);
      titleRight = stats.champion ? ("🏆 " + stats.champion + " Won") : "";
      var teamCount = uniqueTeamCount(recs);
      sumLeft = recs.length + " game" + (recs.length === 1 ? "" : "s") + ", " + teamCount + " team" + (teamCount === 1 ? "" : "s")
        + ", " + tournamentTitleLabel(g.tournament).toLowerCase();
    } else {
      titleLeft = chevron + dateHeading(recs[0].date);
      sumLeft = statsSummaryText(recs);
    }
    var head = el("div", { class:"hist-date-head", role:"button", onClick:function () {
      ui.historyGroupOpen[g.key] = !open; render();
    } }, [
      el("div", { class:"hist-head-row" }, [
        el("span", { class:"hist-date-title disp" }, [ titleLeft ]),
        el("span", { class:"hist-win disp" }, [ titleRight ])
      ]),
      el("span", { class:"hist-date-sum disp" }, [ sumLeft ])
    ]);
    var wrap = el("div", { class:"hist-date-group" }, [ head ]);
    if (open) recs.forEach(function (rec) { wrap.appendChild(renderHistoryItem(rec)); });
    return wrap;
  }

  // Fix up each history summary line after layout: when the score column would collide
  // with the right-hand "… won" label, stack the label onto its own line below the score
  // instead of overlapping it.
  function applyScoreWrap() {
    var lines = viewRootEl.querySelectorAll(".hist-line");
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      var score = line.querySelector(".hist-score");
      var win = line.querySelector(".hist-win");
      if (!score) continue;
      line.classList.remove("stack");

      if (win) {
        // Compare actual text extents (the name/score cells), not the grid-grown score box.
        var cells = score.querySelectorAll(".hs-name, .hs-score");
        var contentRight = 0;
        for (var t = 0; t < cells.length; t++) contentRight = Math.max(contentRight, cells[t].getBoundingClientRect().right);
        if (contentRight > win.getBoundingClientRect().left - 4) line.classList.add("stack");
      }
    }
  }

  // Each open game's hand table column-aligns "bid" independently of the others —
  // one game's roster of names has no bearing on another's column width.
  function alignHistoryBidderNames() {
    var details = viewRootEl.querySelectorAll(".hist-detail");
    for (var i = 0; i < details.length; i++) {
      var bidEls = details[i].querySelectorAll(".hh-bid"), rows = [];
      for (var j = 0; j < bidEls.length; j++) {
        rows.push({
          descEl: bidEls[j],
          innerEl: bidEls[j].querySelector(".hh-bid-inner"),
          nameEl: bidEls[j].querySelector(".hh-bidder")
        });
      }
      alignDealBidColumn(rows);
    }
  }

  function renderHistoryItem(rec) {
    var open = ui.historyOpen === rec.id;
    var isChamp = !!(rec.tournament && rec.tournament.championship);
    var manual = !!(rec.tournament && rec.tournament.manual);   // winner picked by hand, no game
    var winTxt = rec.winner === "tie" ? "Tie" : (rec.teams[rec.winner] + " won");
    // Manual entries have no score. Otherwise each team gets its own row so the two
    // totals form a vertically-aligned column regardless of team-name length.
    var hsRow = function (i) {
      return el("div", { class:"hs-row" }, [
        el("span", { class:"hs-name" }, [ rec.teams[i] ]),
        manual ? null : el("span", { class:"hs-score mono" }, [ String(rec.totals[i]) ])
      ].filter(function (x) { return x; }));
    };
    var summary = el("div", { class:"hist-item", role:"button",
      onClick:function(){ ui.historyOpen = open ? null : rec.id; render(); } }, [
      el("div", { class:"hist-line" }, [
        el("div", { class:"hist-score" }, [
          hsRow(0),
          hsRow(1)
        ]),
        el("span", { class:"hist-win disp" }, [ (isChamp ? "🏆 " : "") + winTxt ])
      ]),
      el("div", { class:"hist-meta disp" }, [ fmtTime(rec.date) + " · " + (rec.tournament ? (isChamp ? "Tournament Championship" : "Tournament Match") : "Standard Game") + (manual ? "" : (": " + rec.deals.length + " Hands")) ])
    ]);
    var entry = el("div", { class:"hist-entry", "data-rec-id":rec.id }, [ summary ]);
    if (open) entry.appendChild(renderHistoryDetail(rec));
    return entry;
  }

  function rosterLine(rec, teamIdx) {
    var a = rec.players[teamIdx], b = rec.players[teamIdx + 2];   // seats teamIdx & teamIdx+2 share a team
    var names = [a, b].filter(function (x) { return x && x.trim(); });
    var roster = names.join(" & ");
    // Tournament teams are named after their players (e.g. "A & B"), so the roster
    // would just repeat the team name — only append it when it adds something.
    return rec.teams[teamIdx] + (roster && roster !== rec.teams[teamIdx] ? (": " + roster) : "");
  }

  function renderHistoryDetail(rec) {
    var wrap = el("div", { class:"hist-detail" }, [
      el("p", { class:"hist-roster disp" }, [ rosterLine(rec, 0) ]),
      el("p", { class:"hist-roster disp" }, [ rosterLine(rec, 1) ])
    ]);
    if (rec.tournament && rec.tournament.manual) {
      wrap.appendChild(el("p", { class:"hist-roster disp", style:"color:var(--ink-soft);" },
        ["No hands recorded."]));
    }
    var runningScore = [0, 0];
    rec.deals.forEach(function (d, idx) {
      var r = dealResult(d), isSet = r[2];
      // Show the score actually credited this hand (delta), so a made moon reads as the
      // jump to 50 — matching the live pad — instead of the raw 14 points taken.
      var delta = dealDelta(d, runningScore);
      runningScore[0] += delta[0]; runningScore[1] += delta[1];
      var dlr = (typeof d.dealer === "number") ? d.dealer : ((rec.dealerStart + idx) % 4 + 4) % 4;
      var dName = (rec.players[dlr] && rec.players[dlr].trim()) ? rec.players[dlr].trim() : ("Seat " + (dlr + 1));
      var bidderName = (d.bidderSeat != null)
        ? ((rec.players[d.bidderSeat] && rec.players[d.bidderSeat].trim()) ? rec.players[d.bidderSeat].trim() : ("Seat " + (d.bidderSeat + 1)))
        : rec.teams[d.bidTeam];
      var bidSuffix = (d.bid === POINTS_PER_DEAL ? " bid 14" : (" bid " + d.bid)) + (isSet ? " (set)" : (isMoonMade(d) ? " (moon)" : ""));
      wrap.appendChild(el("div", { class:"hist-hand" }, [
        el("span", { class:"hh-no mono" }, [ (idx + 1) + "." ]),
        el("span", { class:"hh-sc mono" + (isSet && d.bidTeam === 0 ? " red" : "") }, [ String(delta[0]) ]),
        el("span", { class:"mono" }, ["|"]),
        el("span", { class:"hh-sc mono" + (isSet && d.bidTeam === 1 ? " red" : "") }, [ String(delta[1]) ]),
        el("span", { class:"hh-bid disp" }, [ el("span", { class:"hh-bid-inner" }, [ el("span", { class:"hh-bidder" }, [bidderName]), bidSuffix ]) ]),
        el("span", { class:"hh-dlr disp" }, [ "D: " + dName ])
      ]));
    });
    wrap.appendChild(el("div", { class:"hist-del" }, [
      el("button", { class:"link-btn danger disp", onClick:function(){
        gameHistory = gameHistory.filter(function (g) { return g.id !== rec.id; });
        ui.historyOpen = null; saveHistory(); render();
      } }, ["Delete this game"])
    ]));
    return wrap;
  }

  // ================= TOURNAMENT =================
  function formatName(f) {
    return f === "single" ? "Single Elimination" : f === "double" ? "Double Elimination"
         : f === "series" ? "Best-of Series" : "Round Robin";
  }
  function shuffle(a) {
    a = a.slice();
    for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = a[i]; a[i] = a[j]; a[j] = t; }
    return a;
  }
  function drawTeams(names) {
    var sh = shuffle(names), teams = [];
    for (var i = 0; i < sh.length; i += 2) {
      teams.push({ id: "t" + i + "-" + Math.random().toString(36).slice(2, 7), name: sh[i] + " & " + sh[i + 1], players: [sh[i], sh[i + 1]] });
    }
    return teams;
  }

  function makeSingleElim(teams) {
    var n = teams.length, size = 1;
    while (size < n) size *= 2;
    var matches = size / 2, byes = size - n, ptr = 0, r0 = [];
    // byes (< matches, since size is the *next* power of two) each get their own match
    for (var mi = 0; mi < matches; mi++) {
      if (mi < byes) r0.push({ a: ptr++, b: null, winner: null });
      else { var aa = ptr++, bb = ptr++; r0.push({ a: aa, b: bb, winner: null }); }
    }
    var rounds = [r0], count = matches;
    while (count > 1) {
      var rnd = [];
      for (var k = 0; k < count / 2; k++) rnd.push({ a: null, b: null, winner: null });
      rounds.push(rnd); count = count / 2;
    }
    var t = { id: Date.now(), createdAt: new Date().toISOString(), format: "single", teams: teams, rounds: rounds, champion: null };
    t.rounds[0].forEach(function (m, i) { if (m.a != null && m.b == null) setMatchWinner(t, 0, i, m.a); }); // auto-advance byes
    return t;
  }

  function setMatchWinner(t, ri, mi, teamIdx) {
    t.rounds[ri][mi].winner = teamIdx;
    if (ri + 1 < t.rounds.length) {
      var nm = t.rounds[ri + 1][Math.floor(mi / 2)];
      if (mi % 2 === 0) nm.a = teamIdx; else nm.b = teamIdx;
    } else {
      t.champion = teamIdx;
    }
  }
  function pickWinner(ri, mi, teamIdx) {
    var bw = viewRootEl.querySelector(".bracket-wrap");
    if (bw) bracketScroll = bw.scrollLeft;
    suppressFade = true;
    setMatchWinner(tourney, ri, mi, teamIdx);
    saveTourney(); render();
  }

  // ---- Double Elimination ----
  function makeDoubleElim(teams) {
    var n = teams.length, size = 1;
    while (size < n) size *= 2;
    var wbR0count = size / 2, byes = size - n, ptr = 0, r0 = [];
    for (var mi = 0; mi < wbR0count; mi++) {
      if (mi < byes) r0.push({ a: ptr++, b: null, winner: null });
      else { var aa = ptr++, bb = ptr++; r0.push({ a: aa, b: bb, winner: null }); }
    }
    var wbRounds = [r0], count = wbR0count;
    while (count > 1) {
      var rnd = []; for (var k = 0; k < count / 2; k++) rnd.push({ a: null, b: null, winner: null });
      wbRounds.push(rnd); count = count / 2;
    }
    // LB: 2*(wbRounds.length-1) rounds
    var lbRounds = [], wbLen = wbRounds.length;
    if (wbLen >= 2) {
      var lb0 = []; for (var i = 0; i < wbR0count / 2; i++) lb0.push({ a: null, b: null, winner: null });
      lbRounds.push(lb0);
      var prevLBcount = lb0.length;
      for (var wbRi = 1; wbRi < wbLen; wbRi++) {
        var oddRnd = []; for (var j = 0; j < prevLBcount; j++) oddRnd.push({ a: null, b: null, winner: null });
        lbRounds.push(oddRnd); prevLBcount = oddRnd.length;
        if (wbRi < wbLen - 1) {
          var evenRnd = []; for (var j2 = 0; j2 < Math.floor(prevLBcount / 2); j2++) evenRnd.push({ a: null, b: null, winner: null });
          lbRounds.push(evenRnd); prevLBcount = evenRnd.length;
        }
      }
    }
    var t = {
      id: Date.now(), createdAt: new Date().toISOString(), format: "double", teams: teams,
      wBracket: { rounds: wbRounds }, lBracket: { rounds: lbRounds },
      grandFinal: { m1: { a: null, b: null, winner: null }, m2: null },
      locks: {}, champion: null
    };
    t.wBracket.rounds[0].forEach(function(m, i) { if (m.a != null && m.b == null) setWBWinner(t, 0, i, m.a); });
    return t;
  }

  // A WB Round-0 match with no 'b' slot is a bye and never produces a loser.
  function wbR0IsBye(t, mi) { var m = t.wBracket.rounds[0][mi]; return !m || m.b == null; }
  // Structurally determine whether an LB match can NEVER produce a winner (a "dead
  // bye-pair"). This is independent of play order: it depends only on the bye layout.
  // Odd LB rounds always receive a real WB drop-down, so they are never dead; even
  // rounds (incl. R0) are dead only when both of their feeders are dead.
  function lbMatchDead(t, ri, mi) {
    if (ri === 0) return wbR0IsBye(t, 2 * mi) && wbR0IsBye(t, 2 * mi + 1);
    if (ri % 2 === 1) return false;
    return lbMatchDead(t, ri - 1, 2 * mi) && lbMatchDead(t, ri - 1, 2 * mi + 1);
  }
  function setWBWinner(t, ri, mi, teamIdx) {
    var m = t.wBracket.rounds[ri][mi];
    m.winner = teamIdx;
    var loser = (m.a === teamIdx) ? m.b : m.a;
    // Advance winner in WB
    var wbLen = t.wBracket.rounds.length;
    if (ri + 1 < wbLen) {
      var nwb = t.wBracket.rounds[ri + 1][Math.floor(mi / 2)];
      if (mi % 2 === 0) nwb.a = teamIdx; else nwb.b = teamIdx;
    } else {
      t.grandFinal.m1.a = teamIdx; // WB champ
    }
    // Route loser to LB
    if (loser != null) {
      if (ri === 0 && t.lBracket.rounds.length > 0) {
        // WB R0 loser → LB R0 slot floor(mi/2), a if mi%2==0 else b
        var lbSlot0 = Math.floor(mi / 2);
        t.lBracket.rounds[0][lbSlot0][mi % 2 === 0 ? "a" : "b"] = loser;
        // If the partner WB R0 match was a bye, only one team will ever arrive here —
        // auto-advance that lone team so the losers bracket can proceed.
        var partnerMi = mi % 2 === 0 ? mi + 1 : mi - 1;
        var partnerMatch = t.wBracket.rounds[0][partnerMi];
        if (!partnerMatch || partnerMatch.b == null) {
          var lbM0 = t.lBracket.rounds[0][lbSlot0];
          if (lbM0.winner == null) {
            var solo = lbM0.a != null ? lbM0.a : lbM0.b;
            if (solo != null) setLBWinner(t, 0, lbSlot0, solo);
          }
        }
      } else if (ri >= 1) {
        // WB Rk loser → LB R(2k-1) slot mi as b
        var lbRi = 2 * ri - 1;
        if (lbRi < t.lBracket.rounds.length) {
          t.lBracket.rounds[lbRi][mi].b = loser;
          // If the 'a' slot is fed by a structurally dead bye-pair (both WB R0
          // partners were byes, so no loser will ever arrive), auto-advance the lone
          // team so the losers bracket can continue. We must test structural deadness,
          // NOT runtime emptiness: an unplayed-yet feeder is also empty, and treating
          // that as dead would let a later-round WB loser leapfrog real LB games.
          var lbM = t.lBracket.rounds[lbRi][mi];
          if (lbM.a == null && lbM.winner == null && lbMatchDead(t, lbRi - 1, mi)) {
            setLBWinner(t, lbRi, mi, lbM.b);
          }
        }
      }
    }
  }
  function setLBWinner(t, ri, mi, teamIdx) {
    t.lBracket.rounds[ri][mi].winner = teamIdx;
    var lbLen = t.lBracket.rounds.length;
    if (ri + 1 < lbLen) {
      var nr = t.lBracket.rounds[ri + 1];
      if (ri % 2 === 0) {
        // Even LB round → next odd: same slot as 'a'
        nr[mi].a = teamIdx;
      } else {
        // Odd LB round → next even: reducing
        nr[Math.floor(mi / 2)][mi % 2 === 0 ? "a" : "b"] = teamIdx;
      }
    } else {
      // Last LB round → GF m1 slot b
      t.grandFinal.m1.b = teamIdx;
    }
  }
  function setGFWinner(t, matchNum, winnerId) {
    if (matchNum === 1) {
      t.grandFinal.m1.winner = winnerId;
      if (winnerId === t.grandFinal.m1.a) {
        t.champion = winnerId; // WB champ wins outright
      } else {
        // LB champ wins — reset match
        t.grandFinal.m2 = { a: t.grandFinal.m1.a, b: t.grandFinal.m1.b, winner: null };
      }
    } else {
      t.grandFinal.m2.winner = winnerId;
      t.champion = winnerId;
    }
  }

  // ---- Round Robin ----
  function makeRoundRobin(teams) {
    var n = teams.length, arr = [];
    for (var i = 0; i < n; i++) arr.push(i);
    if (n % 2 === 1) arr.push(-1); // phantom bye
    var m = arr.length, schedule = [], list = arr.slice(1);
    for (var r = 0; r < m - 1; r++) {
      var rot = [arr[0]].concat(list);
      for (var i2 = 0; i2 < m / 2; i2++) {
        var a = rot[i2], b = rot[m - 1 - i2];
        if (a !== -1 && b !== -1) schedule.push({ a: a, b: b, winner: null });
      }
      list = [list[list.length - 1]].concat(list.slice(0, -1));
    }
    return {
      id: Date.now(), createdAt: new Date().toISOString(), format: "round", teams: teams,
      schedule: schedule, final: null, locks: {}, champion: null
    };
  }
  function rrStandings(t) {
    var stats = t.teams.map(function(tm, i) { return { idx: i, wins: 0, losses: 0 }; });
    t.schedule.forEach(function(m) {
      if (m.winner == null) return;
      stats[m.winner].wins++;
      var loser = (m.winner === m.a) ? m.b : m.a;
      stats[loser].losses++;
    });
    stats.sort(function(x, y) {
      if (y.wins !== x.wins) return y.wins - x.wins;
      // Head-to-head tiebreak
      for (var i = 0; i < t.schedule.length; i++) {
        var m = t.schedule[i];
        if ((m.a === x.idx && m.b === y.idx) || (m.a === y.idx && m.b === x.idx)) {
          if (m.winner != null) return m.winner === x.idx ? -1 : 1;
        }
      }
      return 0;
    });
    return stats;
  }
  function setRRWinner(t, idx, winnerTeamIdx) {
    t.schedule[idx].winner = winnerTeamIdx;
    var allDone = true;
    for (var i = 0; i < t.schedule.length; i++) { if (t.schedule[i].winner == null) { allDone = false; break; } }
    if (allDone && !t.final) {
      var st = rrStandings(t);
      t.final = { a: st[0].idx, b: st[1].idx, winner: null };
    }
  }
  function setRRFinalWinner(t, winnerId) {
    t.final.winner = winnerId;
    t.champion = winnerId;
  }

  // ---- Best-of Series (4 players, 2 fixed teams) ----
  function makeSeries(teams, bestOf) {
    return {
      id: Date.now(), createdAt: new Date().toISOString(), format: "series",
      teams: teams, bestOf: bestOf,
      games: [ { a: 0, b: 1, winner: null, game: null, completedGame: null } ],
      champion: null, locks: {}
    };
  }
  function seriesTarget(t) { return Math.floor(t.bestOf / 2) + 1; }  // games needed to clinch
  function seriesWins(t) {
    var w = [0, 0];
    t.games.forEach(function(g) { if (g.winner != null) w[g.winner]++; });
    return w;
  }
  function setSeriesWinner(t, gi, winnerTeamIdx) {
    t.games[gi].winner = winnerTeamIdx;
    var w = seriesWins(t), tgt = seriesTarget(t);
    if (w[0] >= tgt)      t.champion = 0;
    else if (w[1] >= tgt) t.champion = 1;
    else {
      t.champion = null;
      // No clinch yet — queue the next game if this was the last slot.
      if (gi === t.games.length - 1) t.games.push({ a: 0, b: 1, winner: null, game: null, completedGame: null });
    }
  }
  function lastDecidedSeriesGame(t) {
    var last = -1;
    for (var i = 0; i < t.games.length; i++) if (t.games[i].winner != null) last = i;
    return last;
  }
  // Only the most recent decided game can be undone (mirrors the bracket "undo
  // subsequent results first" rule), since later games/clinch depend on it.
  function canClearSeriesWinner(t, gi) {
    return t.games[gi] && t.games[gi].winner != null && gi === lastDecidedSeriesGame(t);
  }
  function clearSeriesWinner(t, gi) {
    t.games[gi].winner = null;
    t.games[gi].completedGame = null;
    t.games = t.games.slice(0, gi + 1);  // drop the now-orphaned pending slot, if any
    t.champion = null;
  }

  function nextMatch(t) {
    for (var ri = 0; ri < t.rounds.length; ri++) {
      for (var mi = 0; mi < t.rounds[ri].length; mi++) {
        var m = t.rounds[ri][mi];
        if (m.a != null && m.b != null && m.winner == null) return { ri: ri, mi: mi, a: m.a, b: m.b };
      }
    }
    return null;
  }

  function renderTournament() {
    viewRootEl.innerHTML = "";
    try {
      if (ui.activeMatch && tourney) renderMatchPlay();
      else if (tourney) renderBracket();
      else renderTournamentSetup();
    } catch (e) {
      // Render failed — show the error and offer a reset
      viewRootEl.appendChild(el("div", { class:"pad fade" }, [
        el("div", { class:"view-head disp" }, ["Tournament"]),
        el("p", { class:"disp", style:"padding:16px; color:var(--red); font-size:13px;" },
          ["Display error: " + e.message + ". This usually means stored tournament data is in an unexpected format."]),
        el("div", { style:"padding:0 12px 16px;" }, [
          el("button", { class:"btn btn-danger disp", onClick:function(){
            tourney = null; saveTourney(); render();
          } }, ["Clear tournament & start fresh"])
        ])
      ]));
    }
  }

  function rosterPlayers(t) {                 // flatten all players from the current teams
    var names = [];
    t.teams.forEach(function (tm) { (tm.players || []).forEach(function (p) { if (p && p.trim()) names.push(p.trim()); }); });
    return names;
  }
  function makeTourney(format, teams, bestOf) {
    return format === "double" ? makeDoubleElim(teams)
         : format === "round"  ? makeRoundRobin(teams)
         : format === "series" ? makeSeries(teams, bestOf)
         : makeSingleElim(teams);
  }
  function rematchSameTeams() {
    var t = makeTourney(tourney.format, shuffle(tourney.teams), tourney.bestOf);
    ui.activeMatch = null; ui.matchMenu = null; ui.confirmEndT = false;
    restartTourney(t);
  }
  function redrawAndReplay() {
    var teams = drawTeams(rosterPlayers(tourney));
    var t = makeTourney(tourney.format, teams, tourney.bestOf);
    ui.activeMatch = null; ui.matchMenu = null; ui.confirmEndT = false;
    restartTourney(t);
  }

  function startMatchAm(am) {
    var m = getActiveMatchObj(am);
    if (!m.game) {
      var A = tourney.teams[m.a], B = tourney.teams[m.b];
      var g = freshGame();
      g.teams = [A.name, B.name];
      g.players = [A.players[0] || "", B.players[0] || "", A.players[1] || "", B.players[1] || ""];
      m.game = g;
    }
    claimLock(am);
    ui.activeMatch = am;
    ui.matchMenu = null; ui.showEntry = false; ui.entryStep = 1; ui.seatMenu = null;
    saveTourney(); render();
  }

  function watchMatchAm(am) {
    ui.activeMatch = am;
    ui.matchMenu = null; ui.showEntry = false; ui.entryStep = 1; ui.seatMenu = null;
    render();
  }

  function matchScoreStr(m) {
    var s = gameTotals(m.game);
    return s[0] + "–" + s[1];
  }

  // Record the winner into whichever bracket/series this match belongs to.
  function routeMatchWinner(am, teamIdx) {
    if (!am.bracket) setMatchWinner(tourney, am.ri, am.mi, teamIdx);
    else if (am.bracket === "wb") setWBWinner(tourney, am.ri, am.mi, teamIdx);
    else if (am.bracket === "lb") setLBWinner(tourney, am.ri, am.mi, teamIdx);
    else if (am.bracket === "gf") setGFWinner(tourney, am.match, teamIdx);
    else if (am.bracket === "rr") { if (am.isFinal) setRRFinalWinner(tourney, teamIdx); else setRRWinner(tourney, am.idx, teamIdx); }
    else if (am.bracket === "series") setSeriesWinner(tourney, am.gi, teamIdx);
  }

  // Log a tournament result whose winner was picked by hand (no full in-app
  // game): no deals or score, just the matchup and who won.
  function archiveManualWin(m, teamIdx) {
    var A = tourney.teams[m.a], B = tourney.teams[m.b];
    var ap = A.players || [], bp = B.players || [];
    var rec = {
      id: Date.now(),
      date: new Date().toISOString(),
      teams: [A.name, B.name],
      players: [ ap[0] || "", bp[0] || "", ap[1] || "", bp[1] || "" ],   // seats 0&2 = A, 1&3 = B
      dealerStart: 0,
      target: (m.game && m.game.target) || 50,
      totals: null,                          // no score — winner was entered manually
      winner: (teamIdx === m.a) ? 0 : 1,     // index into the record's teams array
      deals: [],
      tournament: { format: tourney.format, teams: [A.name, B.name], manual: true, id: tourney.id, bestOf: tourney.bestOf }
    };
    gameHistory.unshift(rec);
    saveHistory();
    return rec;
  }

  // Finish a match from the bracket menu (manual "[Team] won"). A game played to
  // a finish is archived just like the in-app auto-save path; otherwise the
  // hand-picked winner is still logged as a manual result. Either way, badge the
  // record if this clinched the title.
  function recordManualMatchWin(am, m, teamIdx) {
    var champBefore = tourney.champion;
    var played = m && m.game && m.game.deals.length;
    var complete = played && (gameWinner(m.game) === 0 || gameWinner(m.game) === 1);
    var archived;
    if (complete) {
      var prevGame = game; game = m.game;   // archiveCurrentGame reads the global game pointer
      archiveCurrentGame({ format: tourney.format, teams: [tourney.teams[m.a].name, tourney.teams[m.b].name], id: tourney.id, bestOf: tourney.bestOf });
      game = prevGame;
      m.completedGame = JSON.parse(JSON.stringify(m.game));   // keep the score on the bracket
      archived = gameHistory[0];
    } else {
      archived = archiveManualWin(m, teamIdx);                // no full game — log a manual result
    }
    if (m) m.game = null;
    routeMatchWinner(am, teamIdx);
    if (tourney.champion != null && tourney.champion !== champBefore && archived && archived.tournament) {
      archived.tournament.championship = true;
      saveHistory();
    }
    markMatchArchived(am);   // this device already has its own record — auto-sync shouldn't duplicate it
  }

  function returnToBracket() {
    var am = ui.activeMatch, m = getActiveMatchObj(am);
    var win = gameWinner(m.game);                 // 0 or 1
    var tournTeam = (win === 0) ? m.a : m.b;
    var champBefore = tourney.champion;
    // The game itself was already archived to History as soon as it was won
    // (see recordDeal); this only covers the rare case that didn't happen yet.
    if (!m.game.archivedId) {
      archiveCurrentGame({ format: tourney.format, teams: [tourney.teams[m.a].name, tourney.teams[m.b].name], id: tourney.id, bestOf: tourney.bestOf });
    }
    var justArchived = gameHistory[0];
    releaseLock(am);
    m.completedGame = JSON.parse(JSON.stringify(m.game));
    m.game = null;
    routeMatchWinner(am, tournTeam);
    // If this game crowned the tournament champion, mark its history record.
    if (tourney.champion != null && tourney.champion !== champBefore && justArchived && justArchived.tournament) {
      justArchived.tournament.championship = true;
      saveHistory();
    }
    markMatchArchived(am);   // this device already has its own record — auto-sync shouldn't duplicate it
    ui.activeMatch = null; ui.showEntry = false;
    saveTourney(); render();
  }

  function manualWinAm(am, teamIdx) {
    // Always confirm — a manual result advances the bracket, and the buttons

  function renderSeriesSetup() {
    var s = ui.sSetup;
    var card = el("div", { class:"pad" + (suppressFade ? "" : " fade") }, [ el("div", { class:"view-head disp" }, ["Best-of Series"]) ]);
    card.appendChild(el("div", { style:"padding:6px 6px 0;" }, [
      el("button", { class:"back-btn disp", "aria-label":"Back", onClick:function(){ ui.sSetup = null; ui.editNames = false; render(); } },
        [ el("span", { class:"chev", "aria-hidden":"true" }, ["‹"]), "Back" ])
    ]));

    function namesFilled() { return s.players.every(function(p){ return p && p.trim(); }); }
    function mkTeam(a, b) { return { id: "t" + Math.random().toString(36).slice(2, 7), name: a + " & " + b, players: [a, b] }; }
    function invalidateTeams() { s.teams = null; s.partner = null; }

    var startBtn, msgEl, drawBtn = null, partnerBtns = [], partnerLabelEl = null;
    function recompute() {
      var filled = namesFilled();
      var ok = filled && !!s.teams;
      if (msgEl) {
        msgEl.textContent = !filled ? "Enter all 4 player names"
          : !s.teams ? (s.mode === "random" ? "Draw the teams to continue" : "Pick a partner to continue")
          : ("Best of " + s.bestOf + " · " + s.teams[0].name + " vs " + s.teams[1].name);
        msgEl.className = "tvalid disp" + (ok ? " ok" : "");
      }
      if (startBtn) startBtn.disabled = !ok;
      // The Teams controls are always in the DOM; keep their enabled state and
      // labels in sync as names are typed, without a focus-stealing re-render.
      if (drawBtn) drawBtn.disabled = !filled;
      partnerBtns.forEach(function(b){
        b.disabled = !filled;
        var v = s.players[b._pi] && s.players[b._pi].trim();
        b.textContent = v || ("Player " + (b._pi + 1));
      });
      if (partnerLabelEl) {
        var p0 = s.players[0] && s.players[0].trim();
        partnerLabelEl.textContent = (p0 || "Player 1") + "'s partner:";
      }
      return ok;
    }

    // Name inputs (fixed at 4)
    var inputs = [];
    var pwrap = el("div", { class:"tplayers" });
    s.players.forEach(function(nm, i) {
      var input = el("input", {
        class:"tinput disp", value:nm, placeholder:"Player " + (i + 1), "aria-label":"Player " + (i + 1) + " name",
        autocomplete:"off", autocapitalize:"words", enterkeyhint:(i < 3 ? "next" : "done"),
        onInput:function(e){ s.players[i] = e.target.value; if (s.teams) { invalidateTeams(); softRender(); } else recompute(); },
        onKeydown:function(e){ if (e.key === "Enter") { e.preventDefault(); if (inputs[i + 1]) inputs[i + 1].focus(); else input.blur(); } }
      });
      inputs.push(input);
      pwrap.appendChild(el("div", { class:"trow" }, [ el("span", { class:"tnum mono" }, [String(i + 1)]), input ]));
    });
    card.appendChild(pwrap);

    // Quick add (only while there's an empty slot to fill)
    var hasEmpty = s.players.some(function(p){ return !p || !p.trim(); });
    if (nameBook.length && hasEmpty) {
      var entered = s.players.map(function(p){ return (p || "").trim().toLowerCase(); });
      var avail = nameBook.filter(function(nm){ return entered.indexOf(nm.toLowerCase()) === -1; });
      if (avail.length) {
        var qa = el("div", { class:"quick-add" }, [
          el("div", { style:"margin:2px 0 6px;" }, [ el("span", { class:"label disp" }, ["Quick add"]) ])
        ]);
        qa.appendChild(el("div", { class:"chips" }, avail.slice(0, 40).map(function(nm){
          return el("button", { class:"chip disp", onClick:function(){
            for (var i = 0; i < 4; i++) { if (!s.players[i] || !s.players[i].trim()) { s.players[i] = nm; break; } }
            invalidateTeams(); softRender();
          } }, [nm]);
        })));
        card.appendChild(qa);
      }

    // Series length
    card.appendChild(el("div", { style:"padding:0 12px 6px;" }, [
      el("span", { class:"label disp", style:"display:block; margin:8px 0 6px;" }, ["Series length"]),
      el("div", { class:"chips" }, [3, 5, 7].map(function(n){
        return el("button", { class:"chip disp" + (s.bestOf === n ? " on" : ""),
          onClick:function(){ s.bestOf = n; softRender(); } }, ["Best of " + n]);
      }))
    ]));

    // Teams: random draw vs manual partner pick
    card.appendChild(el("div", { style:"padding:0 12px 6px;" }, [
      el("span", { class:"label disp", style:"display:block; margin:8px 0 6px;" }, ["Teams"]),
      el("div", { class:"chips" }, [["random", "Random"], ["choose", "Choose"]].map(function(mo){
        return el("button", { class:"chip disp" + (s.mode === mo[0] ? " on" : ""),
          onClick:function(){ if (s.mode !== mo[0]) { s.mode = mo[0]; invalidateTeams(); softRender(); } } }, [mo[1]]);
      }))
    ]));

    // Teams controls render unconditionally so the button is present from the
    // start; recompute() enables them once all names are filled. (Building them
    // only when namesFilled() left the button missing until the next full
    // render, since typing a name runs recompute() rather than a re-render.)
    var names = s.players.map(function(p){ return p.trim(); });
    var filledNow = namesFilled();
    if (s.mode === "random") {
      drawBtn = el("button", { class:"btn btn-add disp", onClick:function(){
        if (!namesFilled()) return;
        s.teams = drawTeams(s.players.map(function(p){ return p.trim(); })); softRender();
      } }, [ s.teams ? "Re-draw teams" : "Draw teams" ]);
      drawBtn.disabled = !filledNow;
      card.appendChild(el("div", { style:"padding:6px 12px 0;" }, [ drawBtn ]));
    } else {

        [ (names[0] || "Player 1") + "'s partner:" ]);
      card.appendChild(el("div", { style:"padding:6px 12px 0;" }, [
        partnerLabelEl,
        el("div", { class:"chips" }, [1, 2, 3].map(function(pi){
          var b = el("button", { class:"chip disp" + (s.partner === pi ? " on" : ""), onClick:function(){
            if (!namesFilled()) return;
            var nm = s.players.map(function(p){ return p.trim(); });
            s.partner = pi;
            var rest = [1, 2, 3].filter(function(x){ return x !== pi; });
            s.teams = [ mkTeam(nm[0], nm[pi]), mkTeam(nm[rest[0]], nm[rest[1]]) ];
            softRender();
          } }, [ names[pi] || ("Player " + (pi + 1)) ]);
          b._pi = pi;
          b.disabled = !filledNow;
          partnerBtns.push(b);
          return b;
        }))
      ]));
    }
    if (s.teams) {
      card.appendChild(el("div", { class:"draw-list" }, [
        el("div", { class:"draw-team disp" }, [ "Team 1: ", el("b", {}, [s.teams[0].players[0]]), " & ", el("b", {}, [s.teams[0].players[1]]) ]),
        el("div", { class:"draw-team disp" }, [ "Team 2: ", el("b", {}, [s.teams[1].players[0]]), " & ", el("b", {}, [s.teams[1].players[1]]) ])
      ]));
    }

    msgEl = el("p", { class:"tvalid disp" }, [""]);
    card.appendChild(msgEl);

    startBtn = el("button", { class:"btn btn-new disp", onClick:function(){
      if (!recompute()) return;
      rememberNames(s.players.map(function(p){ return p.trim(); }));
      var t = makeSeries(s.teams, s.bestOf);
      ui.sSetup = null;
      startSharedTournament(t);

    card.appendChild(el("div", { style:"padding:8px 12px 16px;" }, [ startBtn ]));

    recompute();
    viewRootEl.appendChild(card);
    suppressFade = false;
  }

  // Generic match box for DE / RR
  function renderMBox(t, m, am) {
    var decided = m.winner != null;
    var ready = m.a != null && m.b != null && !decided;
    var scoreGame = (m.game && m.game.deals && m.game.deals.length) ? m.game
                  : (m.completedGame && m.completedGame.deals && m.completedGame.deals.length) ? m.completedGame : null;
    var scores = scoreGame ? gameTotals(scoreGame) : null;
    function slot(idx, si) {
      var label = idx == null ? "TBD" : t.teams[idx].name;
      var isWin = decided && idx != null && m.winner === idx;
      var kids = [el("span", { class:"mbox-slot-name" }, [label])];
      if (scores) kids.push(el("span", { class:"mbox-score" }, [String(scores[si])]));
      return el("div", { class:"mbox-slot" + (isWin ? " win" : "") }, kids);
    }
    var box = el("div", { class:"mbox" + (ready ? " ready" : "") },
      [slot(m.a, 0), slot(m.b, 1)]);
    if (ready || (decided && m.b != null)) {
      var amCopy = { bracket: am.bracket, ri: am.ri, mi: am.mi, idx: am.idx, match: am.match, isFinal: am.isFinal, confirm: null };
      box.addEventListener("click", function() { ui.matchMenu = amCopy; render(); });
    }
    return box;
  }

  function renderDoubleElim() {

      wbRounds.appendChild(col);
    });

    // Losers Bracket
    if (t.lBracket.rounds.length) {

      var lbRounds = el("div", { class:"bracket-rounds" });

        round.forEach(function(m, mi) { col.appendChild(renderMBox(t, m, { bracket: "lb", ri: ri, mi: mi })); });
        lbRounds.appendChild(col);

    gfDiv.appendChild(gfWrap); sections.push(gfDiv);
    return sections;

  function renderRoundRobin() {
    var t = tourney, sections = [];
    var standings = rrStandings(t);
    var played = 0; t.schedule.forEach(function(m) { if (m.winner != null) played++; });
    var total = t.schedule.length;
    var finalists = t.final ? [t.final.a, t.final.b] : [];

    // Standings
    var tbl = el("table", { class:"rr-standings" });
    tbl.appendChild(el("tr", {}, [el("th", {}, ["Team"]), el("th", { class:"num" }, ["W"]), el("th", { class:"num" }, ["L"])]));
    standings.forEach(function(s) {
      var isCh = t.champion === s.idx;
      var isFin = !isCh && (finalists.indexOf(s.idx) >= 0);
      tbl.appendChild(el("tr", { class: isCh ? "rr-champ" : isFin ? "rr-finalist" : "" }, [
        el("td", {}, [t.teams[s.idx].name]),
        el("td", { class:"num" }, [String(s.wins)]),
        el("td", { class:"num" }, [String(s.losses)])
      ]));
    });
    sections.push(el("div", { class:"bracket-section" }, [el("div", { class:"bracket-section-head" }, ["Standings"]), tbl]));

    // Schedule
    var schedDiv = el("div", { class:"bracket-section" }, [
      el("div", { class:"bracket-section-head" }, ["Schedule · " + played + " / " + total + " played"])
    ]);
    var schedList = el("div", { class:"rr-schedule" });
    t.schedule.forEach(function(m, idx) {
      var decided = m.winner != null;
      var ready = !decided;
      var resultEl = decided
        ? el("span", { class:"rr-result set" }, [t.teams[m.winner].name + " won"])
        : el("span", { class:"rr-result" }, ["–"]);
      var row = el("div", { class:"rr-row" }, [
        el("span", { class:"rr-teams" }, [t.teams[m.a].name, el("span", { class:"rr-vs" }, [" vs "]), t.teams[m.b].name]),
        resultEl
      ]);
      if (ready || decided) {
        row.style.cursor = "pointer";
        row.addEventListener("click", function() { ui.matchMenu = { bracket: "rr", idx: idx, confirm: null }; render(); });
      }
      schedList.appendChild(row);
    });
    schedDiv.appendChild(schedList);
    sections.push(schedDiv);

    // Championship Final
    if (t.final) {
      var finDiv = el("div", { class:"bracket-section" }, [el("div", { class:"bracket-section-head gf" }, ["Championship Final"])]);
      var finWrap = el("div", { class:"gf-wrap" });
      finWrap.appendChild(renderMBox(t, t.final, { bracket: "rr", isFinal: true }));
      finDiv.appendChild(finWrap); sections.push(finDiv);
    }

    return sections;
  }

  function renderSeries() {
    var t = tourney, sections = [];
    var wins = seriesWins(t), tgt = seriesTarget(t);
    var decided = lastDecidedSeriesGame(t) + 1;

    // Scoreboard
    var scoreWrap = el("div", { class:"series-score" }, [
      el("div", { class:"series-side" }, [
        el("span", { class:"series-team-name" + (t.champion === 0 ? " champ" : "") }, [t.teams[0].name]),
        el("span", { class:"series-wins" + (t.champion === 0 ? " champ" : "") }, [String(wins[0])])
      ]),
      el("div", { class:"series-dash" }, ["–"]),
      el("div", { class:"series-side" }, [
        el("span", { class:"series-wins" + (t.champion === 1 ? " champ" : "") }, [String(wins[1])]),
        el("span", { class:"series-team-name" + (t.champion === 1 ? " champ" : "") }, [t.teams[1].name])
      ])
    ]);
    var sub = t.champion != null
      ? ("Series over · " + decided + " game" + (decided === 1 ? "" : "s") + " played")
      : ("Best of " + t.bestOf + " · first to " + tgt + " game wins");
    var scoreSection = el("div", { class:"bracket-section" }, [
      el("div", { class:"bracket-section-head" }, ["Series"]),
      scoreWrap,
      el("p", { class:"series-sub disp" }, [sub])
    ]);
    // helper: does a game have a live, in-progress scorepad?
    function gameInProgress(g) { return g.winner == null && g.game && g.game.deals && g.game.deals.length > 0; }
    // Tappable hint so everyone (host and guests) can jump straight to the live/next game.
    if (t.champion == null) {
      var ipIdx = -1, nextIdx = -1;
      for (var hi = 0; hi < t.games.length; hi++) {
        if (t.games[hi].winner != null) continue;
        if (gameInProgress(t.games[hi])) { ipIdx = hi; break; }
        if (nextIdx < 0) nextIdx = hi;
      }
      var hintIdx = ipIdx >= 0 ? ipIdx : nextIdx;
      if (hintIdx >= 0) {
        var live = ipIdx >= 0, hIdx = hintIdx;
        scoreSection.appendChild(el("p", { class:"tnext disp", style:"cursor:pointer;",
          onClick:function(){ ui.matchMenu = { bracket: "series", gi: hIdx, confirm: null }; render(); } },
          [ live ? ("Game " + (hIdx + 1) + " in progress — tap to watch") : ("Next up: Game " + (hIdx + 1) + " — tap to play") ]));
      }
    }
    sections.push(scoreSection);

    // Game-by-game list
    var gamesDiv = el("div", { class:"bracket-section" }, [el("div", { class:"bracket-section-head" }, ["Games"])]);
    var list = el("div", { class:"rr-schedule" });
    t.games.forEach(function(g, gi) {
      var gdecided = g.winner != null;
      var inProg = gameInProgress(g);
      var isNext = !gdecided && !inProg && t.champion == null;
      var scoreGame = (g.game && g.game.deals && g.game.deals.length) ? g.game
                    : (g.completedGame && g.completedGame.deals && g.completedGame.deals.length) ? g.completedGame : null;
      var scores = scoreGame ? gameTotals(scoreGame) : null;
      var resultEl;
      if (gdecided) {
        resultEl = el("span", { class:"rr-result set" }, [t.teams[g.winner].name + " won" + (scores ? " " + scores[g.winner] + "–" + scores[1 - g.winner] : "")]);
      } else if (inProg) {
        resultEl = el("span", { class:"rr-result live" }, ["in progress · " + scores[0] + "–" + scores[1]]);
      } else {
        resultEl = el("span", { class:"rr-result" }, [isNext ? "tap to play" : "–"]);
      }
      var row = el("div", { class:"rr-row" + (isNext ? " series-next" : "") + (inProg ? " series-live" : "") }, [
        el("span", { class:"series-game-label mono" }, ["Game " + (gi + 1)]),
        resultEl
      ]);
      row.style.cursor = "pointer";
      row.addEventListener("click", function() { ui.matchMenu = { bracket: "series", gi: gi, confirm: null }; render(); });
      list.appendChild(row);
    });
    gamesDiv.appendChild(list);
    sections.push(gamesDiv);

    return sections;
  }

  function renderBracket() {
    var t = tourney;
    var headTitle = t.format === "series" ? ("Best of " + t.bestOf + " Series") : ("Tournament · " + formatName(t.format));
    var card = el("div", { class:"pad" + (suppressFade ? "" : " fade") }, [ el("div", { class:"view-head disp" }, [headTitle]) ]);

    // Sync error banner — shown when startSharedTournament write failed
    if (ui.syncError) {
      card.appendChild(el("div", { class:"sync-bar disp", style:"background:#fff3f3; border-bottom:1px solid var(--red);" }, [
        el("span", { style:"font-size:13px; color:var(--red); flex:1;" }, [ui.syncError]),
        el("button", { class:"del", style:"flex:none;", onClick:function(){ ui.syncError = null; render(); } }, ["✕"])
      ]));
    }

    // Sync notice — e.g. "tournament restarted, new code" after a rematch/redraw
    if (ui.syncNotice) {
      card.appendChild(el("div", { class:"sync-bar disp", style:"background:#f3fff3; border-bottom:1px solid #52a852;" }, [
        el("span", { style:"font-size:13px; color:#2e7d32; flex:1;" }, [ui.syncNotice]),
        el("button", { class:"del", style:"flex:none;", onClick:function(){ ui.syncNotice = null; render(); } }, ["✕"])
      ]));
    }

    // Sync bar — shows join code and live status when Firebase is active
    if (syncCode) {
      var offline = typeof navigator.onLine === "boolean" && !navigator.onLine;
      var dotEl = el("span", { class:"sync-dot " + (offline ? "offline" : syncStatus) });
      var statusTxt = offline ? "Offline — sync paused" : syncStatus === "live" ? "Live" : syncStatus === "connecting" ? "Syncing…" : "Sync lost";
      var codeStr = syncCode;
      var codeBtn = el("button", { class:"join-code", title:"Tap to copy", onClick:function(){
        try {
          navigator.clipboard.writeText(codeStr).then(function(){
            codeBtn.textContent = "Copied!";
            setTimeout(function(){ codeBtn.textContent = codeStr; }, 1500);
          });
        } catch(e) {}
      } }, [codeStr]);
      var meNow = myNameForCurrentTourney();
      var playingAsToggle = el("button", {
        class:"link-btn disp",
        "aria-expanded": ui.playingAsOpen ? "true" : "false",
        "aria-label": ui.playingAsOpen ? "Hide player info" : "Show player info",
        onClick:function(){ ui.playingAsOpen = !ui.playingAsOpen; render(); }
      }, [ ui.playingAsOpen ? "▾" : "▸" ]);
      card.appendChild(el("div", { class:"sync-bar" }, [
        el("span", { class:"sync-pill" }, [dotEl, el("span", { class:"sync-label" }, [statusTxt])]),
        el("span", { style:"display:inline-flex; align-items:center; gap:10px;" }, [
          el("span", { class:"join-code-badge" }, [
            el("span", { class:"sync-label disp" }, ["Code: "]),
            codeBtn
          ]),
          playingAsToggle
        ])
      ]));
      if (ui.playingAsOpen) {
        card.appendChild(el("div", { class:"sync-bar" }, [
          el("span", { class:"sync-label disp" }, [ meNow ? ("Playing as: " + meNow) : "Not tagged as a player" ]),
          el("button", { class:"link-btn disp", onClick:function(){ ui.whoSheet = true; render(); } }, [ meNow ? "Change" : "I'm playing as…" ])
        ]));
      }
    }

    if (t.champion != null) {
      var champMsg = t.format === "series"
        ? (t.teams[t.champion].name + " win the series " + seriesWins(t)[t.champion] + "–" + seriesWins(t)[1 - t.champion] + "!")
        : ("Champions: " + t.teams[t.champion].name);
      card.appendChild(el("div", { class:"banner disp" }, [champMsg]));
      // In a shared tournament only the host can restart it (it spins up a new synced
      // session); guests follow automatically. Local tournaments: anyone can restart.
      if (!syncCode || syncRole === "host") {
        card.appendChild(el("div", { class:"rematch" }, [
          el("button", { class:"btn btn-new disp", style:"margin-bottom:8px;", onClick:rematchSameTeams }, ["Rematch — same teams"]),
          el("button", { class:"btn btn-add disp", onClick:redrawAndReplay }, ["Redraw teams & play again"])
        ]));
      } else {
        card.appendChild(el("p", { class:"sync-label disp", style:"text-align:center; padding:8px 12px;" }, ["Waiting for the host to start a rematch…"]));
      }
    } else if (t.format === "single") {
      var nx = nextMatch(t);
      if (nx) {
        var nxRi = nx.ri, nxMi = nx.mi;
        card.appendChild(el("p", { class:"tnext disp", style:"cursor:pointer;", onClick:function(){ ui.matchMenu = { ri:nxRi, mi:nxMi, confirm:null }; render(); } }, ["Next up: ", el("b", {}, [t.teams[nx.a].name]), " vs ", el("b", {}, [t.teams[nx.b].name]), " — tap to play"]));
      }
    }
    if (t.format === "single") {
      card.appendChild(renderBracketDiagram(t));
    } else if (t.format === "double") {
      renderDoubleElim().forEach(function(s) { card.appendChild(s); });
    } else if (t.format === "round") {
      renderRoundRobin().forEach(function(s) { card.appendChild(s); });
    } else if (t.format === "series") {
      renderSeries().forEach(function(s) { card.appendChild(s); });
    }

    var isSeries = t.format === "series";
    if (ui.confirmEndT) {
      card.appendChild(el("div", { class:"dealer-confirm fade" }, [
        el("p", { class:"disp", style:"margin:0 0 10px; font-size:15px; color:var(--ink);" }, [isSeries ? "End this series and clear it?" : "End this tournament and clear the bracket?"]),
        el("div", { style:"display:flex; gap:8px;" }, [
          el("button", { class:"btn btn-cancel disp", onClick:function(){ ui.confirmEndT = false; render(); } }, ["Keep it"]),
          el("button", { class:"btn btn-danger disp", onClick:function(){ tourney = null; saveTourney(); ui.confirmEndT = false; render(); } }, ["Yes, end it"])
        ])
      ]));
    } else {
      card.appendChild(el("div", { class:"add-wrap" }, [
        el("button", { class:"btn btn-cancel disp", style:"flex:0 0 auto; align-self:center; padding:12px 24px;", onClick:function(){ ui.confirmEndT = true; render(); } }, [isSeries ? "End Series" : "End Tournament"])
      ]));
    }
    viewRootEl.appendChild(card);
    var nw = viewRootEl.querySelector(".bracket-wrap");
    if (nw) nw.scrollLeft = bracketScroll;     // keep scroll position after a pick
    suppressFade = false;
  }

  var SVGNS = "http://www.w3.org/2000/svg";
  function renderBracketDiagram(t) {
    var rounds = t.rounds, rowH = 74, colW = 150, boxW = 130, boxH = 52;
    var n0 = rounds[0].length, totalH = n0 * rowH, width = rounds.length * colW + 16;
    var inner = el("div", { class:"bracket-inner", style:"position:relative; width:" + width + "px; height:" + totalH + "px;" });
    var svg = document.createElementNS(SVGNS, "svg");
    svg.setAttribute("width", width); svg.setAttribute("height", totalH);
    svg.setAttribute("style", "position:absolute; left:0; top:0; pointer-events:none;");
    inner.appendChild(svg);
    function cy(r, m) { return (m + 0.5) * Math.pow(2, r) * rowH; }
    rounds.forEach(function (round, r) {
      round.forEach(function (m, mi) {
        var x = r * colW + 8, y = cy(r, mi) - boxH / 2;
        var box = renderMatchBox(t, r, mi);
        box.setAttribute("style", "position:absolute; left:" + x + "px; top:" + y + "px; width:" + boxW + "px;");
        inner.appendChild(box);
        if (r < rounds.length - 1) {
          var x1 = x + boxW, y1 = cy(r, mi), nx = (r + 1) * colW + 8, ny = cy(r + 1, Math.floor(mi / 2)), midx = (x1 + nx) / 2;
          var path = document.createElementNS(SVGNS, "path");
          path.setAttribute("d", "M" + x1 + " " + y1 + " H" + midx + " V" + ny + " H" + nx);
          path.setAttribute("fill", "none"); path.setAttribute("stroke", getComputedStyle(document.documentElement).getPropertyValue("--rule").trim()); path.setAttribute("stroke-width", "1.5");
          svg.appendChild(path);
        }
      });
    });
    return el("div", { class:"bracket-wrap" }, [inner]);
  }

  function renderMatchBox(t, r, mi) {
    var m = t.rounds[r][mi];
    var decided = m.winner != null;
    var ready = (m.a != null && m.b != null && m.winner == null);
    var scoreGame = (m.game && m.game.deals && m.game.deals.length) ? m.game
                  : (m.completedGame && m.completedGame.deals && m.completedGame.deals.length) ? m.completedGame
                  : null;
    var scores = scoreGame ? gameTotals(scoreGame) : null;
    function slot(idx, scoreIdx) {
      var isBye = idx == null && r === 0;
      var label = idx == null ? (isBye ? "bye" : "—") : t.teams[idx].name;
      var isWin = decided && idx != null && m.winner === idx;
      var kids = [ el("span", { class:"mbox-slot-name" + (isBye ? " bye" : "") }, [ label ]) ];
      if (scores) kids.push(el("span", { class:"mbox-score" }, [ String(scores[scoreIdx]) ]));
      return el("div", { class:"mbox-slot" + (isWin ? " win" : "") }, kids);
    }
    var kids = [ slot(m.a, 0), slot(m.b, 1) ];
    var changeable = decided && m.b != null; // decided non-bye: tappable for winner edit
    return el("div", { class:"mbox" + (ready ? " ready" : "") + (changeable ? " changeable" : ""),
      onClick: (ready || changeable) ? function(){ ui.matchMenu = { ri:r, mi:mi, confirm:null }; render(); } : null }, kids);
  }

  document.getElementById("settingsToggle").addEventListener("click", function () {
    if (!game.deals.length) { newGame(); return; }   // empty game — nothing to confirm
    ui.confirmReset = !ui.confirmReset;
    ui.showSettings = false;
    render();
  });

  document.getElementById("menuBtn").addEventListener("click", function () {
    ui.showThemeSheet = true;
    render();
  });

  window.addEventListener("resize", function () {
    if (ui.view === "history") applyScoreWrap();
  });

  // Offline shell cache (sw.js) + keep the sync bar's offline note current.
  // file:// has no SW support; skip so local dev keeps working.
  if ("serviceWorker" in navigator && location.protocol !== "file:") {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }
  window.addEventListener("online", function () { if (!sheetOpen()) render(); });
  window.addEventListener("offline", function () { if (!sheetOpen()) render(); });

  // ---- hardware/browser back closes the top UI layer instead of leaving ----
  // One sentinel history entry is kept while any layer is open; popstate
  // consumes it, closes the layer, and re-arms if more layers remain.
  var backArmed = false;
  function armBackGuard() {
    if (backArmed) return;
    try { history.pushState({ somerset: 1 }, "", ""); backArmed = true; } catch (e) {}
  }
  function closeTopLayer() {
    if (ui.showThemeSheet) { ui.showThemeSheet = false; render(); return true; }
    if (ui.mergeSheet) {
      ui.mergeSheet = (ui.mergeSheet.step === 3) ? { step:2 } : (ui.mergeSheet.step === 2) ? { step:1 } : null;
      render();
      return true;
    }
    if (ui.info != null) { ui.info = null; render(); return true; }
    if (ui.confirmReset) { ui.confirmReset = false; render(); return true; }
    if (ui.seatMenu !== null) { closeSeatMenu(); return true; }
    if (ui.whoSheet) { ui.whoSheet = false; render(); return true; }
    if (ui.joinSheet) { ui.joinSheet = false; ui.joinError = null; render(); return true; }
    if (ui.backConfirm) { ui.backConfirm = false; render(); return true; }
    if (ui.matchMenu != null) { ui.matchMenu = null; render(); return true; }
    if (ui.showEntry) {
      ui.showEntry = false; ui.entryStep = 1; ui.editingDeal = null;
      if (game.pendingBid) { game.pendingBid = null; persist(); } else render();
      return true;
    }
    if (ui.activeMatch) { leaveMatch(); return true; }
    if (ui.view === "history" && ui.historySub) {
      ui.historySub = (ui.historySub === "player") ? "board" : null;
      if (ui.historySub !== "player") ui.statsPlayer = null;
      render();
      return true;
    }
    if (ui.view !== "game") { ui.view = "game"; render(); return true; }
    return false;
  }
  window.addEventListener("popstate", function () {
    backArmed = false;
    if (closeTopLayer()) armBackGuard();
  });
  armBackGuard();

  document.addEventListener("keydown", function (e) {
    if (e.key !== "Escape") return;
    if (ui.showThemeSheet) { ui.showThemeSheet = false; render(); }
    else if (ui.mergeSheet) { ui.mergeSheet = null; render(); }
    else if (ui.info) { ui.info = null; render(); }
    else if (ui.matchMenu) { ui.matchMenu = null; render(); }
    else if (ui.seatMenu !== null) { ui.seatMenu = null; ui.seatMenuMode = "menu"; render(); }
    else if (ui.pendingDealer !== null) { ui.pendingDealer = null; render(); }
  });

  render();
})();
</script>
</body>
</html>

    // (see the totals loop below), so it doesn't disappear the moment the next game
    // starts. Once this game ends, the fuller series-score displays elsewhere (the
    // "Play Game N" screen, or the bracket view) take over.
    var seriesInfo = (win !== null) ? null : isMatch
      ? (tourney && tourney.format === "series" ? { wins:seriesWins(tourney), bestOf:tourney.bestOf } : null)
      : (ui.series ? { wins:ui.series.wins, bestOf:ui.series.bestOf }
          : (gameHasTourneyLink() && tourney.bestOf > 1 ? { wins:seriesWins(tourney), bestOf:tourney.bestOf } : null));
    var seriesPips = function (n) {
      var dots = [];
      for (var i = 0; i < seriesInfo.bestOf; i++) dots.push(el("span", { class:"series-pip" + (i < n ? " on" : "") }));
      return dots;
    };

    // Totals — iterated in viewer-perspective order (teamViewOrder), so "my"
    // team always renders first/left regardless of its real underlying index.
    var totalsGrid = el("div", { class:"totals" });
    var teamNameEls = [];   // read-only match names — heights equalized below so scores stay aligned
    teamViewOrder().forEach(function (i, pos) {
      var nameInput;
      if (isMatch) {
        // Combined "A & B" names can be long; an <input> can't wrap so it clips.
        // Render the two players as separate spans so the name can wrap between
        // them (each full name kept intact). "&" is bound to the first name with
        // a non-breaking space. equalizeTeamNames() decides below whether to
        // stack the partner onto its own line so both teams match.
        var parts = game.teams[i].split(" & ");
        var kids = parts.length === 2
          ? [ el("span", { class:"tn-a" }, [parts[0] + String.fromCharCode(160) + "&"]),
              el("span", { class:"tn-b" }, [" " + parts[1]]) ]
          : [ game.teams[i] ];
        nameInput = el("div", { class:"team-name team-name-ro disp", "aria-label":"Team "+(i+1)+" name" }, kids);
        teamNameEls.push(nameInput);
      } else {
        nameInput = el("input", { class:"team-name disp", value:teamLabel(i), "aria-label":"Team "+(i+1)+" name",
          onChange:function(e){ game.teams[i] = e.target.value; persist(); } });
      }
      var scoreColor = "var(--ink)";
      var bar = el("div", { class:"track", role:"img",
        "aria-label":teamLabel(i)+": "+t[i]+" of "+game.target+" points" }, [
        el("span", { style:"width:"+Math.min(100,(Math.max(0,t[i])/game.target)*100)+"%; background:"+(pos===0?"#2E1B3A":"var(--rule)")+";" })
      ]);
      var teamKids = [
        nameInput,
        el("div", { class:"score mono", style:"color:"+scoreColor+";" }, [String(t[i])]),
        bar
      ];
      if (seriesInfo) teamKids.push(el("div", { class:"series-pips-dots" }, seriesPips(seriesInfo.wins[i])));
      var team = el("div", { class:"team", style:"grid-column:"+(pos===0?1:3)+";" }, teamKids);
      totalsGrid.appendChild(team);
    });
    totalsGrid.appendChild(el("div", { class:"divider", style:"grid-column:2;" }));
    pad.appendChild(totalsGrid);

    // Dealer table
    pad.appendChild(renderTable());

    // Deal history
    var history = el("div", { style:"padding:4px 0;" });
    // Refs for the currently-open row's Trump/digit alignment (see alignDealDetail),
    // and every row's "<name> bid X" line (see alignDealDesc); reset each render
    // since a torn-down row's nodes would otherwise linger stale.
    target.__dealAlign = null;
    target.__dealBidRows = [];
    // A torn-down row's swipe (if any) no longer exists in the new DOM, so drop any
    // stale reference to it rather than let the global pointerdown listener above
    // try to close a detached row.
    swipeCoord.current = null;
    swipeCoord.wrapEl = null;
    // Viewer-perspective column order, so the deal scores line up under the totals
    // scoreboard above (which uses this same order) — the viewer's own team on the
    // left. Header row labels the columns with each team's initials (see teamBadge).
    var tvo = teamViewOrder();
    var hasDealRows = game.deals.length > 0 || (game.pendingBid && !(ui.showEntry && ui.editingDeal == null));
    if (hasDealRows) {
      history.appendChild(el("div", { class:"deal-head disp", "aria-hidden":"true" }, [
        el("span", { class:"deal-score-block deal-head-score" }, [
          el("span", { class:"dh-cell l" }, [ teamBadge(game.teams, game.players, tvo[0]) ]),
          el("span", { class:"dash" }, ["|"]),
          el("span", { class:"dh-cell r" }, [ teamBadge(game.teams, game.players, tvo[1]) ])
        ]),
        el("span", { class:"deal-head-bid" }, ["Bid"]),
        el("span", { class:"deal-head-dealer" }, ["Dealer"])
      ]));
    }
    if (game.deals.length > 0) {
      var runningScore = [0, 0];
      game.deals.forEach(function (d, idx) {
        var r = dealResult(d), isSet = r[2];
        var delta = dealDelta(d, runningScore);
        runningScore[0] += delta[0]; runningScore[1] += delta[1];
        // Older deals recorded before bidder tracking existed have no bidderSeat,
        // so they fall back to naming the team instead of a specific player.
        var bidderLabel = (d.bidderSeat != null) ? seatName(d.bidderSeat) : teamLabel(d.bidTeam);
        // bidNumEl is null for a moon bid ("shot the moon" has no digit to show).
        var bidNumEl = null, innerKids;
        if (d.bid === POINTS_PER_DEAL) {
          // Made moons get the accent color (set-flag's default red overridden inline);
          // failed attempts keep set-flag's default red — mirrors success/failure so
          // the color alone tells the story.
          innerKids = isMoonMade(d)
            ? [ bidderLabel + " shot the", el("strong", { class:"set-flag disp", style:"color:var(--brass-text);" }, ["MOON"]) ]
            : [ bidderLabel + " shot the", el("strong", { class:"set-flag disp" }, ["MOON"]) ];
        } else {
          bidNumEl = el("span", { class:"deal-desc-num" }, [String(d.bid)]);
          innerKids = [ bidderLabel + " bid ", bidNumEl ];
        }
        var setMsg = !isSet ? null
          : (d.bid === POINTS_PER_DEAL)
            ? (bidderLabel + " attempted to shoot the moon but only took " + d.pts[d.bidTeam] + " — " + d.bid + " subtracted from their score.")
            : (bidderLabel + " went SET this hand: they bid " + d.bid + " but took only " + d.pts[d.bidTeam] + ", so " + d.bid + " was subtracted from their score.");
        var dlr = (typeof d.dealer === "number") ? d.dealer : ((game.dealerStart + idx) % 4 + 4) % 4;
        var isOpen = ui.openDeal === d.id;
        var scoreBlockEl = el("span", { class:"deal-score-block" }, [
          scoreCell(delta[tvo[0]], (isSet && d.bidTeam === tvo[0]) ? setMsg : null, true),
          el("span", { class:"dash" }, ["|"]),
          scoreCell(delta[tvo[1]], (isSet && d.bidTeam === tvo[1]) ? setMsg : null)
        ]);
        var innerEl = el("span", { class:"deal-desc-inner" }, innerKids);
        var descEl = el("span", { class:"deal-desc disp" }, [innerEl]);
        target.__dealBidRows.push({ innerEl:innerEl, descEl:descEl });
        // Dealer column now names the dealer outright (the rotated seat arrow it
        // used to show read as a near-identical stroke at 13px, and the name is
        // what people actually want to know at a glance).
        var dealerLabelEl = el("span", { class:"deal-dealer disp" }, [ seatName(dlr) ]);
        var rowEl = el("div", {
          class:"deal-row" + (isOpen ? " open" : "") + (noFade ? "" : " fade"),
          role:"button", tabindex:"0", "aria-expanded": isOpen ? "true" : "false",
          "aria-label":"Deal " + (idx+1) + ", show dealer and options",
          onClick:function(){ ui.openDeal = isOpen ? null : d.id; softRender(); }
        }, [
          scoreBlockEl,
          descEl,
          dealerLabelEl
        ]);
        history.appendChild(isReadOnly ? rowEl : makeSwipeRow(rowEl,
          function(){ startEditDeal(d); },
          function(){ removeDealWithUndo(d, idx); }));
        if (isOpen) {
          // Trump recording disabled for now (see renderEntry()/recordDeal() below).
          // var trumpVal = d.trump ? ((d.trump === "No trump" || d.trump === "0") ? "None" : d.trump) : "-";
          var takenPts = d.pts[d.bidTeam];
          // The collapsed row above already says "<team> bid <bid>" — don't repeat it here.
          var takenNumEl = el("span", { class:"deal-desc-num" }, [String(takenPts)]);
          var bidLineKids = [ teamLabel(d.bidTeam) + " took ", takenNumEl ];
          if (isSet) bidLineKids.push(" (set)");
          // var trumpEl = el("span", { class:"deal-detail-trump" }, ["Trump:", el("b", {}, [trumpVal])]);
          // Kept as an empty spacer: alignDealDetail() sizes this to match .deal-score-block's
          // width so the "took" line below centers under the score row above it.
          var trumpEl = el("span", { class:"deal-detail-trump" }, []);
          var bidLineInnerEl = el("span", { class:"deal-bid-line-inner" }, bidLineKids);
          var bidLineEl = el("span", { class:"deal-bid-line disp" + (isSet ? " red" : "") }, [bidLineInnerEl]);
          // The dealer's name is shown in the collapsed row's Dealer column now, so
          // the expanded detail no longer repeats it — just the "<team> took N" line.
          history.appendChild(el("div", { class:"deal-detail disp" + (noFade ? "" : " fade") }, [
            trumpEl,
            bidLineEl
          ]));
          target.__dealAlign = {
            scoreBlockEl:scoreBlockEl, trumpEl:trumpEl,
            bidNumEl:bidNumEl, takenNumEl:takenNumEl, bidLineEl:bidLineEl, bidLineInnerEl:bidLineInnerEl
          };
        }
      });
    }
    // A bid confirmed by the entering device (game.pendingBid, set in renderEntry's
    // step 1 → step 2 transition) but not yet recorded gets its own row here, so
    // spectators see the bidder and bid land in the table immediately instead of
    // waiting for the full deal. The score columns stay blank — points aren't known
    // until recordDeal() runs — and the row is skipped on the entering device itself,
    // which already shows the same info in its open entry sheet.
    if (game.pendingBid && !(ui.showEntry && ui.editingDeal == null)) {
      var pb = game.pendingBid;
      var pbBidderLabel = (pb.bidderSeat != null) ? seatName(pb.bidderSeat) : teamLabel(pb.bidTeam);
      var pbInnerKids = (pb.bid === POINTS_PER_DEAL)
        ? [ pbBidderLabel + " shot the", el("strong", { class:"set-flag disp" }, ["MOON"]) ]
        : [ pbBidderLabel + " bid ", el("span", { class:"deal-desc-num" }, [String(pb.bid)]) ];
      var pbDlr = dealerSeat();
      var pbScoreBlockEl = el("span", { class:"deal-score-block" }, [
        pendingScoreCell(true),
        el("span", { class:"dash" }, ["|"]),
        pendingScoreCell()
      ]);
      var pbInnerEl = el("span", { class:"deal-desc-inner" }, pbInnerKids);
      var pbDescEl = el("span", { class:"deal-desc disp" }, [pbInnerEl]);
      target.__dealBidRows.push({ innerEl:pbInnerEl, descEl:pbDescEl });
      var pbDealerLabelEl = el("span", { class:"deal-dealer disp" }, [ seatName(pbDlr) ]);
      history.appendChild(el("div", {
        class:"deal-row pending" + (noFade ? "" : " fade"),
        "aria-label":"Deal " + dealNo + " in progress, points not yet recorded"
      }, [ pbScoreBlockEl, pbDescEl, pbDealerLabelEl ]));
    }
    pad.appendChild(history);

    // Entry or Add button
    var gameOver = (win === 0 || win === 1);
    if (isReadOnly) {
      var viewBarText = gameOver
        ? ("Match complete: " + game.teams[win] + " Won")
        : (game.pendingBid
            ? ((game.pendingBid.bidderSeat != null ? seatName(game.pendingBid.bidderSeat) : game.teams[game.pendingBid.bidTeam]) + (game.pendingBid.bid === POINTS_PER_DEAL ? " bid 14 (moon)" : (" bid " + game.pendingBid.bid)) + ", playing the hand")
            : "Viewing: being edited on another device");
      pad.appendChild(el("div", { class:"view-only-bar disp" }, [viewBarText]));
    } else if (ui.showEntry) {
      pad.appendChild(renderEntry(dealNo));
    } else if (gameOver) {
      if (isMatch) {
        pad.appendChild(el("div", { class:"add-wrap" }, [
          el("button", { class:"btn btn-new disp", onClick:returnToBracket }, ["Return to Bracket"])
        ]));
      } else if (gameHasTourneyLink()) {
        if (tourney.champion != null) {
          var champKids = [];
          if (tourney.bestOf > 1) {
            var cw = seriesWins(tourney);
            champKids.push(el("p", { class:"series-sub disp" }, [
              tourney.teams[tourney.champion].name + " win the series " + cw[tourney.champion] + "–" + cw[1 - tourney.champion] + "!"
            ]));
          }
          champKids.push(el("button", { class:"btn btn-new disp", onClick:startNextSharedGame }, ["New Game"]));
          pad.appendChild(el("div", { class:"add-wrap" }, champKids));
        } else if (tourney.bestOf > 1) {
          // tourney.champion is deliberately still null here for the clinching game
          // itself (see recordDeal's comment) so this "Play Game N" button stays the
          // one wired to advanceSharedGame, which is what actually finalizes the
          // champion and offers the next-length escalation. But the score may
          // already have reached the series target on THIS game, so check for that
          // and show a "won the series" message + "Continue" instead of offering
          // a phantom next game that will never be played.
          var gsw = seriesWins(tourney), gTgt = seriesTarget(tourney);
          var gNextNum = gsw[0] + gsw[1] + 1;
          var gDecidedIdx = gsw[0] >= gTgt ? 0 : (gsw[1] >= gTgt ? 1 : null);
          pad.appendChild(el("div", { class:"add-wrap" }, [
            el("div", { class:"series-score" }, [
              el("div", { class:"series-side" }, [
                el("span", { class:"series-team-name" }, [game.teams[0]]),
                el("span", { class:"series-wins" }, [String(gsw[0])])
              ]),
              el("div", { class:"series-dash" }, ["–"]),
              el("div", { class:"series-side" }, [
                el("span", { class:"series-wins" }, [String(gsw[1])]),
                el("span", { class:"series-team-name" }, [game.teams[1]])
              ])
            ]),
            gDecidedIdx != null
              ? el("p", { class:"series-sub disp" }, [game.teams[gDecidedIdx] + " win the series " + gsw[gDecidedIdx] + "–" + gsw[1 - gDecidedIdx] + "!"])
              : el("p", { class:"series-sub disp" }, ["Best of " + tourney.bestOf]),
            el("button", { class:"btn btn-new disp", onClick:advanceSharedGame }, [gDecidedIdx != null ? "Continue" : ("Play Game " + gNextNum)])
          ]));
        } else {
          pad.appendChild(el("div", { class:"add-wrap" }, [
            el("button", { class:"btn btn-new disp", onClick:advanceSharedGame }, ["Continue"])
          ]));
        }
      } else if (ui.series) {
        var sw = ui.series.wins, nextNum = sw[0] + sw[1] + 1;
        pad.appendChild(el("div", { class:"add-wrap" }, [
          el("div", { class:"series-score" }, [
            el("div", { class:"series-side" }, [
              el("span", { class:"series-team-name" }, [game.teams[0]]),
              el("span", { class:"series-wins" }, [String(sw[0])])
            ]),
            el("div", { class:"series-dash" }, ["–"]),
            el("div", { class:"series-side" }, [
              el("span", { class:"series-wins" }, [String(sw[1])]),
              el("span", { class:"series-team-name" }, [game.teams[1]])
            ])
          ]),
          el("p", { class:"series-sub disp" }, ["Best of " + ui.series.bestOf]),
          el("button", { class:"btn btn-new disp", onClick:function(){ newGame(true); } }, ["Play Game " + nextNum])
        ]));
      } else {
        var kids = [];
        if (ui.seriesResult) {
          var sr = ui.seriesResult;
          kids.push(el("p", { class:"series-sub disp" }, [
            game.teams[sr.winnerIdx] + " win the series " + sr.wins[sr.winnerIdx] + "–" + sr.wins[1 - sr.winnerIdx] + "!"
          ]));
        }
        kids.push(el("button", { class:"btn btn-new disp", onClick:function(){ newGame(); } }, ["New Game"]));
        pad.appendChild(el("div", { class:"add-wrap" }, kids));
      }
    } else {
      var addAm = currentGameAm();
      var addKey = addAm ? handLockKey(addAm, null, dealNo) : null;
      if (addKey && !isMineOrUnlocked(addKey)) {
        pad.appendChild(el("div", { class:"view-only-bar disp" }, ["Someone else is currently entering this hand"]));
      } else {
        pad.appendChild(el("div", { class:"add-wrap" }, [
          el("button", { class:"btn btn-new disp", onClick:function(){
            var openEntry = function(){ ui.showEntry = true; ui.entryStep = 1; ui.bidderSeat = null; ui.bidderWarn = false; softRender(); scrollEntryIntoView(); };
            if (!addKey) { openEntry(); return; }
            claimLock(addKey, function(won){
              if (!won) { ui.info = "Someone else just started entering this hand."; softRender(); return; }
              ui.myLockKey = addKey;
              openEntry();
            });
          } }, ["Record Deal " + dealNo])
        ]));
      }
    }

    target.appendChild(pad);

    // Stash the read-only match names so the caller can equalize their heights
    // once the pad is attached to the document (match mode appends `target`
    // after this returns, so measuring here would read 0). Solo mode's target
    // is already attached, so equalize now; it's a no-op without match names.
    target.__teamNameEls = teamNameEls;
    target.__dealTableEl = pad.querySelector(".table");
    if (target.isConnected) equalizeTeamNames(teamNameEls);
    if (target.isConnected) alignDealDesc(target.__dealBidRows, target.__dealTableEl);
    if (target.isConnected) alignDealDetail(target.__dealAlign);
  }

  // The expanded deal row's Trump block is positioned by measuring the already-
  // rendered collapsed row (same pattern as equalizeTeamNames above) — widths built
  // from ch units + a bare glyph aren't reliably reproducible with a second,
  // independent CSS declaration, so we copy the real rendered pixels instead.
  function alignDealDetail(a) {
    if (!a) return;
    a.trumpEl.style.width = a.scoreBlockEl.getBoundingClientRect().width + "px";
    // Nudge the "took" line's digit to line up under the "bid" digit in the collapsed
    // row above (skipped for a moon bid — bidNumEl is null, nothing to align to), so
    // at a glance the bid and the take read as one column. Runs after alignDealDesc
    // (see call site below) so bidNumEl's rect already reflects its final position.
    // Clamped like alignDealDesc's per-row shift, so a big required nudge (e.g. a long
    // bidder name pushing the bid digit far right) never spills the "took" text into
    // the Trump spacer or the dealer's name.
    a.bidLineInnerEl.style.transform = "";
    if (a.bidNumEl) {
      var boxRect = a.bidLineEl.getBoundingClientRect();
      var innerRect = a.bidLineInnerEl.getBoundingClientRect();
      var curLeft = innerRect.left - boxRect.left;
      var delta = a.bidNumEl.getBoundingClientRect().left - a.takenNumEl.getBoundingClientRect().left;
      var minDelta = -curLeft, maxDelta = boxRect.width - innerRect.width - curLeft;
      if (delta < minDelta) delta = minDelta;
      if (delta > maxDelta) delta = maxDelta;
      a.bidLineInnerEl.style.transform = "translateX(" + delta + "px)";
    }
  }

  // Each collapsed row's full "<name> bid <n>" (or "shot the MOON") text is nudged
  // so its own center lands on the seating diagram's center (the ".table" element
  // above the history) — every row centers independently against that fixed external
  // reference rather than sharing a column with other rows, so a long name or a
  // "shot the MOON" suffix on one row can never throw off another row's position.
  // The shift is still clamped so it never pushes a row's own content past its own
  // box edges into the score or dealer columns — better to leave it off-center than
  // spill. Rows are { innerEl, descEl }: innerEl wraps the row's full text, descEl is
  // the available space between the score and dealer columns.
  function alignDealDesc(rows, tableEl) {
    if (!rows || !rows.length || !tableEl) return;
    var tableRect = tableEl.getBoundingClientRect();
    var tableCenter = tableRect.left + tableRect.width / 2;
    var i;
    for (i = 0; i < rows.length; i++) rows[i].innerEl.style.transform = "";
    for (i = 0; i < rows.length; i++) {
      var boxRect = rows[i].descEl.getBoundingClientRect();
      var innerRect = rows[i].innerEl.getBoundingClientRect();
      var curLeft = innerRect.left - boxRect.left;
      var delta = tableCenter - (innerRect.left + innerRect.width / 2);
      var minDelta = -curLeft, maxDelta = boxRect.width - innerRect.width - curLeft;
      delta = (maxDelta >= minDelta) ? Math.max(minDelta, Math.min(maxDelta, delta)) : 0;
      rows[i].innerEl.style.transform = "translateX(" + delta + "px)";
    }
  }

  // Column-aligns "bid" down the archived History detail's hand table. Each row is
  // { nameEl, innerEl, descEl }: nameEl is the bidder's name, innerEl wraps the row's
  // full "<name> bid <n>" text, and descEl is the available space between the score
  // and dealer columns. First, every nameEl is padded to the widest name in the list
  // (and right-aligned via CSS), so there's always exactly one space before "bid"
  // regardless of name length — capped to the row's own available width, so a name
  // too long to fit wraps onto a second line instead of forcing every row to
  // overflow. Then the row with that longest name is used as a baseline: its innerEl
  // is centered within its own descEl, and every other row's innerEl is shifted by
  // that same pixel amount — not re-centered individually — so "bid" stays lined up
  // beneath the baseline row's regardless of how wide the trailing bid number or
  // moon/set suffix is. The shift is clamped per row (not just for the baseline) so
  // a row whose own content is wider than the baseline's — e.g. a "shot the MOON"
  // suffix — never gets pushed past its own box edges into the dealer column; better
  // to leave it off-center than spill. There's no seating diagram in the archived
  // view to center against (see alignDealDesc for the live deal history), so this
  // column-alignment scheme is kept here on its own.
  function alignDealBidColumn(rows) {
    if (!rows || !rows.length) return;
    var i, ref = null, maxNameWidth = 0;
    for (i = 0; i < rows.length; i++) {
      rows[i].nameEl.style.minWidth = "";
      rows[i].innerEl.style.transform = "";
    }
    for (i = 0; i < rows.length; i++) {
      var w = rows[i].nameEl.getBoundingClientRect().width;
      if (w > maxNameWidth) { maxNameWidth = w; ref = rows[i]; }
    }
    if (!ref) return;
    maxNameWidth = Math.min(maxNameWidth, ref.descEl.getBoundingClientRect().width);
    for (i = 0; i < rows.length; i++) rows[i].nameEl.style.minWidth = maxNameWidth + "px";
    var boxRect = ref.descEl.getBoundingClientRect();
    var innerRect = ref.innerEl.getBoundingClientRect();
    var curLeft = innerRect.left - boxRect.left;
    var delta = (boxRect.width - innerRect.width) / 2 - curLeft;
    var minDelta = -curLeft, maxDelta = boxRect.width - innerRect.width - curLeft;
    delta = (maxDelta >= minDelta) ? Math.max(minDelta, Math.min(maxDelta, delta)) : 0;
    for (i = 0; i < rows.length; i++) {
      var rowDelta = delta;
      if (rows[i] !== ref) {
        var rBoxRect = rows[i].descEl.getBoundingClientRect();
        var rInnerRect = rows[i].innerEl.getBoundingClientRect();
        var rCurLeft = rInnerRect.left - rBoxRect.left;
        var rMinDelta = -rCurLeft, rMaxDelta = rBoxRect.width - rInnerRect.width - rCurLeft;
        rowDelta = (rMaxDelta >= rMinDelta) ? Math.max(rMinDelta, Math.min(rMaxDelta, delta)) : 0;
      }
      rows[i].innerEl.style.transform = "translateX(" + rowDelta + "px)";
    }
  }

  // If one match name wraps to two lines, stack the other team's partner onto
  // its own line too (so the two teams look balanced) and reserve matching
  // height, keeping the scores below vertically aligned.
  function equalizeTeamNames(els) {
    if (!els || els.length !== 2) return;
    els.forEach(function (e) { e.style.minHeight = ""; e.classList.remove("tn-stack"); });
    // If the names rendered at different heights, one wrapped — force both to stack.
    if (els[0].offsetHeight !== els[1].offsetHeight) {
      els.forEach(function (e) { e.classList.add("tn-stack"); });
    }
    var h = Math.max(els[0].offsetHeight, els[1].offsetHeight);
    els.forEach(function (e) { e.style.minHeight = h + "px"; });
  }

  function closeSeatMenu() { ui.seatMenu = null; ui.seatMenuMode = "menu"; ui.editNames = false; ui.seatMenuError = null; softRender(); }

  // deal/game-delete undo window's timing.
  var INFO_TOAST_MS = 2600;
  var infoToastEl = null, infoToastTimer = null;
  function showInfoToast(msg) {
    if (infoToastTimer) { clearTimeout(infoToastTimer); infoToastTimer = null; }
    if (infoToastEl && infoToastEl.parentNode) infoToastEl.parentNode.removeChild(infoToastEl);
    infoToastEl = el("div", { class:"undo-toast info-only fade disp", role:"status" }, [ el("span", {}, [msg]) ]);
    document.body.appendChild(infoToastEl);
    infoToastTimer = setTimeout(function () {
      if (infoToastEl && infoToastEl.parentNode) infoToastEl.parentNode.removeChild(infoToastEl);
      infoToastEl = null;
    }, INFO_TOAST_MS);
  }
  function removeDealWithUndo(d, idx) {
    var snapGame = game, snapArchivedId = game.archivedId, snapRec = null;
    if (game.archivedId) {
      for (var i = 0; i < gameHistory.length; i++) {
        if (gameHistory[i].id === game.archivedId) { snapRec = gameHistory[i]; break; }
      }
      // Deleting a deal after auto-archiving can change or undo the result,
      // so drop the now-stale entry; it'll re-archive if the game reaches a win again.
      gameHistory = gameHistory.filter(function(h){ return h.id !== game.archivedId; });
      saveHistory();
      game.archivedId = null;
    }
    game.deals = game.deals.filter(function(x){ return x.id !== d.id; });
    ui.openDeal = null;
    persist();
    showUndoToast("Deal " + (idx + 1) + " removed", function(){
      if (snapGame !== game) return;   // a different game is active now; nothing sane to restore into
      snapGame.deals.splice(Math.min(idx, snapGame.deals.length), 0, d);
      if (snapRec) {
        gameHistory.unshift(snapRec);
        gameHistory.sort(function(a,b){ return new Date(b.date) - new Date(a.date); });
        saveHistory();
        snapGame.archivedId = snapArchivedId;
      }
      persist();
    });
  }

  // Prefills the entry form from an existing deal and opens it in edit mode;
  // recordDeal() below checks ui.editingDeal to update that deal in place
  // instead of pushing a new one.
  function startEditDeal(d) {
    var am = currentGameAm();
    var openEditEntry = function(){
      ui.editingDeal = d.id;
      ui.bidTeam = d.bidTeam;
      ui.bidderSeat = allPlayersNamed() ? ((d.bidderSeat != null) ? d.bidderSeat : d.bidTeam) : null;
      ui.bidderWarn = false;
      ui.bid = d.bid;
      // ui.trump = d.trump || "";   // trump recording disabled for now
      ui.bidderPts = d.pts[d.bidTeam];
      ui.showEntry = true;
      ui.entryStep = 1;
      ui.openDeal = null;
      softRender();
      scrollEntryIntoView();
    };
    if (!am) { openEditEntry(); return; }
    var key = handLockKey(am, d.id, null);
    if (!isMineOrUnlocked(key)) { ui.info = "Someone else is editing this hand right now."; softRender(); return; }
    claimLock(key, function(won){
      if (!won) { ui.info = "Someone else is editing this hand right now."; softRender(); return; }
      ui.myLockKey = key;
      openEditEntry();
    });
  }

  function recordDeal() {
    var otherPts = POINTS_PER_DEAL - ui.bidderPts;
    var pts = ui.bidTeam === 0 ? [ui.bidderPts, otherPts] : [otherPts, ui.bidderPts];
    if (ui.editingDeal != null) {
      var editing = null;
      for (var i = 0; i < game.deals.length; i++) {
        if (game.deals[i].id === ui.editingDeal) { editing = game.deals[i]; break; }
      }
      if (editing) {
        // Editing can change or undo an already-archived result just like deleting
        // a deal does (see removeDealWithUndo) — drop the stale entry; it'll
        // re-archive below if the edit still leaves the game won.
        if (game.archivedId) {
          gameHistory = gameHistory.filter(function(h){ return h.id !== game.archivedId; });
          saveHistory();
          game.archivedId = null;
        }
        editing.bidTeam = ui.bidTeam; editing.bid = ui.bid; editing.bidderSeat = ui.bidderSeat; /* editing.trump = ui.trump.trim(); */ editing.pts = pts;
      }
      ui.editingDeal = null;
    } else {
      game.deals.push({ id:Date.now(), bidTeam:ui.bidTeam, bid:ui.bid, bidderSeat:ui.bidderSeat, /* trump:ui.trump.trim(), */ pts:pts, dealer:dealerSeat() });
    }
    game.pendingBid = null;
    // reset form, alternate default bidder
    ui.bidTeam = ui.bidTeam === 0 ? 1 : 0;
    ui.bidderSeat = null;
    ui.bid = 6; /* ui.trump = ""; */ ui.bidderPts = 6;
    ui.showEntry = false; ui.entryStep = 1;
    releaseMyHandLock();   // submitting the hand is the normal release point
    // Games archive themselves the moment they're won, so a result is never
    // lost to history just because nobody tapped a button. Tournament matches
    // (and a shared Game-tab series) still need an explicit continue tap before
    // the bracket/series itself advances (see returnToBracket / advanceSharedGame)
    // — only the History record is automatic here.
    if (!game.archivedId) {
      var win = winner();
      if (win === 0 || win === 1) {
        if (ui.activeMatch) {
          var am = ui.activeMatch, m = getActiveMatchObj(am);
          game.archivedId = archiveCurrentGame({ format: tourney.format, teams: [tourney.teams[m.a].name, tourney.teams[m.b].name], id: tourney.id, bestOf: tourney.bestOf }, am) || null;
        } else if (gameHasTourneyLink()) {
          var seriesAm = { bracket:"series", gi: tourney.games.length - 1 };
          game.archivedId = archiveCurrentGame({ format: tourney.format, teams: [tourney.teams[0].name, tourney.teams[1].name], id: tourney.id, bestOf: tourney.bestOf }, seriesAm) || null;
          // Record just the winner on the tourney's live slot right away so the
          // series tally is correct for the between-games screen the very next
          // render — advanceSharedGame still owns queuing the actual next game.
          // Scoped to an actual multi-game series: a plain best-of-1 shared game
          // defers everything, including which rematch prompt to offer, to the
          // explicit Continue tap (see advanceSharedGame's priorBestOf===1 branch).
          // Deliberately NOT recordSeriesResult here (that also sets t.champion):
          // once champion is non-null, the post-game screen's own champion check
          // takes priority and shows "New Game" instead of "Play Game N"/"Continue"
          // — which is the only button wired to advanceSharedGame, the one place a
          // shared series' escalate-to-the-next-length offer gets made. Setting
          // champion this early made that offer permanently unreachable for the
          // clinching game of any shared bestOf>1 series. Leave it to the explicit
          // advance tap, same as recordManualMatchWin/returnToBracket already do
          // for the Tournament tab's own bracket flow.
          if (tourney.format === "series" && tourney.bestOf > 1) tourney.games[tourney.games.length - 1].winner = win;
        } else {
          var seriesMeta = ui.series ? { format:"series", teams: game.teams.slice(), id: ui.series.id, bestOf: ui.series.bestOf } : null;
          game.archivedId = archiveCurrentGame(seriesMeta) || null;
          handleGameCompleteForSeries(win);
        }
      }
    }
    persist();
  }

  // `am` (the match descriptor) is only passed for a shared/synced match, so its
  // matchUid can dedup this record against a teammate's independently-archived
  // copy of the SAME match (see mergedHistoryForStats). A local/unsynced game
  // has no syncCode to key a matchUid against, so it's omitted there — same
  // "casual records never get this field" rule buildHistoryRecordForMatch follows.
  function archiveCurrentGame(meta, am) {
    if (!game.deals.length) return;
    var detail = winnerDetail();
    if (detail.winner === null) return;   // only archive completed games
    var id = genRecordId();
    var rec = {
      id: id,
      date: new Date().toISOString(),
      teams: game.teams.slice(),
      players: game.players.slice(),
      dealerStart: game.dealerStart,
      target: game.target,
      totals: totals(),
      winner: detail.winner,       // 0 or 1
      tieBreak: detail.tieBreak,   // true if both teams finished level and the bidder took it
      deals: JSON.parse(JSON.stringify(game.deals)),
      tournament: meta || null
    };
    if (am && syncCode) rec.matchUid = matchUid(am);
    gameHistory.unshift(rec);
    maybeHarvestPeers(rec);
    saveHistory();
    return id;
  }

  // True when the casual Game tab has hands entered that haven't been archived
  // yet — i.e. an unfinished game (archivedId is only ever set the instant a
  // winner is decided, see recordDeal). Anything that's about to replace the
  // global soloGame pointer out from under the Game tab (starting/rematching/
  // redrawing a Tournament-tab series) must check this first or the in-progress
  // game vanishes with no History record and no warning.
  function soloGameInProgress() {
    return soloGame.deals.length > 0 && !soloGame.archivedId;
  }
  function newGame(keepSeries) {
    dismissUndoToast();   // pending deal-undo would restore into the old game object
    if (!soloGame.archivedId) {   // safety net — normally already auto-archived on completion
      archiveCurrentGame(ui.series ? { format:"series", teams: soloGame.teams.slice(), id: ui.series.id, bestOf: ui.series.bestOf } : null);
    }
    var keep = { teams:soloGame.teams.slice(), players:soloGame.players.slice(), dealerStart:soloGame.dealerStart, target:soloGame.target };
    soloGame = freshGame();
    soloGame.teams = keep.teams; soloGame.players = keep.players; soloGame.dealerStart = keep.dealerStart; soloGame.target = keep.target;
    game = soloGame;
    ui.confirmReset = false; ui.showSettings = false; ui.showEntry = false; ui.entryStep = 1;
    if (!keepSeries) { ui.series = null; ui.offerSeries = null; ui.seriesResult = null; }
    persist();
  }

  // Shared counterpart to newGame() for a still-in-progress (not yet won) game —
  // discards the in-progress hand history and starts fresh in the SAME slot, same
  // join code. Unlike advanceSharedGame, there's no winner to record here, so no
  // series-target bookkeeping happens.
  function resetSharedGame() {
    setLiveSeriesGame(tourney, freshGameForTourneyTeams(tourney));
    if (fb && syncCode) tourney._createdAt = firebase.database.ServerValue.TIMESTAMP;
    ui.confirmReset = false; ui.showSettings = false; ui.showEntry = false; ui.entryStep = 1;
    saveTourney();
    render();
  }

  // Shared-series counterpart to newGame(): decides the just-finished game's slot
  // (mirrors returnToBracket's explicit "Return to Bracket" step — there's no
  // separate navigation here, so the tap itself both decides the slot and moves
  // on) then either queues the next game toward an already-set best-of-N target,
  // or — for a plain shared single game — offers one, same prompts a local solo
  // game shows (see handleGameCompleteForSeries).
  function advanceSharedGame() {
    var gi = tourney.games.length - 1;
    var slot = tourney.games[gi];
    var win = winner();
    var archivedId = slot.game.archivedId;   // set the instant this game was won, see recordDeal
    slot.completedGame = JSON.parse(JSON.stringify(slot.game));
    slot.game = null;
    // Keep soloGame pointed at the clone too — gameHasTourneyLink()'s disconnected-
    // orphan identity check needs it, and this is the one window (decided, but not
    // yet advanced to the next game or clinched) where neither .game nor a fresh
    // setLiveSeriesGame call would otherwise cover it.
    soloGame = slot.completedGame;
    var priorBestOf = tourney.bestOf;
    var champBefore = tourney.champion;
    setSeriesWinner(tourney, gi, win);   // also attaches the next game now, if the series isn't over
    if (fb && syncCode) tourney._createdAt = firebase.database.ServerValue.TIMESTAMP;
    // This device already has its own History record for the game just
    // finished — recordDeal's gameHasTourneyLink branch auto-archives the
    // instant a game is won, well before this Continue tap. Mark it
    // archived now that .game is null, so THIS device's own Firebase
    // subscription re-delivering this snapshot doesn't have
    // syncMyHistoryFromTourney (which defers exactly until .game is null,
    // see its comment) push a second, duplicate record for a match this
    // device already logged itself. Covers every game in the series, not
    // just a clinching one, since a multi-game series calls this once per
    // game.
    markMatchArchived({ bracket: "series", gi: gi });
    // If this game just crowned the champion, the record archived above
    // predates that (recordDeal archives before champion is known), so
    // badge it now — same as returnToBracket does for the bracket flow.
    if (tourney.champion != null && tourney.champion !== champBefore && archivedId) {
      var justArchived = gameHistory.filter(function (h) { return h.id === archivedId; })[0];
      if (justArchived && justArchived.tournament) {
        justArchived.tournament.championship = true;
        saveHistory();
      }
    }
    if (tourney.champion == null) {
      // Nothing left to do — setSeriesWinner already queued and attached it.
    } else if (priorBestOf === 1) {
      ui.offerSeries = { bestOf:3, seedWinner:win, linked:true };
    } else {
      var w = seriesWins(tourney);
      ui.seriesResult = { bestOf:priorBestOf, winnerIdx:win, wins:w.slice() };
      var nextBO = nextSeriesEscalation(priorBestOf);
      ui.offerSeries = nextBO ? { bestOf:nextBO, wins:w.slice(), linked:true } : null;
    }
    ui.confirmReset = false; ui.showSettings = false; ui.showEntry = false; ui.entryStep = 1;
    saveTourney();
    render();
  }

  // "New Game" after a shared series/plain game has clinched — keeps the same
  // join code (no re-join needed) and starts a fresh best-of-1 shared game,
  // mirroring newGame()'s default keepSeries:false: any completed target ends,
  // play continues clean.
  function startNextSharedGame() {
    tourney.bestOf = 1;
    tourney.champion = null;
    tourney.games.push({ a:0, b:1, winner:null, game:null, completedGame:null });
    setLiveSeriesGame(tourney, freshGameForTourneyTeams(tourney));
    if (fb && syncCode) tourney._createdAt = firebase.database.ServerValue.TIMESTAMP;
    ui.confirmReset = false; ui.showSettings = false; ui.showEntry = false; ui.entryStep = 1;
    ui.offerSeries = null; ui.seriesResult = null;
    saveTourney();
    render();
  }

  // Best-of-N follow-up for casual (non-tournament) games: offer a series once a
  // standalone game is won, track wins across the games the player then chooses
  // to play, and escalate best-of-3 -> best-of-5 -> best-of-7 on completion.
  function handleGameCompleteForSeries(win) {
    if (ui.series) {
      ui.series.wins[win]++;
      var target = Math.floor(ui.series.bestOf / 2) + 1;
      if (ui.series.wins[win] >= target) {
        var finished = ui.series;
        ui.seriesResult = { bestOf:finished.bestOf, winnerIdx:win, wins:finished.wins.slice() };
        ui.series = null;
        // Carry the series id and wins-so-far forward on escalation so the next
        // rung's games join the same history group as the ones that preceded
        // them, and the win count picks up where they left off rather than
        // restarting at 0-0.
        var nextBO = nextSeriesEscalation(finished.bestOf);
        ui.offerSeries = nextBO ? { bestOf:nextBO, id:finished.id, wins:finished.wins.slice() } : null;
      }
    } else if (!ui.offerSeries) {
      ui.offerSeries = { bestOf:3, seedWinner:win };
    }
  }

  function acceptSeriesOffer() {
    var o = ui.offerSeries;
    if (o.linked) {
      // A real tourney-object offer (see offerSeriesEscalationOnBracketClinch /
      // advanceSharedGame) — act on `tourney` directly rather than gating on
      // gameHasTourneyLink(), which also requires ui.view === "game" and would
      // otherwise misroute this into the local-casual-game branch below when the
      // offer is answered from the Tournament tab (e.g. right after a bracket
      // clinch). Bump the target and queue the next game under the *same* join
      // code, no re-join needed for guests.
      // Remember which game's clinch triggered this escalation, and what the
      // length was before it, so clearing that game's result later (see
      // clearSeriesWinner) can undo the escalation along with it — otherwise
      // the series would be left claiming a longer length than anyone actually
      // decided once its trigger is erased.
      var clinchIdx = tourney.games.length - 1;
      var fromBestOf = tourney.bestOf;
      tourney.bestOf = o.bestOf;
      tourney.champion = null;
      if (liveSeriesSlot(tourney).winner != null) {
        tourney.games.push({ a:0, b:1, winner:null, game:null, completedGame:null });
      }
      if (!tourney.escalations) tourney.escalations = [];
      tourney.escalations.push({ afterGameIndex: clinchIdx, from: fromBestOf, to: o.bestOf });
      setLiveSeriesGame(tourney, freshGameForTourneyTeams(tourney));
      if (fb && syncCode) tourney._createdAt = firebase.database.ServerValue.TIMESTAMP;
      ui.offerSeries = null; ui.seriesResult = null;
      saveTourney();
      render();
      return;
    }
    var wins = o.wins ? o.wins.slice() : [0, 0];
    if (o.seedWinner === 0 || o.seedWinner === 1) wins[o.seedWinner] = 1;
    var id = o.id || Date.now();
    ui.series = { bestOf:o.bestOf, wins:wins, id:id };
    if (!o.id && game.archivedId) {
      // This is a brand-new series (not an escalation) — the standalone game that
      // just prompted the offer becomes Game 1 of the series in history.
      var seedRec = gameHistory.find(function (h) { return h.id === game.archivedId; });
      if (seedRec) {
        seedRec.tournament = { format:"series", teams: game.teams.slice(), id:id, bestOf:o.bestOf };
        saveHistory();
      }
    }
    ui.offerSeries = null;
    ui.seriesResult = null;
    newGame(true);
  }

  // "No thanks" ends the just-finished game outright rather than leaving it
  // sitting there decided-but-idle: for a shared game that means ending the
  // live/synced session (same as the host's "End Game" action), and either way
  // a fresh unlinked solo game replaces it. The bottom seat (mySeatIndex(), or
  // real seat 0 when nobody's identified — see seatViewOrder) is the one tile
  // that's really "you" holding the device, so its name carries over; every
  // other seat clears since those were this session's guests/opponents.
  function declineSeriesOffer() {
    var o = ui.offerSeries;
    if (o && o.linked && tourney) {
      // Answered from the Tournament tab, where the global `game` pointer isn't
      // kept in sync with the tourney's live slot (see render()'s view-gated
      // game-pointer logic) — resolve the real match game directly so the
      // carried-over player name below isn't read from a stale soloGame.
      var lss = liveSeriesSlot(tourney);
      game = lss.completedGame || lss.game || game;
    }
    var mySeat = mySeatIndex();
    var keepName = (mySeat != null ? game.players[mySeat] : game.players[0]) || "";
    if (o && o.linked) {
      tourney = null;
      saveTourney();
    }
    soloGame = freshGame();
    soloGame.players[0] = keepName;
    game = soloGame;
    ui.series = null;
    ui.offerSeries = null;
    ui.seriesResult = null;
    persist();
  }

  // Scrambles who's paired with whom (keeping the same 4 seats/names), then
  // starts a fresh standalone game — no series tracking, since a redraw
  // breaks up the two teams that would otherwise be rematching.
  function redrawSoloTeamsAndPlay() {
    if (gameHasTourneyLink()) {
      var lastGame = liveSeriesSlot(tourney).game || liveSeriesSlot(tourney).completedGame;
      var shuffled = shuffle(lastGame.players.slice());
      tourney.teams[0].players = [shuffled[0], shuffled[2]];
      tourney.teams[1].players = [shuffled[1], shuffled[3]];
      // Redraw breaks up the pairing a series would keep rematching, so — like
      // newGame()'s default keepSeries:false — it also ends any best-of-N target
      // and starts a fresh single shared game under the same code.
      tourney.bestOf = 1;
      tourney.champion = null;
      tourney.games = [{ a:0, b:1, winner:null, game:null, completedGame:null }];
      setLiveSeriesGame(tourney, freshGameForTourneyTeams(tourney));
      if (fb && syncCode) tourney._createdAt = firebase.database.ServerValue.TIMESTAMP;
      ui.offerSeries = null; ui.seriesResult = null;
      saveTourney();
      render();
      return;
    }
    soloGame.players = shuffle(soloGame.players.slice());
    newGame();
  }

  function renderSettings() {
    settingsPanelEl.innerHTML = "";   // confirm now lives in renderModal (ui.confirmReset)
  }

    // ================= HISTORY VIEW =================
  function fmtTime(iso) {
    try {
      return new Date(iso).toLocaleTimeString(undefined, { hour:"numeric", minute:"2-digit" });
    } catch (e) { return ""; }
  }

  function exportHistory() {
    var json = JSON.stringify({ exportedAt: new Date().toISOString(), games: gameHistory }, null, 2);
    var name = "somerset-history-" + new Date().toISOString().slice(0,10) + ".json";
    // Native share sheet where available (AirDrop / Files / Messages on phones);
    // must stay synchronous with the tap or iOS refuses the share.
    if (navigator.share && navigator.canShare) {
      try {
        var file = new File([json], name, { type: "application/json" });
        if (navigator.canShare({ files: [file] })) {
          navigator.share({ files: [file], title: "Some-R-Set history" }).catch(function () {});
          return;
        }
      } catch (e) { /* fall through to download */ }
    }
    var blob = new Blob([json], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = el("a", { href:url, download:name }, []);
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importHistoryFile(file) {
    var reader = new FileReader();
    reader.onload = function () {
      var games;
      try {
        var data = JSON.parse(reader.result);
        games = Array.isArray(data) ? data : data.games;
      } catch (e) { games = null; }
      if (!Array.isArray(games)) {
        ui.info = "That file doesn't look like a Some-R-Set history backup.";
        render();
        return;
      }
      var existingIds = {};
      gameHistory.forEach(function (g) { existingIds[g.id] = true; });
      var added = 0;
      games.forEach(function (g) {
        if (!g || existingIds[g.id]) return;
        gameHistory.push(g);
        existingIds[g.id] = true;
        added++;
      });
      gameHistory.sort(function (a, b) { return new Date(b.date) - new Date(a.date); });
      saveHistory();
      ui.info = added ? ("Restored " + added + " game" + (added === 1 ? "" : "s") + ".") : ["No new games to restore.", "They're already in your History."];
      render();
    };
    reader.readAsText(file);
  }

  // Log/Stats switcher shown at the top of the History and Stats board views —
  // `active` is "log" or "stats".
  function renderHistoryViewToggle(active) {
    // The toggle stands in for the page heading on these two views, so it wears
    // the same double-brass letterpress rule the .view-head titles get elsewhere.
    return el("div", { class:"toggle-head" }, [
      el("div", { class:"seg-toggle" }, [
        el("button", { class:"seg-btn" + (active === "log" ? " on" : ""),
          onClick:function(){ ui.historySub = null; softRender(); } }, ["Log"]),
        el("button", { class:"seg-btn" + (active === "stats" ? " on" : ""),
          onClick:function(){ ui.historySub = "board"; softRender(); } }, ["Stats"])
      ])
    ]);
  }

  function renderHistory() {
    viewRootEl.innerHTML = "";
    var fileInput = el("input", { type:"file", accept:"application/json", style:"display:none;", onChange:function () {
      if (fileInput.files && fileInput.files[0]) importHistoryFile(fileInput.files[0]);
      fileInput.value = "";
    } }, []);
    var card = el("div", { class:"pad" + (suppressFade ? "" : " fade") }, [
      renderHistoryViewToggle("log"),
      renderHistoryFilterRow()
    ]);
    // One-shot "back up your History?" nudge (see maybeSuggestBackup) — checked
    // only here, on the History tab itself, never on the Game/Tournament views:
    // this used to live in the shared renderSyncBar (every view, every render
    // pass) and could pop up mid-hand-entry during active tournament play,
    // shifting layout under the simulator's clicks and corrupting the deal being
    // entered — confirmed via the stress-test regression it caused on
    // tournament-single-elim/sync-6p (a moon-shot deal landed as an ordinary
    // bid because the banner appeared between deal 1 and deal 4 of match 2).
    maybeSuggestBackup();
    if (ui.backupPrompt) {
      card.appendChild(el("div", { class:"sync-bar disp", style:"background:#f3fff3; border-bottom:1px solid #52a852;" }, [
        el("span", { style:"font-size:13px; color:#2e7d32; flex:1;" }, ["Back up your game History to the cloud?"]),
        el("button", { class:"link-btn disp", style:"flex:none; font-size:13px;", onClick:function(){ ui.backupPrompt = false; ui.linkDeviceSheet = { step:"menu" }; render(); } }, ["Set it up"]),

    } else {

      var filtered = gameHistory.filter(filterDef[2]);

        // opens by default so returning users land on their last game instead of a wall of
        // collapsed headers; every other group still defaults closed. An explicit toggle

  }

  // ---- Personal stats (History → Stats) ----
  // Pure aggregation over gameHistory — nothing new persisted. Players are matched
  // by trimmed, case-folded name, the same normalization dedupeNames() already
  // uses for the per-device name book, so "Dan" and "dan " count as one player.
  function statKey(name) { return (name || "").trim().toLowerCase(); }
  // Two seats at the same table can never resolve to the same person (breaks
  // mySeatIndex/identifyAs/bid-crediting, which all match "who" by this same
  // key) — used to gate roster-entry screens against duplicate names.
  function rosterHasDuplicateNames(players) {
    var seen = {};
    for (var i = 0; i < players.length; i++) {
      var k = statKey(players[i]);
      if (!k) continue;
      if (seen[k]) return true;
      seen[k] = true;
    }
    return false;
  }
  // Shared across every roster-setup wizard (Share, Tournament, Series) so the
  // wording can't drift between them.
  var DUP_NAME_WARNING = "Two players have the same name — add a nickname or initial to tell them apart.";

  // Partner/opponent are tracked by seat parity: seats 0/2 are one team, 1/3 the
  // other, and within a team the other seat is your partner while both seats of
  // the opposite parity are your opponents for that game.
  function seatPartner(seat) { return (seat + 2) % 4; }
  function seatOpponents(seat) { return seat % 2 === 0 ? [1, 3] : [0, 2]; }

  // Union of this device's local gameHistory with any linked devices' synced
  // history (see subscribeLinkedHistories), deduped on matchUid where present
  // (shared-match records — see buildHistoryRecordForMatch) or, for casual
  // records (which have no matchUid), on the owning uid + id. The owning uid
  // is required, not just id: ids are only unique per-device (Date.now() +
  // a small random offset), so two different real games archived around the
  // same time on two linked devices can mint the same bare id — prefixing
  // with the uid that actually wrote each record makes the merge key globally
  // unique instead of merely low-collision. With no linked uids this
  // degenerates to exactly gameHistory.slice(), so devices that never opt
  // into cloud sync see no behavior change.
  function mergedHistoryForStats() {
    var all = gameHistory.map(function (r) { return { r: r, owner: authUid }; });
    linkedUids.forEach(function (uid) {
      if (uid === authUid) return;
      (linkedHistoryCache[uid] || []).forEach(function (r) { all.push({ r: r, owner: uid }); });
    });
    var seen = {}, out = [];
    all.forEach(function (item) {
      var r = item.r;
      var tombstoneKey = r.matchUid || r.id;
      if (historyTombstones[tombstoneKey]) return;   // this device explicitly deleted it (SECURITY_REVIEW.md C4)
      var key = r.matchUid || (item.owner + ":" + r.id);
      if (seen[key]) return;
      seen[key] = true;
      out.push(r);
    });
    return out;
  }

  function computePlayerStats(merged) {
    var byKey = {};
    (merged || mergedHistoryForStats()).forEach(function (rec) {
      if (rec.winner == null || !rec.players) return;
      // Bid outcomes (moons, sets) are credited to the seat that actually placed the
      // bid. Deals recorded before bidder tracking existed have no bidderSeat, so
      // they fall back to crediting both seats on the bidding team, as before.
      var moonsBySeat = [0, 0, 0, 0], setsBySeat = [0, 0, 0, 0], moonAttemptsBySeat = [0, 0, 0, 0];
      var bidsBySeat = [0, 0, 0, 0], bidPtsBySeat = [0, 0, 0, 0];
      // Deepest deficit erased by a made-moon credited to each seat this
      // game -- only trailing (deficit > 0) moon shots qualify, per the
      // "Hail Mary" highlight (a moon is a one-shot, game-swinging event,
      // not something to tally like a running count).
      var hailMaryBySeat = [0, 0, 0, 0], runningScore = [0, 0];
      (rec.deals || []).forEach(function (d) {
        var creditSeats = (d.bidderSeat != null) ? [d.bidderSeat] : [d.bidTeam, d.bidTeam + 2];
        if (d.bid === POINTS_PER_DEAL) creditSeats.forEach(function (s) { moonAttemptsBySeat[s]++; });
        if (isMoonMade(d)) {
          creditSeats.forEach(function (s) { moonsBySeat[s]++; });
          var deficit = runningScore[1 - d.bidTeam] - runningScore[d.bidTeam];
          if (deficit > 0) creditSeats.forEach(function (s) { if (deficit > hailMaryBySeat[s]) hailMaryBySeat[s] = deficit; });
        }
        if (isDealSet(d)) creditSeats.forEach(function (s) { setsBySeat[s]++; });
        creditSeats.forEach(function (s) { bidsBySeat[s]++; bidPtsBySeat[s] += d.bid; });
        var scoreDelta = dealDelta(d, runningScore);
        runningScore[0] += scoreDelta[0]; runningScore[1] += scoreDelta[1];
      });
      var comebackDeficit = gameComebackDeficit(rec);
      var format = rec.tournament ? rec.tournament.format : "casual";
      var tournamentId = rec.tournament ? rec.tournament.id : null;
      var dealsCount = (rec.deals || []).length;
      rec.players.forEach(function (raw, seat) {
        var nm = (raw || "").trim();
        if (!nm) return;
        var resolved = canonicalName(splitName(rec, nm));
        var key = statKey(resolved), team = seat % 2;
        var p = byKey[key] || (byKey[key] = { name: resolved, games: [], partners: {}, opponents: {} });
        var partnerRaw = (rec.players[seatPartner(seat)] || "").trim();
        var partnerName = partnerRaw ? canonicalName(splitName(rec, partnerRaw)) : "?";
        var oppSeats = seatOpponents(seat);
        var opponentNames = oppSeats.map(function (s) {
          var oppRaw = (rec.players[s] || "").trim();
          return oppRaw ? canonicalName(splitName(rec, oppRaw)) : "?";
        });
        var won = rec.winner === team, tie = rec.winner === "tie";
        var margin = rec.totals ? (rec.totals[team] - rec.totals[1 - team]) : null;
        p.games.push({
          recId: rec.id, date: rec.date, team: team, seat: seat, won: won, tie: tie,
          champion: !!(rec.tournament && rec.tournament.championship && won),
          moons: moonsBySeat[seat], sets: setsBySeat[seat], moonAttempts: moonAttemptsBySeat[seat],
          hailMaryDeficit: hailMaryBySeat[seat] || null,
          bids: bidsBySeat[seat], bidPoints: bidPtsBySeat[seat],
          partnerName: partnerName, opponentNames: opponentNames,
          format: format, tournamentId: tournamentId, dealsCount: dealsCount, margin: margin,
          comebackDeficit: comebackDeficit
        });
        [partnerName].forEach(function (nm2) {
          var pk = statKey(nm2);
          var rec2 = p.partners[pk] || (p.partners[pk] = { name: nm2, games: 0, wins: 0, losses: 0 });
          rec2.games++; if (!tie) { if (won) rec2.wins++; else rec2.losses++; }
        });
        opponentNames.forEach(function (nm2) {
          var ok = statKey(nm2);
          var rec2 = p.opponents[ok] || (p.opponents[ok] = { name: nm2, games: 0, wins: 0, losses: 0 });
          rec2.games++; if (!tie) { if (won) rec2.wins++; else rec2.losses++; }
        });
      });
    });
    Object.keys(byKey).forEach(function (key) { finalizePlayerStats(byKey[key]); });
    return byKey;
  }

  // Best/worst-record pairing (min 2 games together), win% over decided (non-tie) games.
  // Only qualifies if the record actually leans the right way (winning for best partner,
  // losing for nemesis) — otherwise a single lopsided opponent could get crowned by default.
  function bestOrWorstPairing(byKey, wantBest) {
    var best = null;
    Object.keys(byKey).forEach(function (k) {
      var e = byKey[k];
      if (e.games < 2) return;
      var decided = e.wins + e.losses;
      if (!decided) return;
      var pct = e.wins / decided;
      if (wantBest ? pct <= 0.5 : pct >= 0.5) return;
      if (!best) { best = { rec: e, pct: pct }; return; }
      var better = wantBest ? (pct > best.pct) : (pct < best.pct);
      if (better || (pct === best.pct && e.games > best.rec.games)) best = { rec: e, pct: pct };
    });
    return best ? { name: best.rec.name, wins: best.rec.wins, losses: best.rec.losses, games: best.rec.games, winPct: Math.round(best.pct * 100) } : null;
  }

  function finalizePlayerStats(p) {
    p.games.sort(function (a, b) { return new Date(a.date) - new Date(b.date); });
    var wins = 0, losses = 0, moons = 0, sets = 0, moonAttempts = 0, champs = 0, longest = 0, run = 0, longestLoss = 0, lossRun = 0;
    var curType = null, curRun = 0, tournamentIds = {}, bestWin = null, longestGame = null, shortestGame = null, nailbiter = null, comebackWin = null, hailMary = null;
    var totalBids = 0, totalBidPoints = 0;
    var byFormat = {};
    p.games.forEach(function (g) {
      if (g.champion) champs++;
      moons += g.moons; sets += g.sets; moonAttempts += g.moonAttempts;
      totalBids += g.bids || 0; totalBidPoints += g.bidPoints || 0;
      if (g.tournamentId != null) tournamentIds[g.tournamentId] = true;
      if (g.tie) { run = 0; lossRun = 0; curType = null; curRun = 0; }
      else if (g.won) {
        wins++; run++; longest = Math.max(longest, run); lossRun = 0;
        curType === "w" ? curRun++ : (curType = "w", curRun = 1);
      } else {
        losses++; run = 0; lossRun++; longestLoss = Math.max(longestLoss, lossRun);
        curType === "l" ? curRun++ : (curType = "l", curRun = 1);
      }
      if (g.won && g.margin != null && (!bestWin || g.margin > bestWin.margin)) {
        bestWin = { margin: g.margin, opponentNames: g.opponentNames, date: g.date, recId: g.recId };
      }
      if (!g.tie && g.margin != null && (!nailbiter || Math.abs(g.margin) < Math.abs(nailbiter.margin))) {
        nailbiter = { margin: g.margin, won: g.won, team: g.team, opponentNames: g.opponentNames, date: g.date, recId: g.recId };
      }
      if (g.won && g.comebackDeficit && (!comebackWin || g.comebackDeficit > comebackWin.deficit)) {
        comebackWin = { deficit: g.comebackDeficit, opponentNames: g.opponentNames, date: g.date, recId: g.recId };
      }
      if (g.hailMaryDeficit != null && (!hailMary || g.hailMaryDeficit > hailMary.deficit)) {
        hailMary = { deficit: g.hailMaryDeficit, seat: g.seat, opponentNames: g.opponentNames, date: g.date, recId: g.recId };
      }
      if (g.dealsCount) {
        if (!longestGame || g.dealsCount > longestGame.dealsCount) longestGame = { dealsCount: g.dealsCount, opponentNames: g.opponentNames, date: g.date, recId: g.recId };
        if (!shortestGame || g.dealsCount < shortestGame.dealsCount) shortestGame = { dealsCount: g.dealsCount, opponentNames: g.opponentNames, date: g.date, recId: g.recId };
      }
      var fb = byFormat[g.format] || (byFormat[g.format] = { format: g.format, wins: 0, losses: 0, games: 0 });
      fb.games++; if (!g.tie) { if (g.won) fb.wins++; else fb.losses++; }
    });
    p.gamesPlayed = p.games.length;
    p.wins = wins; p.losses = losses;
    p.winPct = (wins + losses) ? Math.round((wins / (wins + losses)) * 100) : null;
    p.longestStreak = longest;
    p.longestLossStreak = longestLoss;
    p.currentStreak = { type: curType, count: curRun };
    p.moonsShot = moons;
    p.timesSet = sets;
    p.moonAttempts = moonAttempts;
    p.moonConversionRate = moonAttempts ? Math.round((moons / moonAttempts) * 100) : null;
    p.avgBidsPerGame = p.gamesPlayed ? (totalBids / p.gamesPlayed) : null;
    p.avgPointsPerBid = totalBids ? (totalBidPoints / totalBids) : null;
    p.championships = champs;
    p.tournamentsPlayed = Object.keys(tournamentIds).length;
    p.bestWin = bestWin;
    p.nailbiter = nailbiter;
    p.comebackWin = comebackWin;
    p.hailMary = hailMary;
    p.longestGame = longestGame;
    p.shortestGame = (shortestGame && shortestGame.dealsCount !== (longestGame && longestGame.dealsCount)) ? shortestGame : null;
    p.bestPartner = bestOrWorstPairing(p.partners, true);
    p.nemesis = bestOrWorstPairing(p.opponents, false);
    var formatOrder = ["casual", "single", "double", "round", "series"];
    p.formatBreakdown = formatOrder.map(function (f) { return byFormat[f]; }).filter(Boolean).map(function (fb) {
      var decided = fb.wins + fb.losses;
      return { format: fb.format, wins: fb.wins, losses: fb.losses, games: fb.games, winPct: decided ? Math.round((fb.wins / decided) * 100) : null };
    });
  }

  // Last `months` calendar months oldest-first, each bucketed with a game count —
  // feeds the "Games by month" bar chart.
  function playerMonthlyActivity(p, months) {
    var now = new Date(), buckets = [], byKey = {};
    for (var i = months - 1; i >= 0; i--) {
      var d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      var key = d.getFullYear() + "-" + d.getMonth();
      var b = { key: key, label: d.toLocaleDateString(undefined, { month: "short" }), count: 0 };
      buckets.push(b); byKey[key] = b;
    }
    p.games.forEach(function (g) {
      var d = new Date(g.date), key = d.getFullYear() + "-" + d.getMonth();
      if (byKey[key]) byKey[key].count++;
    });
    return buckets;
  }

  // Rolling win% across a player's full game history (ties count as half a
  // win) — one point per game, using up to `window` trailing games. Feeds
  // the "Form trend" sparkline, distinct from the "Recent form" pill strip
  // which only shows the last 10 games as discrete W/L/T results.
  function playerFormTrend(p, window) {
    var queue = [], pts = [];
    p.games.forEach(function (g) {
      queue.push(g.tie ? 0.5 : (g.won ? 1 : 0));
      if (queue.length > window) queue.shift();
      var sum = queue.reduce(function (a, b) { return a + b; }, 0);
      pts.push(Math.round((sum / queue.length) * 100));
    });
    return pts;
  }

  function shortDate(iso) {
    try { return new Date(iso).toLocaleDateString(undefined, { month: "short", day: "numeric" }); }
    catch (e) { return ""; }
  }

  function formTrendSvg(pts) {
    var W = 300, H = 60, padY = 6, n = pts.length;
    var coords = pts.map(function (pct, i) {
      var x = n > 1 ? (i / (n - 1)) * W : W / 2;
      var y = padY + (1 - pct / 100) * (H - 2 * padY);
      return x.toFixed(1) + "," + y.toFixed(1);
    });
    var last = coords[coords.length - 1].split(",");
    var lastColor = pts[pts.length - 1] >= 50 ? "var(--brass-text)" : "var(--red)";
    var baseline = (H - padY).toFixed(1);
    var yMid = ((padY + (H - padY)) / 2).toFixed(1);
    return (
      '<svg viewBox="0 0 ' + W + ' ' + H + '" aria-hidden="true">' +
        '<line x1="0" y1="' + yMid + '" x2="' + W + '" y2="' + yMid + '" stroke="var(--rule)" stroke-width="1" stroke-dasharray="3,3"/>' +
        '<polygon points="0,' + baseline + ' ' + coords.join(" ") + ' ' + W + ',' + baseline + '" fill="color-mix(in srgb, var(--brass-text) 16%, transparent)" stroke="none"/>' +
        '<polyline points="' + coords.join(" ") + '" fill="none" stroke="var(--brass-text)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>' +
        '<circle cx="' + last[0] + '" cy="' + last[1] + '" r="3.5" fill="' + lastColor + '"/>' +
      '</svg>'
    );
  }

  var STAT_SORTS = [
    ["games", "Games Played", function (p) { return p.gamesPlayed; }],
    ["wins", "Wins", function (p) { return p.wins; }],
    ["moons", "Moons", function (p) { return p.moonsShot; }],
    ["streak", "Streak", function (p) { return p.longestStreak; }]
  ];

  function statMetricDisplay(p, sort) {
    if (sort === "games") return { main: String(p.gamesPlayed), small: p.winPct == null ? "—" : (p.winPct + "%") };
    if (sort === "moons") return { main: String(p.moonsShot), small: p.gamesPlayed + " game" + (p.gamesPlayed === 1 ? "" : "s") };
    if (sort === "streak") return { main: String(p.longestStreak), small: "longest" };
    return { main: p.wins + "–" + p.losses, small: p.winPct == null ? "—" : (p.winPct + "%") };
  }

  function renderRankRow(p, idx, sortDef, maxMetric) {
    var val = Math.max(0, sortDef[2](p));
    var pct = clamp(Math.round((val / maxMetric) * 100), 0, 100);
    var disp = statMetricDisplay(p, sortDef[0]);
    var champBadge = p.championships ? (" 🏆" + (p.championships > 1 ? ("×" + p.championships) : "")) : "";
    return el("div", { class:"rank-row", role:"button",
      onClick:function(){ ui.statsPlayer = p.name; ui.historySub = "player"; softRender(); } }, [
      el("div", { class:"rank-num" + (idx < 3 ? " top" : "") }, [String(idx + 1)]),
      el("div", { class:"rank-id" }, [
        el("div", { class:"rank-name" }, [p.name + champBadge]),
        el("div", { class:"rank-bar-track" }, [ el("div", { class:"rank-bar-fill", style:"width:" + pct + "%;" }, []) ])
      ]),
      el("div", { class:"rank-metric mono" }, [ disp.main, el("small", {}, [disp.small]) ]),
      el("div", { class:"rank-chevron", "aria-hidden":"true", html:CHEVRON_RIGHT_SVG })
    ]);
  }

  function renderStatsBoard() {
    viewRootEl.innerHTML = "";
    var stats = computePlayerStats();
    var players = Object.keys(stats).map(function (k) { return stats[k]; });
    var sortDef = STAT_SORTS.find(function (s) { return s[0] === ui.statsSort; }) || STAT_SORTS[0];
    players.sort(function (a, b) {
      var d = sortDef[2](b) - sortDef[2](a);
      return d !== 0 ? d : a.name.localeCompare(b.name);
    });
    var maxMetric = Math.max(1, players.length ? sortDef[2](players[0]) : 0);

    var card = el("div", { class:"pad" + (suppressFade ? "" : " fade") }, [
      renderHistoryViewToggle("stats"),
      el("div", { class:"stat-sort-row" }, STAT_SORTS.map(function (s) {
        return el("button", { class:"stat-sort-chip" + (sortDef[0] === s[0] ? " on" : ""),
          onClick:function(){ ui.statsSort = s[0]; softRender(); } }, [s[1]]);
      }))
    ]);

    if (!players.length) {
      card.appendChild(el("p", { class:"empty disp" }, ["No finished games yet.", el("br", {}, []), "Play a few to start building stats."]));
    } else {
      players.forEach(function (p, idx) { card.appendChild(renderRankRow(p, idx, sortDef, maxMetric)); });
    }
    if (players.length >= 2 || Object.keys(nameAliases).length) {
      card.appendChild(el("div", { class:"history-footer" }, [
        el("button", { class:"link-btn disp", onClick:function(){ ui.mergeSheet = { step:1 }; render(); } }, ["Merge names…"])
      ]));
    }
    viewRootEl.appendChild(card);
    suppressFade = false;
  }

  function statTile(num, label, explain, sub) {
    var lines = Array.isArray(label) ? label : [label];
    var labelText = lines.join(" ");
    var props = { class:"stats-tile" };
    if (explain) {
      props.role = "button"; props.tabindex = "0"; props["aria-label"] = labelText + ": " + explain + (sub ? (" (" + sub + ")") : "");
      props.onClick = function(){ ui.info = explain; render(); };
    }
    var labelChildren = lines.reduce(function (acc, line, i) {
      if (i > 0) acc.push(el("br", {}, []));
      acc.push(line);
      return acc;
    }, []);
    return el("div", props, [
      el("div", { class:"stats-tile-num disp" }, [String(num)]),
      sub ? el("div", { class:"stats-tile-sub disp" }, [sub]) : null,
      el("div", { class:"stats-tile-label disp" }, labelChildren)
    ].filter(function (x) { return x; }));
  }

  function currentStreakText(cs) {
    if (!cs || !cs.count) return "—";
    var noun = cs.type === "w" ? "Win" : "Loss";
    if (cs.count > 1) noun = cs.type === "w" ? "Wins" : "Losses";
    return cs.count + " " + noun;
  }

  function statFormatLabel(f) {
    return f === "casual" ? "Casual" : f === "series" ? "Best-of Series" : formatName(f);
  }

  // Label + value row used by the Best partner / Nemesis / Best win / Game length
  // sections — same shape, so one row builder covers all of them.
  // `action` is either an explanation string (shown via the ui.info sheet) or a
  // function (e.g. jump to the underlying game record) — either way the row becomes tappable.
  function statsPairRow(label, value, sub, valueClass, action) {
    var props = { class:"stats-pair-row" };
    if (action) {
      props.role = "button"; props.tabindex = "0";

        props.onClick = action;
      } else {
        props["aria-label"] = label + ": " + action;
        props.onClick = function(){ ui.info = action; render(); };
      }

<meta name="theme-color" content="#371318" id="themeColorMeta" />
<script>
  /* Runs before <style> is parsed so the correct theme is on <html> for the
     very first paint — no flash of the wrong palette. applyTheme() (in the
     main script, loaded later) redoes this same resolution and additionally
     wires up live OS-theme-change listening; this is deliberately a small
     duplicate of that logic since it must run synchronously, this early. */
  (function () {
    var pref = "auto";
    try { pref = localStorage.getItem("somerset:theme-pref") || "auto"; } catch (e) {}
    var dark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    var effective = pref === "auto" ? (dark ? "aubergine" : "aubergine-light") : pref;
    document.documentElement.setAttribute("data-theme", effective);
  })();
</script>

<style>
  :root {
    /* Named themes, switched by [data-theme] on <html> (see the early
       inline script and applyTheme() in the main script). Derived tints
       outside this block read the vars via color-mix() rather than hardcoding
       a re-based literal, so a future theme needs no manual re-basing. */
    /* Radius scale: controls 8, cards 12, sheets 16, chips/pills full round. Type scale:
       11 (micro caps) / 13 (secondary) / 15 (body) / 17 (buttons, banners) / 20 (titles)
       / 28 / 34 / 48 (numerals & masthead) — text inputs stay 16px so iOS doesn't zoom on focus. */
    --r-control:8px; --r-card:12px; --r-sheet:16px; --r-pill:999px;
    /* Apple system families (HIG): New York where the app speaks — masthead, team
       names, totals, section titles — SF Pro for everything you operate. Both ship
       on-device, so typography works offline and costs no network request. */
    --font-display: ui-serif, 'New York', 'Iowan Old Style', Georgia, serif;
    --font-text: -apple-system, system-ui, 'Helvetica Neue', sans-serif;
  }
  /* Theme key naming convention (internal [data-theme] values, NOT the
     user-facing Display-sheet chip labels, which churn freely and are just
     documented inline where they're set):
       <family>-<mode>[-<status>[-<descriptor>]]
     - family: short palette codename, kebab-case (e.g. "aubergine").
       Permanent once shipped in a live/pinnable theme — it's persisted in
       localStorage (somerset:theme-pref), so renaming it orphans existing
       users on their saved pref. Pick it once, live with it.
     - mode: "light" or "dark". (The two original families predate this
       convention and only suffix "-light", leaving dark bare — e.g. "dark"/
       "light" and "aubergine"/"aubergine-light". Don't retrofit those keys;
       just suffix both modes explicitly on new families going forward.)
     - status: omit for a live, picker-visible theme. "-test" for an
       unresolved experiment (not wired into the picker). "-archive" for a
       retired variant kept only so it isn't lost.
     - descriptor: short kebab-case phrase distinguishing this variant from
       siblings sharing the same family/mode/status, e.g. "-purple-primary"
       vs "-dark-copy" — lets you refer to "the purple-primary archive" in
       conversation without opening the CSS. Omit if there's only one.
     Test/archive blocks are real CSS you can preview by hand-setting
     data-theme (devtools console or a throwaway script) — they're just
     absent from the chip array in the Display-sheet render code, so normal
     use never reaches them. */
  /* Dark default: Mahogany Parlor — wine baize, warm parchment, antique gold.
     --mast/--mast-soft are text/chrome sitting directly on --felt (masthead,
     New Game button, inactive nav tabs) rather than on the --cream paper —
     here felt is dark, so they alias to the existing light paper/rule tones.
     User-facing chip label "Classic Dark"; hidden from the Display sheet as
     of 2026-07-07 in favor of the "Dark" (aubergine) chip below — may return.
     Auto no longer resolves here as of 2026-07-07 — see the aubergine block
     below for the current Auto-dark target. */
  [data-theme="dark"] {
    --felt:#4C2026; --felt-deep:#371318; --cream:#F7EDDC; --cream-shade:#EBDEC3;
    --rule:#CBAA82; --ink:#332B25; --ink-soft:#6F6052; --red:#A32C2C; --brass:#A57E28;
    --brass-text:#7C5D1C;
    --control:#FCF5E6;
    --mast:var(--cream); --mast-soft:var(--rule);
    --felt-wash:rgba(255,255,255,.04); --felt-wash-strong:rgba(255,255,255,.09);
    --seat-rule:var(--rule);
  }
  /* Light default: Linen Daylight — felt goes pale for the first time, so text
     that sits on it has to flip dark (--mast/--mast-soft below) instead of
     reusing --cream/--rule, which would go near-invisible on a light ground.
     --brass legitimately becomes green here — Linen Daylight promotes felt's
     green to the accent; --mast-soft is a custom tone, not var(--ink-soft)
     aliased, because --ink-soft only measures ~3.6:1 on this felt (fails AA
     at small sizes) where --mast-soft measures ~4.96:1.
     User-facing chip label "Classic Light"; hidden from the Display sheet as
     of 2026-07-07 in favor of the "Light" (aubergine-light) chip below — may return.
     Auto no longer resolves here as of 2026-07-07 — see the aubergine-light
     block below for the current Auto-light target. */
  [data-theme="light"] {
    --felt:#E8E1CE; --felt-deep:#DCD3BA; --cream:#FDFBF4; --cream-shade:#F0EADA;
    --rule:#B9AC85; --ink:#322F28; --ink-soft:#7C7358; --red:#9B2226; --brass:#2F5D48;
    --brass-text:#27503D;
    --control:#FFFFFF;
    --mast:var(--ink); --mast-soft:#675D4C;
    --felt-wash:rgba(0,0,0,.05); --felt-wash-strong:rgba(0,0,0,.10);
    --seat-rule:var(--rule);
  }
  /* Rocket Fuel: originally an additional pinnable dark option alongside
     Mahogany Parlor (not tied to Auto) — eggplant baize, warm gold instead
     of antique brass. Same dark-on-felt aliasing as [data-theme="dark"]
     above since felt stays dark here too. Internal key/selector stay
     "aubergine" (describes the palette); user-facing chip label was
     "Rocket Fuel Dark", renamed to plain "Dark" 2026-07-07 once Classic
     Dark was hidden and this became the only visible dark option.
     As of 2026-07-07, Auto's dark resolution also points here instead of
     Classic Dark (see applyTheme() and the early inline theme script) —
     this is now both the pinnable dark option and the Auto-dark target. */
  [data-theme="aubergine"] {
    --felt:#2E1B3A; --felt-deep:#1A0E22; --cream:#F6EEDC; --cream-shade:#ECE0C2;
    --rule:#C9A868; --ink:#2C2620; --ink-soft:#6E6152; --red:#A83A4A; --brass:#B39456;
    --brass-text:#7A6234;
    --control:#FCF6E6;
    --mast:var(--cream); --mast-soft:var(--rule);
    --felt-wash:rgba(255,255,255,.04); --felt-wash-strong:rgba(255,255,255,.09);
    --seat-rule:var(--rule);
  }
  /* Rocket Fuel Light: promoted 2026-07-08 from the "aubergine-light-test"
     exploration — identical to Rocket Fuel dark (aubergine) token for
     token, except --felt/--felt-deep keep this theme's own light
     background (unchanged since Linen Daylight). --mast/--mast-soft are
     the one deliberate deviation from a verbatim dark copy: dark's
     --mast:var(--cream)/--mast-soft:var(--rule) assume felt is dark, so
     copied as-is the masthead title and inactive nav tabs (text sitting
     directly on --felt) go near-invisible on light felt. Uses Classic
     Light's proven pairing instead (--mast:var(--ink), --mast-soft:
     #675D4C — tuned to ~4.96:1 on this exact felt tone, see the Classic
     Light comment above) since felt here is identical to Classic Light's.
     The prior live palette (purple --brass primary, champagne --rule
     secondary) is preserved at [data-theme="aubergine-light-archive-
     purple-primary"] below, per the naming convention above, in case we
     want it back. Internal key "aubergine-light" mirrors "aubergine".
     User-facing chip label is "Light". As of 2026-07-07, Auto's light
     resolution also points here — this is both the pinnable light option
     and the Auto-light target. */
  [data-theme="aubergine-light"] {
    --felt:#E8E1CE; --felt-deep:#DCD3BA; --cream:#F6EEDC; --cream-shade:#ECE0C2;
    --rule:#C9A868; --ink:#2C2620; --ink-soft:#6E6152; --red:#A83A4A; --brass:#B39456;
    --brass-text:#7A6234;
    --control:#FCF6E6;
    --mast:var(--ink); --mast-soft:#675D4C;
    --felt-wash:rgba(255,255,255,.04); --felt-wash-strong:rgba(255,255,255,.09);
    --seat-rule:var(--rule);
  }
  /* ARCHIVE — not wired into the Display sheet picker, reachable only by
     setting data-theme="aubergine-light-archive-purple-primary" manually
     (devtools/script). This was the live Rocket Fuel Light palette from
     2026-07-06 until 2026-07-08 (purple --brass primary, champagne --rule
     secondary), superseded above by the "copy Rocket Fuel dark verbatim"
     version. Kept in case we want to return to it. To restore it as the
     live theme, copy this block's values back into [data-theme="aubergine-
     light"] above and delete this block. See the naming-convention note
     above the dark/light default themes near the top of this <style> block
     for how archive/test keys are named. */
  [data-theme="aubergine-light-archive-purple-primary"] {

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  .banner { background:var(--brass-text); color:var(--cream); font-family:var(--font-display); text-align:center; padding:12px; font-size:17px; font-weight:600; }

  /* left/right+margin centering (not translateX) — the .fade keyframe ends at transform:none and would wipe a transform */
  .undo-toast { position:fixed; left:0; right:0; margin:0 auto; width:fit-content; bottom:max(20px, calc(env(safe-area-inset-bottom) + 12px)); background:var(--ink); color:var(--cream); border-radius:var(--r-card); padding:10px 10px 10px 16px; display:flex; align-items:center; gap:10px; font-size:15px; box-shadow:0 2px 4px rgba(0,0,0,.2), 0 8px 24px rgba(0,0,0,.3); z-index:60; white-space:nowrap; overflow:hidden; }

  @keyframes undo-deplete { from { transform:scaleX(1); } to { transform:scaleX(0); } }
  @media (prefers-reduced-motion: reduce) { .undo-toast-bar { animation:none; } }
  .undo-toast button { background:var(--brass); color:var(--cream); border:none; border-radius:var(--r-pill); font-size:13px; font-weight:700; cursor:pointer; font-family:var(--font-text); padding:7px 14px; flex:0 0 auto; }
  .undo-toast button:active { opacity:.75; }

  .undo-toast.info-only { padding-right:16px; }
  .deal-detail b { font-weight:600; color:var(--brass-text); margin-left:4px; }
  .del { background:none; border:none; color:var(--ink-soft); cursor:pointer; padding:12px; border-radius:var(--r-control); transition:color .08s, background .08s; line-height:1; }
  .del:active { color:var(--red); background:color-mix(in srgb, var(--red) 10%, transparent); }
  .del svg { display:block; width:14px; height:14px; }
  .chip-x { display:inline-block; width:11px; height:11px; vertical-align:-1px; margin-left:3px; }

  .entry { border-top:2px solid var(--rule); padding:16px 16px 20px; background:var(--cream-shade); }

  .bid-summary { display:block; width:100%; text-align:left; box-sizing:border-box; font-family:var(--font-text); background:var(--cream); border:1px solid var(--rule); border-radius:var(--r-control); padding:8px 12px; font-size:15px; color:var(--ink); margin:0 0 16px; cursor:pointer; }

  .row { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }

    border:1.5px solid var(--rule);

    box-shadow:0 1px 2px rgba(0,0,0,.1);
    transition:transform .08s ease; }
  .step:active { transform:scale(.88); background:var(--cream-shade); box-shadow:none; }
  .step-val { font-size:20px; font-weight:600; width:48px; text-align:center; }
  .step-input { width:48px; border:1px solid var(--rule); border-radius:var(--r-control); background:var(--cream); color:var(--ink);
    padding:6px 0; -moz-appearance:textfield; }

    box-shadow:0 1px 2px rgba(0,0,0,.1);

  .check { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--ink-soft); margin-bottom:12px; }

  .actions { display:flex; gap:8px; margin-top:6px; }

  .btn-cancel { flex:1; padding:12px 0; border:1px solid var(--rule);
    background:var(--control);
    color:var(--ink-soft); font-size:15px;
    box-shadow:0 1px 2px rgba(0,0,0,.1); }
  .btn-cancel:active { transform:scale(.97); background:var(--cream-shade); box-shadow:none; }
  .btn-record { flex:2; padding:12px 0; border:none;
    background:var(--brass);
    color:var(--cream); font-size:17px; font-weight:600;
    box-shadow:0 1px 2px rgba(0,0,0,.25); }
  .btn-record:active { transform:scale(.97); box-shadow:none; }
  .btn-danger { flex:2; padding:12px 0; border:none;
    background:var(--red);
    color:var(--cream); font-size:17px; font-weight:600;
    box-shadow:0 1px 2px rgba(0,0,0,.25); }
  .btn-danger:active { transform:scale(.97); box-shadow:none; }
  .btn-add { width:100%; padding:16px 0; border:none;
    background:var(--ink);

  .btn-add:active { transform:scale(.98); box-shadow:none; }

  .btn-new { width:100%; padding:16px 0; border:none;

  .btn-new:active { transform:scale(.98); box-shadow:none; }

  .add-wrap { padding:16px 16px 20px; border-top:1px solid var(--cream-shade); display:flex; flex-direction:column; justify-content:center; }

  .settings-toggle { display:inline-block; border-radius:var(--r-pill); border:1px solid color-mix(in srgb, var(--rule) 50%, transparent);
    background:var(--felt-wash); color:var(--mast-soft); font-size:13px; letter-spacing:.08em; text-transform:uppercase;
    cursor:pointer; font-family:var(--font-text); transition:opacity .08s ease, background .08s ease; padding:8px 20px; }
  .settings-toggle:active { opacity:.6; background:var(--felt-wash-strong); }
  .table-label { text-align:center; color:var(--ink-soft); font-size:13px; margin:12px 0 0; }
  .table-label b { font-weight:600; color:var(--brass-text); }

    border:1.5px solid var(--seat-rule); border-radius:var(--r-control); padding:6px 4px; cursor:pointer; overflow:hidden;

  .seat.dealer { border-color:var(--brass-text);

  .dealer-line { text-align:right; font-size:13px; color:var(--ink-soft); margin:0; }

  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center;
    padding:24px max(24px, env(safe-area-inset-left)); z-index:60; }
  .sheet { background:var(--cream); border-radius:var(--r-sheet); width:100%; max-width:320px; padding:20px 16px 8px;
    box-shadow:0 2px 6px rgba(0,0,0,.15), 0 18px 44px rgba(0,0,0,.3); }

  .sheet .sub { text-align:center; color:var(--ink-soft); font-size:13px; margin:2px 0 14px; }
  .sheet-btn { display:block; width:100%; min-height:48px; padding:12px 0; margin-bottom:8px; border-radius:var(--r-control);
    font-size:17px; font-family:var(--font-text); cursor:pointer;
    border:1.5px solid var(--rule);
    background:var(--control);
    color:var(--ink);
    box-shadow:0 1px 2px rgba(0,0,0,.1);
    transition:transform .08s ease, box-shadow .08s ease; }
  .sheet-btn:active:not(.primary):not(.ghost) { transform:scale(.98); background:var(--cream-shade); box-shadow:none; }
  .sheet-btn.primary { border-color:color-mix(in srgb, var(--brass) 80%, black); font-weight:600;
    background:var(--brass);
    color:var(--cream);
    box-shadow:0 1px 2px rgba(0,0,0,.25); }
  .sheet-btn.primary:active { transform:scale(.98); box-shadow:none; }
  .sheet-btn.primary[disabled] { background:var(--cream-shade); color:var(--ink-soft); border-color:var(--rule); cursor:default; box-shadow:none; }
  .sheet-btn.ghost { border:none; background:transparent; color:var(--ink-soft); margin-bottom:0; min-height:40px; box-shadow:none; }
  .sheet-btn.ghost:active { opacity:.6; }
  /* iOS-style row: a label that opens the full sheet, plus a toggle that acts
     directly (see the Display sheet's Cloud Backup row) -- the row and the
     toggle have independent tap targets (toggle stopPropagation()s). */
  .settings-row { display:flex; align-items:center; justify-content:space-between; width:100%;
    min-height:48px; padding:12px 0; margin-bottom:8px; border-radius:var(--r-control);
    border:1.5px solid var(--rule); background:var(--control); box-sizing:border-box;
    padding-left:36px; padding-right:32px; cursor:pointer; }
  .settings-row:active { background:var(--cream-shade); }
  .settings-row-label { font-size:17px; font-family:var(--font-text); color:var(--ink); }
  .ios-toggle { position:relative; display:inline-block; width:51px; height:31px; border-radius:var(--r-pill);
    background:var(--rule); flex:0 0 auto; cursor:pointer; transition:background .2s ease; }
  .ios-toggle.on { background:var(--brass); }
  .ios-toggle-knob { position:absolute; top:2px; left:2px; width:27px; height:27px; border-radius:50%;
    background:#fff; box-shadow:0 2px 4px rgba(0,0,0,.25); transition:transform .2s ease; }
  .ios-toggle.on .ios-toggle-knob { transform:translateX(20px); }
  /* Display-sheet grouping: the app's double-brass rule (see .view-head) sits
     under the title and above Done; the Appearance field pairs a serif-italic
     label inline with the theme pills, the label indented 36px so it lines up
     with the .settings-row labels below it. The Account group carries no label —
     the pills-vs-rows contrast plus whitespace does that work. */
  .sheet-rule { border-bottom:3px double var(--brass); margin:14px 0; }
  .appearance-row { display:flex; align-items:center; gap:12px; margin:6px 0 6px; padding-left:36px; }
  .appearance-label { font-family:var(--font-display); font-style:italic; font-size:16px;
    color:var(--brass-text); flex:none; white-space:nowrap; }
  .settings-row-value { margin-left:auto; font-size:15px; color:var(--ink-soft); font-family:var(--font-text);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:60%; }
  /* text inputs hold at 16px — the one size off the scale — so iOS doesn't zoom the page on focus */
  .sheet-input { width:100%; padding:12px; box-sizing:border-box; border:1.5px solid var(--rule); border-radius:var(--r-control);
    font-size:16px; font-family:var(--font-text); color:var(--ink); background:#fff; margin:8px 0 12px; }
  button:focus-visible, input:focus-visible { outline:2px solid var(--brass); outline-offset:2px; }

  .storage-warn { display:none; background:#fff3f3; border:1px solid var(--red); color:var(--red); border-radius:var(--r-control); font-size:13px; padding:8px 12px; margin:0 0 12px; text-align:center; }

  /* ---- nav + views ---- */
  .nav { display:flex; gap:8px; justify-content:center; margin:0 0 16px; }
  .nav-btn { flex:1; max-width:132px; padding:12px 0; border-radius:var(--r-control); border:1px solid color-mix(in srgb, var(--rule) 50%, transparent);
    background:var(--felt-wash); color:var(--mast-soft); font-family:var(--font-text);
    font-size:15px; cursor:pointer;
    transition:opacity .08s ease; }
  .nav-btn:active:not(.on) { opacity:.6; }
  .nav-btn.on { background:var(--cream); color:var(--ink); border-color:var(--cream); font-weight:600;
    box-shadow:0 1px 3px rgba(0,0,0,.18); }
  /* View titles print on the pad itself — serif ink over a double brass rule — rather
     than sitting in a filled bar; the filled treatment is reserved for .banner moments. */
  .view-head { background:var(--cream); color:var(--ink); font-family:var(--font-display); text-align:center; padding:16px 12px 12px; font-size:23px; font-weight:600; border-bottom:3px double var(--brass); }

  /* Wraps the Log/Stats toggle when it stands in for a page heading — carries the
     same double-brass rule the .view-head titles use, spanning the full card width. */
  .toggle-head { padding:14px 0 12px; border-bottom:3px double var(--brass); }
  .toggle-head .seg-toggle { margin:0 12px; }
  .seg-toggle { display:flex; gap:4px; margin:10px 12px 2px; padding:3px; background:var(--cream-shade); border-radius:var(--r-control); }
  .seg-btn { flex:1; padding:8px 0; border:none; border-radius:calc(var(--r-control) - 3px); background:none;
    font-family:var(--font-text); font-size:14px; font-weight:600; color:var(--ink-soft); cursor:pointer; }
  .seg-btn.on { background:var(--cream); color:var(--ink); box-shadow:0 1px 3px rgba(0,0,0,.18); }
  .seg-btn:active:not(.on) { opacity:.6; }

  /* ---- history ---- */
  .hist-date-group { padding-bottom:6px; }
  .hist-date-group + .hist-date-group { border-top:1px solid var(--rule); }
  .hist-date-head { display:flex; flex-direction:column; gap:2px; padding:14px 12px 10px; cursor:pointer; }
  .hist-date-title { font-family:var(--font-display); font-size:18px; font-weight:600; color:var(--brass-text); }
  .hist-head-row { display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .hist-date-sum { font-size:13px; color:var(--ink-soft); }
  .hist-t-group { border-top:1px solid var(--cream-shade); padding-bottom:2px; }
  .hist-t-head { display:flex; flex-direction:column; gap:2px; padding:8px 12px 6px 24px; cursor:pointer; }
  .hist-t-title { font-family:var(--font-display); font-size:14px; font-weight:600; color:var(--brass-text); }
  .hist-t-sum { font-size:13px; color:var(--ink-soft); margin-left:14px; }
  /* Each game is its own elevated card (echoes .mbox) instead of a flat bordered row —
     margin/radius/shadow live on the wrapper so overflow:hidden clips the item/detail
     children's square corners without those children needing their own radius. */
  .hist-entry { position:relative; margin:6px 12px 10px; border:1px solid var(--rule); border-radius:var(--r-control);
    overflow:hidden; background:var(--cream); box-shadow:0 1px 3px rgba(0,0,0,.14); }
  /* Category spine — a 4px left rail keyed to game type gives the scan a repeating
     anchor and encodes standard / tournament / championship by hue. Championship also
     washes the card gold; its rail shares tournament's hue in dark themes (where
     --brass and --rule both read gold), so there the wash is what sets it apart. */
  .hist-entry::before { content:""; position:absolute; left:0; top:0; bottom:0; width:4px;
    background:var(--hist-spine, color-mix(in srgb, var(--ink-soft) 50%, transparent)); }
  .hist-entry[data-cat="tourney"] { --hist-spine:var(--brass); }
  .hist-entry[data-cat="champ"] { --hist-spine:var(--rule); background:color-mix(in srgb, var(--rule) 12%, var(--cream)); }
  .hist-item { padding:12px 12px 12px 15px; cursor:pointer; }   /* extra left pad clears the spine */
  .hist-item:active { background:var(--cream-shade); }
  .hist-line { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .hist-line.stack { flex-direction:column; align-items:stretch; gap:6px; }
  .hist-score { font-size:15px; font-weight:600; color:var(--ink); display:inline-grid; grid-template-columns:auto auto; column-gap:8px; row-gap:2px; min-width:0; max-width:100%; flex:0 1 auto; }
  .hs-row { display:contents; }
  .hs-name { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-align:right; }
  .hs-score { text-align:right; white-space:nowrap; }
  /* Winner-forward hierarchy: the winning team reads bold and full-ink, the loser
     dims — so which team won (and the row's silhouette) is legible without reading. */
  .hs-row.win .hs-name, .hs-row.win .hs-score { color:var(--ink); font-weight:700; }
  .hs-row.lose .hs-name, .hs-row.lose .hs-score { color:var(--ink-soft); font-weight:500; }
  /* Points-share bar: fills to the winner's real share of the two totals, so a rout and
     a squeaker have different silhouettes. Ties sit dead-even and neutral. */
  .hist-margin { height:5px; margin-top:9px; border-radius:3px; background:var(--cream-shade);
    overflow:hidden; box-shadow:inset 0 0 0 1px color-mix(in srgb, var(--ink-soft) 16%, transparent); }
  .hist-margin > span { display:block; height:100%; background:var(--brass); border-radius:3px; }
  .hist-margin.tie > span { background:var(--ink-soft); }
  .hist-win { font-size:13px; color:var(--brass-text); font-weight:600; white-space:nowrap; flex:0 0 auto; }
  .hist-line.stack .hist-win { text-align:right; white-space:normal; }
  /* Winner tag as a filled pill (echoes .chip.on) rather than plain colored text —
     gives the row one clear focal point instead of two same-weight text blocks. */
  .hist-win-badge { display:inline-block; padding:3px 10px; border-radius:var(--r-pill); background:var(--brass); color:var(--cream); }
  .hist-win-badge.tie { background:var(--ink-soft); }
  .hist-meta { font-size:13px; color:var(--ink-soft); margin-top:6px; }
  .hist-detail { padding:8px 12px 16px; border-top:1px solid var(--cream-shade); }
  .hist-roster { font-size:13px; color:var(--ink); margin:0 0 6px; }
  .hist-hand { display:grid; grid-template-columns:26px 28px 8px 28px 1fr auto; gap:8px; align-items:center; padding:4px 0; font-size:13px; border-top:1px solid rgba(0,0,0,.07); }
  .hist-hand .hh-sc { text-align:center; font-weight:600; color:var(--ink); }
  .hist-hand .hh-sc.red { color:var(--red); }
  .hist-hand .hh-bid { color:var(--ink-soft); }
  .hist-hand .hh-bid.red { color:var(--red); }
  .hh-bid-inner { display:inline-block; }   /* positioned in JS, see alignDealBidColumn; wraps rather than overlapping the dealer column when it doesn't fit */
  .hh-bidder { display:inline-block; text-align:right; }   /* padded to the widest name in the table in JS, see alignDealBidColumn; wraps rather than overflowing if a name is too long to fit */
  .hist-hand .hh-dlr { font-size:11px; color:var(--brass-text); white-space:nowrap; }
  /* Column-header row of the archived hand table — same grid as .hist-hand so the
     team initials, "Bidding" and "Dealer" labels sit over their columns. */
  .hist-hand.hist-head { border-top:none; padding:0 0 6px; font-size:11px; text-transform:uppercase;
    letter-spacing:.06em; font-weight:600; color:var(--brass-text); border-bottom:1px solid var(--rule); }
  .hist-hand.hist-head .hh-sc { color:var(--brass-text); }
  .hist-hand.hist-head .hh-head-bid { text-align:center; color:var(--brass-text); }
  .hist-hand.hist-head .hh-dlr { text-align:right; }
  .hist-hand.hist-head + .hist-hand { border-top:none; }
  .hist-del { margin-top:12px; }
  .link-btn { background:none; border:none; color:var(--ink-soft); font-size:13px; font-weight:600; cursor:pointer; font-family:var(--font-text); padding:12px 8px; margin:-8px 0; }
  .link-btn:active { color:var(--ink); }
  .link-btn.danger { color:var(--red); }
  /* Single smart Expand/Collapse-all toggle in the History log — one link whose
     label flips with state; the glyph rotates 180° when everything is open. */
  .hist-expand-toggle { display:inline-flex; align-items:center; gap:6px; }
  .hist-expand-gl { font-size:11px; transition:transform .18s ease; }
  .hist-expand-toggle.all-open .hist-expand-gl { transform:rotate(180deg); }
  @media (prefers-reduced-motion: reduce) { .hist-expand-gl { transition:none; } }

  /* ---- tournament setup ---- */
  .tplayers { padding:12px 12px 0; }
  .trow { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .tnum { width:20px; color:var(--ink-soft); font-size:13px; text-align:right; flex:none; }
  .tinput { flex:1; padding:8px 12px; border:1px solid var(--rule); border-radius:var(--r-control); font-size:16px; font-family:var(--font-text); color:var(--ink); background:#fff; }
  .trow-add { padding:2px 12px 8px; }
  .tvalid { padding:0 12px; font-size:13px; color:var(--red); margin:4px 0; }
  .tvalid.ok { color:var(--ink-soft); }
  .chip.soon { opacity:.45; }
  .tcount-q { text-align:center; font-size:17px; color:var(--ink); margin:16px 0 12px; }
  .count-stepper { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:12px; }
  .count-val { font-size:34px; font-weight:600; min-width:64px; text-align:center; color:var(--ink); }
  .draw-list { padding:8px 12px 4px; }
  .draw-team { font-size:15px; color:var(--ink); padding:4px 0; }
  .back-btn { display:inline-flex; align-items:center; gap:4px; background:none; border:none; padding:8px; cursor:pointer; color:var(--ink-soft); font-family:var(--font-text); font-size:15px; }
  .back-btn .chev { display:inline-block; width:12px; height:12px; }
  .back-btn .chev svg { display:block; width:100%; height:100%; }
  .back-btn:active { color:var(--ink); }
  .quick-add { padding:6px 12px 14px; }
  .quick-add .chip.del-chip { border-color:var(--red); color:var(--red); }
  .rematch { padding:12px 12px 4px; }

  /* ---- bracket ---- */
  .tnext { text-align:center; font-size:15px; color:var(--ink); margin:12px; }
  .bracket-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; padding:12px 8px 16px; }
  .mbox { border:1px solid var(--rule); border-radius:var(--r-control); overflow:hidden; background:var(--cream); box-shadow:0 1px 3px rgba(0,0,0,.14); }
  .mbox-slot { display:flex; justify-content:space-between; align-items:center; padding:8px; font-size:13px; color:var(--ink); border-bottom:1px solid var(--cream-shade); }
  .mbox-slot:last-child { border-bottom:none; }
  .mbox-slot.win { background:var(--brass); color:var(--cream); font-weight:600; }
  .mbox-slot.pick { cursor:pointer; }
  .mbox-slot.pick:active { background:var(--cream-shade); }
  .mbox-slot-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .mbox-slot-name.bye { font-style:italic; color:var(--ink-soft); font-size:11px; }
  .mbox-score { font-size:11px; font-family:ui-monospace, 'SF Mono', Menlo, Consolas, monospace; flex-shrink:0; margin-left:6px; color:var(--brass-text); }
  .mbox-slot.win .mbox-score { color:var(--cream); }
  .mbox.ready { cursor:pointer; }
  .mbox.ready:active { background:var(--cream-shade); }
  .mbox.changeable { cursor:pointer; }
  .mbox.changeable:active { background:var(--cream-shade); }
  .view-only-bar { padding:8px 16px; background:var(--cream-shade); color:var(--red); font-size:13px; text-align:center; border-top:1px solid var(--rule); }
  .match-bar { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:8px 12px; background:var(--cream-shade); border-bottom:1px solid var(--rule); }
  .match-vs { font-size:13px; color:var(--ink); font-weight:600; text-align:right; }

  /* ---- sync / join code ---- */
  .sync-bar { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:8px 12px; background:var(--cream-shade); border-bottom:1px solid var(--rule); flex-wrap:wrap; }
  .history-footer { text-align:center; padding:12px; border-top:1px solid var(--cream-shade); }
  .history-footer .dot-sep { color:var(--ink-soft); margin:0 10px; }

  /* ---- personal stats (History → Stats) ---- */
  .stat-sort-row { display:flex; justify-content:safe center; gap:8px; padding:10px 12px 12px; overflow-x:auto; border-bottom:1px solid var(--rule); }
  .stat-sort-chip { flex:none; font-family:var(--font-text); font-size:13px; font-weight:600; padding:7px 14px;
    border-radius:var(--r-pill); border:1px solid var(--rule); background:none; color:var(--ink-soft); cursor:pointer; white-space:nowrap; }
  .stat-sort-chip.on { background:var(--ink); color:var(--cream); border-color:var(--ink); }
  .stat-sort-chip:active:not(.on) { transform:scale(.96); background:var(--cream-shade); }

  .rank-row { display:flex; align-items:center; gap:10px; padding:11px 14px; border-bottom:1px solid var(--cream-shade); cursor:pointer; }
  .rank-row:last-child { border-bottom:none; }
  .rank-row:active { background:var(--cream-shade); }
  .rank-num { flex:none; width:20px; text-align:center; font-family:var(--font-display); font-size:15px; font-weight:600; color:var(--ink-soft); }
  .rank-num.top { color:var(--brass-text); }
  .rank-id { flex:1; min-width:0; }
  .rank-name { font-size:15px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rank-bar-track { height:4px; background:var(--cream-shade); border-radius:2px; margin-top:5px; overflow:hidden; }
  .rank-bar-fill { height:100%; background:var(--brass-text); border-radius:2px; }
  .rank-metric { flex:none; text-align:right; font-size:15px; font-weight:600; color:var(--ink); min-width:56px; }
  .rank-metric small { display:block; font-size:11px; font-weight:500; color:var(--ink-soft); }
  .rank-chevron { flex:none; color:var(--ink-soft); display:inline-block; width:12px; height:12px; }
  .rank-chevron svg { display:block; width:100%; height:100%; }

  .stats-player-head { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; padding:14px 12px 12px; background:var(--cream); border-bottom:3px double var(--brass); }
  .stats-player-head .back-btn { grid-column:1; justify-self:start; }
  .stats-player-head .stats-player-name { grid-column:2; font-family:var(--font-display); font-size:23px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 4px; }

  .stats-hero { text-align:center; padding:18px 16px 18px; border-bottom:1px solid var(--cream-shade); }
  .stats-hero-record { font-family:var(--font-display); font-size:40px; font-weight:600; color:var(--ink); margin:0; }
  .stats-hero-sub { font-size:13px; color:var(--ink-soft); margin:4px 0 0; }
  .stats-hero-champ { display:inline-flex; align-items:center; gap:4px; margin-top:10px; font-size:12px; font-weight:600;
    color:var(--brass-text); background:var(--felt-wash-strong); padding:4px 10px; border-radius:var(--r-pill); }

  .stats-tile-grid { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--cream-shade); }
  /* An odd number of tiles leaves the last one dangling in a lone column — span it
     across the full row instead of leaving a blank cell beside it. */
  .stats-tile-grid > .stats-tile:last-child:nth-child(odd) { grid-column:1 / -1; }
  .stats-tile { background:var(--cream); padding:16px 14px; text-align:center; }
  .stats-tile-num { font-family:var(--font-display); font-size:26px; font-weight:600; color:var(--ink); line-height:1.1; }
  .stats-tile-sub { font-size:12px; color:var(--ink-soft); margin-top:1px; }
  .stats-tile-label { font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-soft); margin-top:3px; }
  .stats-tile[role="button"] { cursor:pointer; }
  .stats-tile[role="button"] .stats-tile-label { border-bottom:1px dotted var(--ink-soft); display:inline-block; }
  .stats-tile[role="button"]:active { background:var(--cream-shade); }

  .stats-section { padding:16px 16px 4px; }
  .stats-section-title { font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--brass-text); font-weight:600; margin:0 0 10px; }
  .stats-section-title[role="button"] { cursor:pointer; border-bottom:1px dotted var(--brass-text); display:inline-block; }

  .stats-form-strip { display:flex; gap:5px; padding-bottom:16px; }
  .stats-form-pill { flex:1; height:26px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--cream); }
  .stats-form-pill.w { background:var(--brass-text); }
  .stats-form-pill.l { background:var(--red); }
  .stats-form-pill.t { background:var(--ink-soft); }

  .stats-wl-row { padding-bottom:18px; }
  .stats-wl-bar { height:14px; border-radius:7px; overflow:hidden; display:flex; box-shadow:inset 0 0 0 1px color-mix(in srgb, var(--ink-soft) 20%, transparent); }
  .stats-wl-bar .seg-w { background:var(--brass-text); }
  .stats-wl-bar .seg-l { background:var(--red); }
  .stats-wl-labels { display:flex; justify-content:space-between; font-size:12px; color:var(--ink-soft); margin-top:6px; }
  .stats-wl-labels b { color:var(--ink); font-weight:600; }

  .stats-activity-row { display:flex; align-items:flex-end; gap:6px; height:64px; padding-bottom:16px; transition:height .15s ease; }
  .stats-activity-row.counts-on { height:96px; }
  @media (prefers-reduced-motion: reduce) { .stats-activity-row { transition:none; } }
  .stats-activity-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; justify-content:flex-end; }
  .stats-activity-count { font-size:11px; color:var(--ink-soft); font-variant-numeric:tabular-nums; }
  .stats-activity-count.zero { opacity:.45; }
  .stats-activity-bar { width:100%; max-width:22px; background:var(--brass-text); border-radius:3px 3px 1px 1px; opacity:.85; }
  .stats-activity-bar.zero { background:var(--cream-shade); opacity:1; }
  .stats-activity-label { font-size:10px; color:var(--ink-soft); }

  .stats-trend-chart svg { display:block; width:100%; height:auto; }
  .stats-trend-labels { display:flex; justify-content:space-between; font-size:10px; color:var(--ink-soft); margin-top:4px; }

  .stats-pair-list { padding-bottom:6px; }
  .stats-pair-row { display:flex; align-items:baseline; justify-content:space-between; gap:10px; padding:8px 0; border-bottom:1px solid var(--cream-shade); }

      Object.keys(nM).forEach(function (f) { fields[f] = 1; });
      var changed = Object.keys(fields).filter(function (f) { return !fbEq(bM[f], nM[f]); });
      if (changed.length === 0) return;
      var seedOnly = changed.every(isSeedField);
      if (!seedOnly) { diff[path] = nM; return; }   // known unequal — addUnit's fbEq would re-canonicalize both
      changed.forEach(function (f) { addUnit(path + "/" + f, bM[f], nM[f]); });
    }
    // Per-match units for a rounds grid; a shape change (rebuilt bracket)
    // falls back to rewriting the grid as a single unit.
    function gridUnits(prefix, bRounds, nRounds) {
      bRounds = bRounds || []; nRounds = nRounds || [];
      var sameShape = bRounds.length === nRounds.length && nRounds.every(function (r, ri) {
        return (bRounds[ri] || []).length === (r || []).length;
      });
      if (!sameShape) { addUnit(prefix, bRounds, nRounds); return; }
      nRounds.forEach(function (round, ri) {
        (round || []).forEach(function (m, mi) {
          matchUnits(prefix + "/" + ri + "/" + mi, bRounds[ri][mi], m);
        });
      });
    }
    // Per-index units for a flat list. A shrink rewrites the whole list so
    // stale tail entries actually delete (update() can't remove what it
    // isn't told about). Elements route through matchUnits: for real match
    // slots that gives the per-field seeding treatment above; for anything
    // else (teams) no change is ever a/b/winner-only, so it degrades to the
    // whole-element write.
    function arrayUnits(key, bArr, nArr) {
      bArr = bArr || []; nArr = nArr || [];
      if (nArr.length < bArr.length) { addUnit(key, bArr, nArr); return; }
      for (var i = 0; i < nArr.length; i++) matchUnits(key + "/" + i, bArr[i], nArr[i]);
    }
    // Unknown TOP-LEVEL keys already degrade safely (the final addUnit arm
    // writes them whole), but the containers below get bespoke splits of
    // SPECIFIC children — any sibling a future schema change adds must still
    // diff, coarsely, rather than be silently omitted (an omitted key would
    // never sync yet still advance the baseline: permanent divergence with
    // no error, and the empty-diff early-return would even skip the write
    // when it's the only change).
    function siblingUnits(prefix, bObj, nObj, handled) {
      var ks = {};
      Object.keys(bObj || {}).forEach(function (x) { ks[x] = 1; });
      Object.keys(nObj || {}).forEach(function (x) { ks[x] = 1; });
      Object.keys(ks).forEach(function (x) {
        if (handled[x]) return;
        addUnit(prefix + "/" + x, bObj && bObj[x], nObj && nObj[x]);
      });
    }
    var keys = {};
    Object.keys(base).forEach(function (x) { keys[x] = 1; });
    Object.keys(next).forEach(function (x) { keys[x] = 1; });
    Object.keys(keys).forEach(function (k) {
      if (k === "_updatedAt") return;                      // stamped fresh on every write instead
      if (k === "_createdAt" && next[k] == null) return;   // never delete — it anchors the 48h expiry (see FIREBASE_SETUP.md)
      if (k === "rounds") gridUnits("rounds", base.rounds, next.rounds);
      else if (k === "wBracket" || k === "lBracket") {
        gridUnits(k + "/rounds", base[k] && base[k].rounds, next[k] && next[k].rounds);
        siblingUnits(k, base[k], next[k], { rounds: 1 });
      }
      else if (k === "grandFinal") {
        matchUnits("grandFinal/m1", base.grandFinal && base.grandFinal.m1, next.grandFinal && next.grandFinal.m1);
        matchUnits("grandFinal/m2", base.grandFinal && base.grandFinal.m2, next.grandFinal && next.grandFinal.m2);
        siblingUnits("grandFinal", base.grandFinal, next.grandFinal, { m1: 1, m2: 1 });
      }
      else if (k === "schedule" || k === "games" || k === "teams") arrayUnits(k, base[k], next[k]);
      else if (k === "locks") {
        var lkeys = {};
        Object.keys(base.locks || {}).forEach(function (x) { lkeys[x] = 1; });
        Object.keys(next.locks || {}).forEach(function (x) { lkeys[x] = 1; });
        Object.keys(lkeys).forEach(function (x) {
          addUnit("locks/" + x, base.locks && base.locks[x], next.locks && next.locks[x]);
        });
      }
      else addUnit(k, base[k], next[k]);
    });
    return diff;
  }

  function normalizeFirebaseTourney(t) {
    if (!t || typeof t !== "object") return t;
    if (t.teams)  t.teams  = fbObjToArr(t.teams);
    if (!t.locks || typeof t.locks !== "object") t.locks = {};

    if (t.format === "double") {
      // Double elimination
      if (t.wBracket && t.wBracket.rounds) t.wBracket.rounds = normalizeFirebaseMatches(t.wBracket.rounds);
      if (t.lBracket && t.lBracket.rounds) t.lBracket.rounds = normalizeFirebaseMatches(t.lBracket.rounds);
      if (!t.wBracket) t.wBracket = { rounds: [] };
      if (!t.lBracket) t.lBracket = { rounds: [] };
      // Firebase may have collapsed empty/partial rounds — rebuild to exact shape.
      if (t.wBracket.rounds.length > 0) {
        var wbR0count = t.wBracket.rounds[0].length, wbLens = elimRoundLens(wbR0count);
        t.wBracket.rounds = padRoundsToLens(t.wBracket.rounds, wbLens);
        t.lBracket.rounds = padRoundsToLens(t.lBracket.rounds, lbRoundLens(wbR0count, wbLens.length));
      }
      if (!t.grandFinal) t.grandFinal = { m1: { a: null, b: null, winner: null }, m2: null };
      else {
        if (t.grandFinal.m1) normalizeFirebaseMatch(t.grandFinal.m1);
        if (t.grandFinal.m2) normalizeFirebaseMatch(t.grandFinal.m2);
      }
    } else if (t.format === "round") {
      // Round robin
      if (t.schedule) t.schedule = fbObjToArr(t.schedule).map(normalizeFirebaseMatch);
      if (!t.schedule) t.schedule = [];
      if (t.final) normalizeFirebaseMatch(t.final);
    } else if (t.format === "series") {
      // Best-of series — a flat list of games between the two teams
      t.games = t.games ? fbObjToArr(t.games).map(normalizeFirebaseMatch) : [];
      if (!t.games.length) t.games = [{ a: 0, b: 1, winner: null, game: null, completedGame: null }];
    } else {
      // Single elimination (default)
      if (t.rounds) t.rounds = normalizeFirebaseMatches(t.rounds);
      // Firebase may have collapsed empty/partial rounds — rebuild to exact shape so
      // every match slot exists (fixes winners that couldn't advance after a sync).
      if (t.rounds && t.rounds.length > 0) {
        t.rounds = padRoundsToLens(t.rounds, elimRoundLens(t.rounds[0].length));
      }
    }
    return t;
  }

  // Can we change a decided match's winner?
  // Only if the advanced team hasn't already played in the next round.
  function canEditWinner(t, ri, mi) {
    var m = t.rounds[ri][mi];
    if (m.winner == null || m.b == null) return false; // no winner, or bye
    if (ri + 1 >= t.rounds.length) return true;        // final — no next round to cascade
    var nm = t.rounds[ri + 1][Math.floor(mi / 2)];
    return nm.winner == null;
  }
  function clearMatchWinner(t, ri, mi) {
    var m = t.rounds[ri][mi];
    m.winner = null;
    if (ri + 1 < t.rounds.length) {
      var nm = t.rounds[ri + 1][Math.floor(mi / 2)];
      if (mi % 2 === 0) nm.a = null; else nm.b = null;
    } else {
      t.champion = null;
    }
  }

  // ---- WB clear ----
  function canClearWBWinner(t, ri, mi) {
    var m = t.wBracket.rounds[ri][mi];
    if (m.winner == null) return false;
    var loser = (m.a === m.winner) ? m.b : m.a;
    var wbLen = t.wBracket.rounds.length;
    if (ri + 1 < wbLen) {
      if (t.wBracket.rounds[ri + 1][Math.floor(mi / 2)].winner != null) return false;
    } else {
      if (t.grandFinal.m1.winner != null) return false;
    }
    if (loser != null) {
      if (ri === 0 && t.lBracket.rounds.length > 0) {
        if (t.lBracket.rounds[0][Math.floor(mi / 2)].winner != null) return false;
      } else if (ri >= 1) {
        var lbRi = 2 * ri - 1;
        if (lbRi < t.lBracket.rounds.length && t.lBracket.rounds[lbRi][mi].winner != null) return false;
      }
    }
    return true;
  }
  function clearWBWinner(t, ri, mi) {
    var m = t.wBracket.rounds[ri][mi];
    var loser = (m.a === m.winner) ? m.b : m.a;
    m.winner = null;
    var wbLen = t.wBracket.rounds.length;
    if (ri + 1 < wbLen) {
      var nwb = t.wBracket.rounds[ri + 1][Math.floor(mi / 2)];
      if (mi % 2 === 0) nwb.a = null; else nwb.b = null;
    } else {
      t.grandFinal.m1.a = null;
    }
    if (loser != null) {
      if (ri === 0 && t.lBracket.rounds.length > 0) {
        var lbSlot0 = Math.floor(mi / 2);
        t.lBracket.rounds[0][lbSlot0][mi % 2 === 0 ? "a" : "b"] = null;
      } else if (ri >= 1) {
        var lbRi2 = 2 * ri - 1;
        if (lbRi2 < t.lBracket.rounds.length) t.lBracket.rounds[lbRi2][mi].b = null;
      }
    }
  }

  // ---- LB clear ----
  function canClearLBWinner(t, ri, mi) {
    var m = t.lBracket.rounds[ri][mi];
    if (m.winner == null) return false;
    var lbLen = t.lBracket.rounds.length;
    if (ri + 1 < lbLen) {
      var nextMatch = (ri % 2 === 0) ? t.lBracket.rounds[ri + 1][mi] : t.lBracket.rounds[ri + 1][Math.floor(mi / 2)];
      return nextMatch.winner == null;
    }
    return t.grandFinal.m1.winner == null;
  }
  function clearLBWinner(t, ri, mi) {
    t.lBracket.rounds[ri][mi].winner = null;
    var lbLen = t.lBracket.rounds.length;
    if (ri + 1 < lbLen) {
      var nr = t.lBracket.rounds[ri + 1];
      if (ri % 2 === 0) {
        nr[mi].a = null;
      } else {
        nr[Math.floor(mi / 2)][mi % 2 === 0 ? "a" : "b"] = null;
      }
    } else {
      t.grandFinal.m1.b = null;
    }
  }

  // ---- GF clear ----
  function canClearGFWinner(t, matchNum) {
    if (matchNum === 1) {
      if (t.grandFinal.m1.winner == null) return false;
      if (t.grandFinal.m2 && t.grandFinal.m2.winner != null) return false;
      return true;
    }
    return t.grandFinal.m2 != null && t.grandFinal.m2.winner != null;
  }
  function clearGFWinner(t, matchNum) {
    if (matchNum === 1) {
      t.grandFinal.m1.winner = null;
      t.grandFinal.m2 = null;
      t.champion = null;
    } else {
      t.grandFinal.m2.winner = null;
      t.champion = null;
    }
  }

  // ---- RR clear ----
  function canClearRRWinner(t, idx) {
    if (t.schedule[idx].winner == null) return false;
    return !t.final || t.final.winner == null;
  }
  function clearRRWinner(t, idx) {
    t.schedule[idx].winner = null;
    t.final = null;
    t.champion = null;
  }
  function canClearRRFinalWinner(t) {
    return t.final != null && t.final.winner != null;
  }
  function clearRRFinalWinner(t) {
    t.final.winner = null;
    t.champion = null;
  }

  function subscribeToTourney(code) {
    if (!fb) return;
    deferredSnapshot = null;     // a stash from a previous subscription must not replay into this one
    clearAcceptedStamps();       // ...and neither must its stamp history suppress this one's snapshots
    fb.ref("tournaments/" + code).on("value", function(snap) {
      applyTourneySnapshot(snap.val());
    }, function() {
      // Cancelled by the server — the rules gate reads on data.exists() and
      // a recent _createdAt, so this fires when the record was deleted or
      // expired, and the listener is DEAD from this point on. If the record
      // is simply gone, re-establish it and re-attach: the .set() and the
      // new listen travel the same ordered client connection, so the listen
      // is evaluated after the write has landed. An EXPIRED record refuses
      // the re-establishing write too, so that path fails closed into
      // "error" (the rate limit in reestablishTourney stops any spin).
      if (reestablishTourney()) subscribeToTourney(code);
      else { syncStatus = "error"; syncRender(); }
    });
  }
  // The whole accept/merge/adopt pipeline for one incoming snapshot — shared
  // by the live listener above and syncWriteDone's deferred replay.
  function applyTourneySnapshot(data) {
      if (!data) {
        // A null VALUE event mostly means a local rollback after this
        // device's own rejected .set() (server-side deletion usually arrives
        // as a listener CANCEL instead — the rules gate reads on
        // data.exists(); see subscribeToTourney's error callback). Either
        // way the record is gone: try to re-establish it from local state.
        if (reestablishTourney()) return;
        syncStatus = "error"; syncRender(); return;
      }
      syncStatus = "live";
      // While one of THIS device's writes is still in flight, hold back a
      // snapshot older than the stamp that write claimed (see
      // lastAcceptedUpdatedAt) -- that window is where a stale/incomplete
      // echo (most notably a lock transaction's intermediate state) can
      // surface pre-write state and silently revert it. Held-back snapshots
      // are stashed, not dropped: _updatedAt stamps come from different
      // devices' clocks and aren't globally ordered, so with granular writes
      // a lower-stamped snapshot can still be the newest server state -- and
      // the sole carrier of another device's concurrent result (found
      // empirically: the guest device permanently missing a match result the
      // host recorded at the same instant, whenever the host's clock ran
      // behind). Once every pending write settles, syncWriteDone replays the
      // newest stashed snapshot -- unless a later-accepted snapshot already
      // superseded it. Legacy records with no _updatedAt at all always pass.
      var incomingUpdatedAt = data._updatedAt || 0;
      if (incomingUpdatedAt < lastAcceptedUpdatedAt) {
        if (pendingSyncWrites > 0) {
          deferredSnapshot = data;
          return;
        }
        // Idle, below the floor: accept only a stamp we've never processed
        // (a behind-clock device's fresh write); drop an already-seen stamp
        // (the network re-delivering old state — see seenUpdateStamps).
        if (incomingUpdatedAt && seenUpdateStamps[incomingUpdatedAt]) return;
      }
      deferredSnapshot = null;   // this snapshot supersedes anything held back
      if (incomingUpdatedAt > lastAcceptedUpdatedAt) lastAcceptedUpdatedAt = incomingUpdatedAt;
      noteAcceptedStamp(incomingUpdatedAt);
      var normalized = normalizeFirebaseTourney(data);
      // Server truth as delivered — captured before the merge below so any
      // units the merge preserves stay "dirty" against the baseline and get
      // flushed by the next saveTourney().
      var serverBase = JSON.parse(JSON.stringify(normalized));
      // Three-way merge instead of wholesale adoption. The timestamp floor
      // above can't protect an in-memory mutation that hasn't reached
      // saveTourney() yet (there's no timestamp for something not yet
      // written) -- a non-stale snapshot arriving in that gap used to
      // silently revert a just-recorded deal. So: keep every local unit
      // edited since the last sync that the server itself hasn't changed;
      // where both sides changed the same unit, the server wins (the
      // per-hand locks make a genuine both-changed conflict a non-case).
      // Only merge into the SAME tournament: a rematch/redraw mints a new id
      // and .set()s a whole new bracket at the same code. tourneyUnitDiff's
      // own id guard covers baseline-vs-local, but not the graft target — an
      // undecided slot in the fresh bracket fbEq-matches the old baseline's
      // null, so a stale local winner would graft straight into the new
      // bracket (between different teams!) and the next save would flush the
      // phantom result to every device. Local edits that predate a restart
      // belong to a dead bracket; adopt the new tournament wholesale.
      if (tourney && lastSyncedTourney && normalized.id === tourney.id && normalized.format === tourney.format) {
        var dirty = tourneyUnitDiff(lastSyncedTourney, tourney);
        if (dirty) {
          Object.keys(dirty).forEach(function(path) {
            var baseVal = getAtPath(lastSyncedTourney, path);
            var srvVal = getAtPath(normalized, path);
            if (fbEq(baseVal, srvVal)) {
              // Dirty paths speak Firebase write vocabulary; translate at the
              // boundary instead of writing it into the local tree verbatim.
              // (1) null means DELETE, not a literal null entry.
              if (dirty[path] == null) { deleteAtPath(normalized, path); return; }
              // (2) Don't fabricate a container the server deliberately
              // dropped: a per-field path whose parent unit the server
              // deleted (e.g. grandFinal/m2 reset by a feeder-result change
              // — its winner slot fbEq-matches the old baseline's null, so
              // the guard above passes) must not conjure a partial match
              // like {winner: 0} with no a/b. Parent absent on BOTH sides is
              // different and fine — that's just Firebase collapsing an
              // empty container (locks), and creating it locally is benign.
              var slash = path.lastIndexOf("/");
              if (slash > 0) {
                var srvParent = getAtPath(normalized, path.slice(0, slash));
                var baseParent = getAtPath(lastSyncedTourney, path.slice(0, slash));
                if ((srvParent == null || typeof srvParent !== "object") &&
                    baseParent && typeof baseParent === "object") return;
              }
              setAtPath(normalized, path, dirty[path]);
              return;
            }
            // Both sides changed this unit. Server wins as a rule — but when
            // the server's own change is confined to the seed fields
            // (a/b/winner: another device's feeder result cascading into this
            // match), a whole-unit server win would throw away a local edit
            // (an in-progress game, a just-recorded deal) over a DISJOINT
            // field. Keep the local unit and graft the server's seed fields
            // onto it instead; the server still wins any field both sides
            // touched. (Local seed-only edits never reach here as whole
            // units — tourneyUnitDiff already splits those per-field.)
            var local = dirty[path];
            if (local && baseVal && srvVal && typeof local === "object" && typeof baseVal === "object" && typeof srvVal === "object") {
              var fields = {};
              Object.keys(baseVal).forEach(function(f) { fields[f] = 1; });
              Object.keys(srvVal).forEach(function(f) { fields[f] = 1; });
              var srvChanged = Object.keys(fields).filter(function(f) { return !fbEq(baseVal[f], srvVal[f]); });
              var seedOnly = srvChanged.length > 0 && srvChanged.every(isSeedField);
              if (seedOnly) {
                var merged = JSON.parse(JSON.stringify(local));
                srvChanged.forEach(function(f) {
                  if (srvVal[f] === undefined) delete merged[f];
                  else merged[f] = JSON.parse(JSON.stringify(srvVal[f]));
                });
                setAtPath(normalized, path, merged);
              }
            }
          });
        }
      }
      lastSyncedTourney = serverBase;
      var normStr = JSON.stringify(normalized);
      var changed = normStr !== JSON.stringify(tourney);
      tourney = normalized;
      localStorage.setItem(TOURNEY_KEY, normStr);
      syncMyHistoryFromTourney();   // pick up any newly-completed matches I played in
      if (changed) syncRender();
  }

  // Local-only creation — the default for every "Start Tournament/Series" button.
  // Sharing is a separate, explicit opt-in (see shareSession below).
  function startLocalTourney(t) {
    tourney = t; saveTourney(); ui.tSetup = null; render();
  }

  // Turns the current local tourney/series into a live shared session, minting a
  // join code. Explicit opt-in from either tab (Tournament tab's Share button, or
  // the Game tab's Share button — the latter first wraps the solo game in a
  // series-shaped tourney via startGameShare, then calls this same function).
  function shareSession() {
    if (!tourney || syncStatus === "connecting") return;
    if (!initFb()) {
      ui.syncError = "Couldn't share: Firebase is not configured on this device.";
      render();
      return;
    }
    var code = genCode();
    var payload = JSON.parse(JSON.stringify(tourney));
    payload._createdAt = firebase.database.ServerValue.TIMESTAMP;
    payload._code = code;
    syncStatus = "connecting"; render();
    fb.ref("tournaments/" + code).set(payload).then(function() {
      syncCode = code; syncRole = "host";
      localStorage.setItem(SYNC_CODE_KEY, code);
      localStorage.setItem(SYNC_ROLE_KEY, "host");
      tourney._code = code;
      localStorage.setItem(TOURNEY_KEY, JSON.stringify(tourney));
      lastSyncedTourney = JSON.parse(JSON.stringify(payload));
      subscribeToTourney(code);
      autoIdentifyFromDeviceName();   // silently tag the host if their saved name is on the roster
      // Just show the code — renderModal checks ui.whoSheet before ui.shareSheetOpen,
      // so setting both here would hide the code behind the identify prompt before
      // the host ever sees it. The share sheet has its own "Who am I playing as?"
      // button that opens ui.whoSheet when the host actually wants it.
      ui.shareSheetOpen = true;
      render();
    }).catch(function(err) {
      // Write failed — fall back to local-only (no join code)
      syncStatus = "offline";
      ui.syncError = "Couldn't share: Firebase write failed. Staying local-only.";
      render();
    });
  }

  // Shared team-object shape used both here (wrapping an existing named team's
  // players) and by the Series-setup screen (naming a freshly-drawn/chosen pair).
  function mkTeam(name, players) {
    return { id: "t" + Math.random().toString(36).slice(2, 7), name: name, players: players };
  }

  // Wraps the current solo game (in progress or empty) into a series-shaped tourney,
  // reusing the exact sync/lock/rematch machinery a tournament series already has
  // (see makeSeries). If a local best-of-N series was already under way (ui.series),
  // its target and running win tally carry over as synthetic decided game slots
  // ahead of the live one, so the shared scoreboard isn't misleading about what's
  // actually happened so far.
  function startGameShare() {
    var teamA = mkTeam(soloGame.teams[0], [soloGame.players[0], soloGame.players[2]]);
    var teamB = mkTeam(soloGame.teams[1], [soloGame.players[1], soloGame.players[3]]);
    var bestOf = ui.series ? ui.series.bestOf : 1;
    var t = makeSeries([teamA, teamB], bestOf);
    t.games = [];
    if (ui.series) {
      // Reuse the local series' id (rather than the fresh one makeSeries just minted)
      // so games already archived under it stay grouped with the ones still to come
      // instead of splitting into two separate history entries once this is shared.
      t.id = ui.series.id;
      var i;
      for (i = 0; i < ui.series.wins[0]; i++) t.games.push({ a:0, b:1, winner:0, game:null, completedGame:null });
      for (i = 0; i < ui.series.wins[1]; i++) t.games.push({ a:0, b:1, winner:1, game:null, completedGame:null });
    }
    t.games.push({ a:0, b:1, winner:null, game:soloGame, completedGame:null });
    ui.series = null; ui.offerSeries = null; ui.seriesResult = null;   // superseded by the shared tourney now
    startLocalTourney(t);
    shareSession();
  }

  // Host-only: start a fresh bracket (rematch/redraw). For a synced tournament this
  // overwrites the bracket in place at the same code, so guests follow automatically
  // via their live subscription — sync is never interrupted and the code is unchanged.
  function restartTourney(newT) {
    if (fb && syncCode) {
      newT._code = syncCode;
      tourney = newT;
      saveTourney();   // writes the new bracket to tournaments/<syncCode>; guests pick it up
      ui.syncNotice = "New Tournament Started";
    } else {
      tourney = newT;
      saveTourney();
    }
    render();
  }

  var JOIN_TIMEOUT_MS = 10000;
  function joinTournament(code, onError) {
    if (!initFb()) { onError("Firebase is not configured on this device."); return; }
    // navigator.onLine only reflects the network *interface* (a device on
    // wifi with no real internet still reports true), so this catches the
    // common "airplane mode" case fast, but isn't sufficient on its own —
    // the timeout below is the real backstop. Without either, a genuinely
    // unreachable Firebase never rejects .once("value") at all (it just
    // keeps retrying the connection internally), leaving the Join sheet
    // showing no error and looking like the tap did nothing.
    if (typeof navigator.onLine === "boolean" && !navigator.onLine) {
      onError("Couldn't connect. Check your internet connection.");
      return;
    }
    syncStatus = "connecting"; render();
    var settled = false;
    var timeoutId = setTimeout(function () {
      if (settled) return;
      settled = true;
      syncStatus = "offline";
      onError("Couldn't connect. Check your internet connection.");
    }, JOIN_TIMEOUT_MS);
    fb.ref("tournaments/" + code).once("value").then(function(snap) {
      if (settled) return;
